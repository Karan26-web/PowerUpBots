<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerUp Bots </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #d9e7ff;
      display: flex;
      align-items: center;
      justify-content: center
    }

    button {
      font: inherit
    }

    #game {
      position: absolute;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      transform-origin: top left;
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
      color: #154aa5;
      user-select: none;
      background: #d9e7ff;
      isolation: isolate;
      --ease-in-out-soft: cubic-bezier(.65, 0, .35, 1);
      --ease-out-back: cubic-bezier(.18, .89, .32, 1.18);
      --ease-snap: cubic-bezier(.16, 1.18, .3, 1);
    }

    #game::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 110;
      pointer-events: none;
      opacity: 0;
      background: rgba(230, 244, 255, .62);
    }

    #game.screen-fade::after {
      animation: screenFade .58s ease-out both;
    }

    @keyframes screenFade {
      0% {
        opacity: 0;
      }

      20% {
        opacity: .35;
      }

      100% {
        opacity: 0;
      }
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }

    .hidden {
      opacity: 0;
      pointer-events: none
    }

    #instruction {
      position: absolute;
      top: 8px;
      left: 32px;
      width: 1120px;
      height: 150px;
      z-index: 40;
      transition: opacity .28s ease, transform .28s ease;
    }

    #instruction:not(.hidden) {
      animation: instructionFloat 3.4s ease-in-out infinite;
    }

    #instruction.hidden {
      transform: translateY(-8px)
    }

    #game.teaching-active #instruction {
      opacity: 0 !important;
      pointer-events: none;
      visibility: hidden;
    }

    #instruction img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #instructionText {
      position: absolute;
      left: 154px;
      right: 14px;
      top: 42px;
      min-height: 58px;
      display: flex;
      align-items: center;
      color: #154aa5;
      font-size: 26px;
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
    }

    @keyframes instructionFloat {

      0%,
      100% {
        transform: translateY(0);
        filter: drop-shadow(0 10px 16px rgba(77, 151, 220, .08));
      }

      50% {
        transform: translateY(-3px);
        filter: drop-shadow(0 13px 18px rgba(77, 151, 220, .14));
      }
    }

    #scene {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .bot-slot {
      position: absolute;
      width: 260px;
      height: 520px;
      transform-origin: bottom center;
    }

    .bot-slot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: var(--power-spark-top, 510px);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.35);
      opacity: 0;
      background: radial-gradient(circle, #fff 0 18%, #8af3ff 32%, rgba(114, 219, 255, 0) 72%);
      box-shadow: 0 0 0 rgba(116, 219, 255, 0);
      pointer-events: none;
      z-index: 12;
    }

    .layout-ready.power-connecting .bot-slot::after {
      animation: connectionFlash .66s cubic-bezier(.18, .89, .32, 1.18) 1.58s both;
    }

    .layout-ready.power-connecting .right-bot::after {
      animation-delay: 1.75s;
    }

    .bot-img {
      position: absolute;
      left: 50%;
      bottom: 0;
      max-width: none;
      object-fit: contain;
      transform: translateX(-50%);
      transition: filter .35s ease, transform .45s cubic-bezier(.18, .89, .35, 1.18);
    }

    .bot-img.happy {
      filter: drop-shadow(0 0 16px rgba(116, 219, 255, .95));
    }

    .bot-img.jump {
      animation: botJump .82s ease-in-out 2;
    }

    .layout-ready.power-connecting .bot-img {
      animation: botPowerNotice 2.7s cubic-bezier(.65, 0, .35, 1) .92s both;
    }

    .layout-ready.power-connecting .right-bot .bot-img {
      animation-delay: 1.06s;
    }

    .electric-pulse {
      position: absolute;
      left: 50%;
      top: 150px;
      width: 4px;
      height: 40px;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 0 16px 6px #74dbff;
      transform: translateX(-50%);
      animation: pulseDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      z-index: 10;
    }

    @keyframes pulseDown {
      0% {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      80% {
        transform: translate(-50%, 380px);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, 380px);
        opacity: 0;
      }
    }

    @keyframes botJump {

      0%,
      100% {
        transform: translateX(-50%) translateY(0)
      }

      42% {
        transform: translateX(-50%) translateY(-28px)
      }
    }

    @keyframes botPowerNotice {

      0%,
      38%,
      100% {
        transform: translateX(-50%) translateY(0) scale(1);
        filter: none;
      }

      48% {
        transform: translateX(-50%) translateY(-5px) scale(1.018);
        filter: drop-shadow(0 0 10px rgba(116, 219, 255, .55));
      }

      59% {
        transform: translateX(-50%) translateY(1px) scale(.996);
      }
    }

    @keyframes connectionFlash {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.35);
        box-shadow: 0 0 0 rgba(116, 219, 255, 0);
      }

      42% {
        opacity: .95;
        transform: translate(-50%, -50%) scale(1.2);
        box-shadow: 0 0 22px 10px rgba(116, 219, 255, .42);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.9);
        box-shadow: 0 0 36px 18px rgba(116, 219, 255, 0);
      }
    }

    .pod-img {
      position: absolute;
      left: 50%;
      top: 0;
      width: 134px;
      height: auto;
      transform: translateX(-50%);
      object-fit: contain;
      opacity: 0;
      transition: opacity .35s ease, filter .35s ease;
    }

    .pod-img.visible {
      opacity: 1
    }

    .pod-img.glow {
      animation: podGlow 1s ease-in-out 2
    }

    @keyframes podGlow {

      0%,
      100% {
        filter: brightness(1)
      }

      50% {
        filter: brightness(1.55) saturate(1.75) drop-shadow(0 0 16px rgba(76, 222, 255, .9))
      }
    }

    .layout-intro .left-bot {
      left: 360px;
      bottom: 0
    }

    .layout-intro .right-bot {
      right: 360px;
      bottom: 0
    }

    .layout-intro .bot-img {
      width: 205px
    }

    .layout-intro .pod-img {
      display: none
    }

    .layout-ready .left-bot {
      left: 80px;
      bottom: 0
    }

    .layout-ready .right-bot {
      right: 80px;
      bottom: 0
    }

    .layout-ready .bot-slot {
      top: 0;
      bottom: auto;
      height: 720px
    }

    .layout-ready .left-bot,
    .layout-ready .right-bot {
      bottom: auto
    }

    .layout-ready .bot-img {
      width: 235px
    }

    .layout-ready .bot-img {
      bottom: 0
    }

    .layout-ready .pod-img {
      display: block;
      top: 156px;
      width: 160px
    }

    .layout-ready.power-connecting .pod-img.visible {
      opacity: 1;
      animation: powerCableConnect 1.86s cubic-bezier(.16, 1.12, .3, 1) both;
    }

    .layout-ready.power-connecting .right-bot .pod-img.visible {
      animation-delay: .14s;
    }

    @keyframes dropPod {
      0% {
        transform: translateX(-50%) translateY(-150px);
        opacity: 0;
      }

      100% {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    @keyframes powerCableConnect {
      0% {
        opacity: 0;
        clip-path: inset(0 0 72% 0 round 14px);
        transform: translateX(-50%) translateY(-168px) scaleY(.9);
        filter: brightness(.96);
      }

      31% {
        opacity: 1;
        clip-path: inset(0 0 72% 0 round 14px);
        transform: translateX(-50%) translateY(-36px) scaleY(.9);
      }

      62% {
        clip-path: inset(0 0 18% 0 round 14px);
        transform: translateX(-50%) translateY(-9px) scaleY(.98);
      }

      78% {
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(7px) scaleY(1.018);
        filter: brightness(1.18) drop-shadow(0 0 10px rgba(116, 219, 255, .48));
      }

      88% {
        transform: translateX(-50%) translateY(-3px) scaleY(.995);
      }

      100% {
        opacity: 1;
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(0) scaleY(1);
        filter: brightness(1);
      }
    }

    .layout-laser .bot-slot {
      top: 0;
      height: 720px
    }

    .layout-laser .left-bot {
      left: 20px
    }

    .layout-laser .right-bot {
      right: 20px
    }

    .layout-laser .bot-img {
      width: 148px;
      bottom: 0
    }

    .layout-laser .pod-img {
      display: block;
      top: 180px;
      width: 132px
    }

    .layout-laser .pod-img.visible {
      opacity: 1
    }

    .layout-clear .bot-slot {
      display: none
    }

    .target-fill {
      position: absolute;
      left: 50%;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      opacity: 0;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 3;
      transition: opacity .25s ease, filter .35s ease;
    }

    .target-fill.filled {
      opacity: 1
    }

    .target-fill.glow {
      animation: targetGlow .9s ease-in-out 2
    }

    @keyframes targetGlow {

      0%,
      100% {
        filter: brightness(1)
      }

      50% {
        filter: brightness(1.35) drop-shadow(0 0 12px rgba(88, 225, 255, .9))
      }
    }

    #shapeStage {
      position: absolute;
      left: 50%;
      top: 360px;
      width: 520px;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translate(-50%, -50%);
      z-index: 12;
      transition: opacity .28s ease, transform .28s ease;
    }

    #shapeStage.hidden {
      transform: translate(-50%, -47%)
    }

    .whole-block,
    .half-inner {
      display: block;
      max-width: none;
      filter: drop-shadow(0 12px 14px rgba(58, 88, 139, .2));
    }

    .css-square {
      background: #9B5FD9;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .css-square.whole-block,
    .css-square.half-inner {
      filter: none;
    }

    .css-square.teach-shape-glow {
      animation: teachGlowPulse 1.4s ease-in-out infinite !important;
      filter: none;
    }

    .css-square.teach-shape-glow .half-inner {
      filter: none !important;
    }

    .halves-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .half-wrap {
      position: relative;
      /* overflow:hidden removed to allow drop-shadow to trace child clip-path accurately */
      flex: 0 0 auto;
      filter: drop-shadow(0 12px 14px rgba(58, 88, 139, .18));
      transform: translateZ(0);
      background: transparent;
    }

    .half-wrap.teach-shape-glow {
      filter: none;
      animation: teachGlowPulse 1.4s ease-in-out infinite !important;
    }

    .half-wrap .half-inner {
      position: absolute;
      left: 0;
      top: 0;
    }

    #teachStage {
      position: absolute;
      inset: 0;
      z-index: 62;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050c1e;
      background-image:
        linear-gradient(rgba(0, 130, 220, .07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 130, 220, .07) 1px, transparent 1px);
      background-size: 44px 44px;
      transition: opacity .35s ease;
    }

    #teachContent {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .teach-frame {
      width: 1100px;
      height: 560px;
      display: flex;
      align-items: stretch;
      padding: 50px;
      gap: 50px;
      box-sizing: border-box;
      position: relative;
      background: url('assets/TeachingScreen.png') center/100% 100% no-repeat;
      border: none;
      box-shadow: none;
      border-radius: 34px;
    }

    .teach-frame-left {
      width: 560px;
      flex-shrink: 0;
      position: relative;
    }

    .teach-whole-section {
      position: absolute;
      left: 0;
      right: 0;
      top: 20px;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .46s ease, filter .46s ease, transform .78s cubic-bezier(.18, .89, .32, 1.18);
    }

    .teach-halves-section {
      position: absolute;
      left: 0;
      right: 0;
      top: 220px;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transform: translateY(8px) scale(.98);
      transition:
        opacity .48s ease,
        transform .7s cubic-bezier(.18, .89, .32, 1.18);
    }

    .teach-half-labels {
      display: flex;
      gap: 60px;
      justify-content: center;
    }

    .t-half-lbl {
      color: #fff;
      font-family: 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
      font-size: 28px;
      font-weight: 700;
      -webkit-text-stroke: 3px #0E60BD;
      paint-order: stroke fill;
      text-shadow: 0 0 14px rgba(0, 200, 255, 0.8), 0 2px 4px rgba(0,0,0,.5);
      white-space: nowrap;
    }

    .teach-frame-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      padding: 80px 0 110px;
    }

    /* ── Teaching shape styles ── */
    @keyframes teachGlowPulse {

      0%,
      100% {
        filter: url(#alpha-glow-teach) brightness(1) saturate(1.1);
      }

      50% {
        filter: url(#alpha-glow-teach) brightness(1.3) saturate(1.3);
      }
    }

    .teach-shape-glow {
      filter: none;
      animation: teachGlowPulse 1.4s ease-in-out infinite;
    }

    .teach-content-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 38px;
      width: 100%;
    }

    .teach-content-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
    }

    .teach-big-label,
    .teach-equal-label {
      font-family: 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
      color: #fff;
      font-size: 42px;
      line-height: 1.1;
      font-weight: 700;
      -webkit-text-stroke: 6px #0E60BD;
      paint-order: stroke fill;
      text-shadow: 0 0 14px rgba(0, 160, 249, 0.8), 0 0 20px rgba(0, 160, 249, 0.6);
      white-space: nowrap;
    }

    .teach-equal-label {
      text-align: center;
    }

    .teach-halves-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .teach-half-tags {
      display: flex;
      justify-content: space-around;
      margin-top: 5px;
    }

    .teach-half-tag {
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .3), 0 0 5px rgba(77, 202, 255, .8);
    }

    .teach-piece-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .teach-piece-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .teach-label-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 62px;
      width: 100%;
    }

    .static-glow {
      filter: url(#alpha-glow-teach) brightness(1.15) saturate(1.15) !important;
    }

    .teach-horizontal-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .teach-horizontal-pieces {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 18px;
    }

    .teach-horizontal-tags {
      display: flex;
      justify-content: center;
      gap: 60px;
    }

    .teach-horizontal-tags span {
      min-width: 80px;
      text-align: center;
    }

    /* kept for any remaining references */
    .teach-title {
      color: #fff;
      font-size: 28px;
      line-height: 1.16;
      text-shadow: 0 3px 9px rgba(0, 0, 0, .35);
    }

    .teach-title .yellow {
      color: #ffe766
    }

    .teach-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .teach-op {
      color: #fff;
      font-size: 38px;
      font-weight: 900;
      text-shadow: 0 3px 9px rgba(0, 0, 0, .35);
    }

    .teach-label {
      margin-top: 10px;
      color: #ffe766;
      font-size: 21px;
      line-height: 1.1;
      font-weight: 900;
      text-shadow: 0 3px 9px rgba(0, 0, 0, .35);
    }

    #playStage {
      position: absolute;
      inset: 0;
      width: 1280px;
      height: 720px;
      z-index: 18;
      border: 0;
      background: transparent;
      cursor: pointer;
      transition: opacity .28s ease;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    #playStage::before {
      content: "";
      position: absolute;
      inset: -18%;
      z-index: 1;
      pointer-events: none;
      opacity: .64;
      background:
        linear-gradient(116deg, transparent 16%, rgba(120, 231, 255, .24) 29%, transparent 43%),
        linear-gradient(246deg, transparent 38%, rgba(220, 148, 255, .22) 49%, transparent 62%);
      background-size: 180% 180%, 160% 160%;
      animation: playLightSweep 8s ease-in-out infinite alternate;
    }

    #playStage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .1) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, .08) 1px, transparent 1px);
      background-size: 88px 88px;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 18%, #000 82%, transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, #000 18%, #000 82%, transparent 100%);
      opacity: .22;
      animation: playGridDrift 12s linear infinite;
    }

    #playStage.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #playBg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
      animation: playBgBreath 6.5s ease-in-out infinite;
    }

    #playFx {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    #iraChar {
      position: absolute;
      width: 252px;
      height: auto;
      left: 238px;
      top: 91px;
      transform: translateX(1200px);
      pointer-events: none;
      z-index: 5;
      filter: drop-shadow(0 18px 18px rgba(31, 71, 139, .18));
      transform-origin: 50% 92%;
    }

    #iraChar.play-idle {
      animation: iraBreath 2.8s ease-in-out infinite;
    }

    #iraGlowRing {
      position: absolute;
      left: 363px;
      top: 620px;
      width: 166px;
      height: 34px;
      border-radius: 50%;
      transform: translateX(-50%) scale(.82);
      opacity: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse, rgba(112, 232, 255, .48) 0 24%, rgba(112, 232, 255, .2) 48%, transparent 72%);
      filter: blur(1px);
    }

    #iraGlowRing.show {
      animation: iraGlowSettle .7s ease-out both, iraShadowFloat 2.8s ease-in-out .72s infinite;
    }

    #playBtnImg {
      position: absolute;
      width: 346px;
      height: auto;
      left: 693px;
      top: 527px;
      opacity: 0;
      transform: scale(0.85) translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(.34, 1.3, .64, 1);
      pointer-events: none;
      z-index: 6;
      filter: drop-shadow(0 0 0 rgba(77, 202, 255, 0));
      transform-origin: 50% 58%;
    }

    #playBtnImg.play-ready {
      animation: playButtonBreathe 1.7s ease-in-out infinite,
                 playButtonGlow 1.7s ease-in-out infinite;
    }

    #playStage:not(.hidden):hover #playBtnImg.play-ready {
      filter: drop-shadow(0 0 50px rgba(255, 165, 40, 1)) drop-shadow(0 0 24px rgba(255, 255, 255, .9));
    }

    .play-particle {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 3px;
      opacity: 0;
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 0 10px rgba(109, 224, 255, .78);
      transform: translate3d(0, 0, 0) rotate(var(--r));
      animation: playParticleFloat var(--dur) ease-in-out var(--delay) infinite;
    }

    @keyframes playLightSweep {
      0% {
        transform: translate3d(-2%, -1%, 0);
        background-position: 0% 50%, 100% 50%;
      }

      100% {

      } catch (e) { }
    }
    function audioSceneIsReadyRound(round) {
      return state && FLOW[state.step] && FLOW[state.step].scene === "ready" && state.round === round;
    }
    function buildPlugConnectMediaSrc() {
      if (_plugConnectMediaSrc) { return _plugConnectMediaSrc; }
      var rate = 22050;
      var duration = 0.28;
      var samples = Math.floor(rate * duration);
      var dataSize = samples * 2;
      var bytes = [];
      function pushText(text) {
        for (var i = 0; i < text.length; i++) { bytes.push(text.charCodeAt(i)); }
      }
      function push16(value) {
        bytes.push(value & 255, (value >> 8) & 255);
      }
      function push32(value) {
        bytes.push(value & 255, (value >> 8) & 255, (value >> 16) & 255, (value >> 24) & 255);
      }
      pushText("RIFF");
      push32(36 + dataSize);
      pushText("WAVEfmt ");
      push32(16);
      push16(1);
      push16(1);
      push32(rate);
      push32(rate * 2);
      push16(2);
      push16(16);
      pushText("data");
      push32(dataSize);
      for (var s = 0; s < samples; s++) {
        var t = s / rate;
        var value = 0;
        if (t < 0.075) {
          var clickEnv = Math.pow(1 - t / 0.075, 2.2);
          var clickFreq = 200 + (150 * t / 0.075);
          value += (Math.sin(2 * Math.PI * clickFreq * t) > 0 ? 1 : -1) * 0.24 * clickEnv;
        }
        if (t > 0.045 && t < 0.16) {
          var sparkT = (t - 0.045) / 0.115;
          var sparkEnv = Math.sin(Math.PI * sparkT);
          value += Math.sin(2 * Math.PI * (1060 + 720 * sparkT) * t) * 0.16 * sparkEnv;
        }
        if (t > 0.12 && t < 0.24) {
          var chirpT = (t - 0.12) / 0.12;
          var chirpEnv = Math.sin(Math.PI * chirpT);
          value += Math.sin(2 * Math.PI * (440 + 420 * chirpT) * t) * 0.18 * chirpEnv;
        }
        value = Math.max(-0.9, Math.min(0.9, value));

      for (var b = 0; b < bytes.length; b += 8192) {

      }

    }

        master.gain.exponentialRampToValueAtTime(0.42, now + 0.08);
        master.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

          g.gain.exponentialRampToValueAtTime(vol, now + delay + 0.04);
          g.gain.exponentialRampToValueAtTime(0.001, now + delay + dur);

          g.connect(master);
          o.start(now + delay);
          o.stop(now + delay + dur + 0.03);

          var data = buffer.getChannelData(0);

          g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.09);

          src.connect(hp);
          hp.connect(g);

    function stopIdleHint() {

    function idleHintDirection() {
      var r = currentRound();
      if (!r) return null;
      var cur = state.angle;
      var targets = [r.targetAngle];
      if (r.targetAngle2 !== undefined) { targets.push(r.targetAngle2); }
      var bestRight = Infinity, bestLeft = Infinity;
      targets.forEach(function (t) {
        var rightSteps = ((t - cur + 360) % 360) / 45;
        var leftSteps = ((cur - t + 360) % 360) / 45;
        if (rightSteps < bestRight) { bestRight = rightSteps; }
        if (leftSteps < bestLeft) { bestLeft = leftSteps; }
      });
      if (bestRight === 0 || bestLeft === 0) { return null; } /* already aligned — let cut do its thing */
      return bestLeft < bestRight ? "left" : "right";
    }

    function startIdleHint() {
      stopIdleHint();

    function setupBots(layout, options) {
      var r = currentRound();
      options = options || {};
      var shouldAnimateConnection = layout === "layout-ready" && options.connect === true;
      els.bots.className = layout + (shouldAnimateConnection ? " power-connecting" : layout === "layout-ready" ? " power-connected" : "");
      els.leftBot.src = r.sadBot;
      els.rightBot.src = r.sadBot;
      els.leftPod.src = r.podLeft || r.pod;
      els.rightPod.src = r.podRight || r.pod;
      els.leftBot.style.width = (layout === "layout-intro" ? r.botWIntro : r.botWReady) + "px";
      els.rightBot.style.width = (layout === "layout-intro" ? r.botWIntro : r.botWReady) + "px";
      var podTopLeft = podTopForRound(r, layout, "left");
      var podTopRight = podTopForRound(r, layout, "right");
      var podW = r.podW || 132;
      var leftSlotEl = els.leftBot.parentNode;
      var rightSlotEl = els.rightBot.parentNode;
      var leftAspect = r.podAspectLeft || 2.3;
      var rightAspect = r.podAspectRight || r.podAspectLeft || 2.3;
      leftSlotEl.style.setProperty("--power-spark-top", (podTopLeft + podW * leftAspect - (r.chargerOverlap || 14) + 8) + "px");
      rightSlotEl.style.setProperty("--power-spark-top", (podTopRight + podW * rightAspect - (r.chargerOverlap || 14) + 8) + "px");
      els.leftPod.style.top = podTopLeft + "px";
      els.rightPod.style.top = podTopRight + "px";
      els.leftPod.style.width = podW + "px";
      els.rightPod.style.width = podW + "px";
      els.leftBot.className = "bot-img";
      els.rightBot.className = "bot-img";
      els.leftPod.className = "pod-img";
      els.rightPod.className = "pod-img";
      clearTargetFills();
      setupTargetSlots(r, layout);
      if (layout === "layout-ready") {
        els.leftPod.classList.add("visible");
        els.rightPod.classList.add("visible");
        if (shouldAnimateConnection && !state.plugConnectPlayed[state.round]) {
          var plugRound = state.round;
          later(function () { sndPlugConnect(plugRound); }, 1560);
        }
      }
      if (layout === "layout-laser") {
        els.leftPod.classList.add("visible");
        els.rightPod.classList.add("visible");
      }
    }

    function clearTargetFills() {
      [els.leftFill, els.rightFill].forEach(function (fill) {
        if (!fill) { return; }
        fill.innerHTML = "";
        fill.className = "target-fill";
        fill.style.clipPath = "";
        fill.style.borderRadius = "";
      });
    }

    function podTopForRound(r, layout, side) {
      if (layout !== "layout-laser" && layout !== "layout-ready") {
        return 0;
      }
      var botW = r.botWReady;
      var botTop = 720 - botW * (r.botAspect || 1.2);
      var podW = r.podW || 132;
      var podAspect = side === "right" ? (r.podAspectRight || r.podAspectLeft || 2.3) : (r.podAspectLeft || 2.3);
      return botTop - podW * podAspect + (r.chargerOverlap || 14);
    }

    function targetSlotSizeForRound(r) {
      if (r.name === "circle") {
        return { width: 142, height: 68 };
      }
      if (r.name === "square") {
        return { width: 116, height: 116 };
      }
      return { width: 100, height: 100 };
    }

    function targetSlotOffsetForRound(r, side) {
      if (r.name === "circle") {
        return side === "right" ? 20 : 17;
      }
      if (r.name === "square") {
        return side === "right" ? 17 : 0;
      }
      return 6;
    }

    function targetSlotXOffsetForRound(r, side) {
      if (r.name === "square") {
        return side === "right" ? -8 : 3;
      }
      return 0;
    }

    function visualFitScaleForRound(r) {
      if (r.name === "circle") {
        return 1;
      }
      if (r.name === "square") {
        return 0.84;
      }
      return 0.92;
    }

    function setupTargetSlots(r, layout) {
      var podTopLeft = podTopForRound(r, layout, "left");
      var podTopRight = podTopForRound(r, layout, "right");
      var slotSize = targetSlotSizeForRound(r);
      /* Slot dimensions calibrated to the visual hollow in each pod image.
         Circle pod (160px wide): inset semicircle slot = 142px x 68px.
         Triangle round uses a centered 116px box plus a tighter fitted-piece inset.
         Rectangle round uses a smaller centered slot to stay inside the dark hollow art. */
      var width = slotSize.width;
      var height = slotSize.height;
      els.leftPod.style.marginLeft = "0px";
      els.rightPod.style.marginLeft = "0px";

      [
        { fill: els.leftFill, side: "left", top: podTopLeft + targetSlotOffsetForRound(r, "left") },
        { fill: els.rightFill, side: "right", top: podTopRight + targetSlotOffsetForRound(r, "right") }
      ].forEach(function (item) {
        var fill = item.fill;
        fill.style.top = item.top + "px";
        fill.style.width = width + "px";
        fill.style.height = height + "px";

        /* Keep the fill centered; the fitted piece applies the round-specific visual inset. */
        fill.style.left = "50%";
        fill.style.transform = "translateX(-50%)";
        fill.style.marginLeft = targetSlotXOffsetForRound(r, item.side) + "px";
        fill.style.marginTop = "0px";

        /* No clip-path or border-radius on the fill container — the piece inside has its own
           clip-path from pieceGeometry, and circle images use natural transparency for the arc shape. */
        fill.style.borderRadius = "";
        fill.style.clipPath = "";
      });
    }

    function makeBlock(r, width, height) {
      if (r.blockSrc) {
        var img = document.createElement("img");
        img.src = r.blockSrc;
        img.className = "whole-block";
        img.style.width = width + "px";
        img.style.height = height + "px";
        if (r.name === "circle") {
          img.style.borderRadius = "50%";
        }
        return img;
      }
      var square = document.createElement("div");
      square.className = "whole-block css-square";
      square.style.width = width + "px";
      square.style.height = height + "px";
      return square;
    }

    function normalizedAngle(angle) {
      return ((angle % 360) + 360) % 360;
    }

    function lineAngleDegrees(angle) {
      var snap = Math.round((normalizedAngle(angle) % 180) / 45) * 45;
      return snap === 180 ? 0 : snap;
    }

    function canonicalCutAngle(r) {
      if (r.cut === "horizontal") { return 0; }
      if (r.cut === "diagonal") { return 45; }
      return 90;
    }

    function cutOrientation(angle) {
      var snap = lineAngleDegrees(angle);
      if (snap === 0) { return "horizontal"; }
      if (snap === 90) { return "vertical"; }
      if (snap === 45) { return "backslash"; }
      return "slash";
    }

    function lineSideForPiece(orientation, index) {
      if (orientation === "horizontal") {
        return index === 0 ? 1 : -1;
      }
      if (orientation === "backslash") {
        return index === 0 ? 1 : -1;
      }
      return index === 0 ? -1 : 1;
    }

    function clipPolygon(points, width, height, angle, keepSign) {
      var rad = lineAngleDegrees(angle) * Math.PI / 180;
      var dx = Math.cos(rad);
      var dy = Math.sin(rad);
      var cx = width / 2;
      var cy = height / 2;
      var eps = 0.001;

      function side(p) {
        return (p.x - cx) * dy - (p.y - cy) * dx;
      }
      function inside(s) {
        return keepSign > 0 ? s >= -eps : s <= eps;
      }
      function intersect(a, b, sa, sb) {
        var t = sa / (sa - sb);
        return {
          x: a.x + (b.x - a.x) * t,
          y: a.y + (b.y - a.y) * t
        };
      }

      var output = [];
      for (var i = 0; i < points.length; i++) {
        var current = points[i];
        var prev = points[(i + points.length - 1) % points.length];
        var currentSide = side(current);
        var prevSide = side(prev);
        var currentInside = inside(currentSide);
        var prevInside = inside(prevSide);

        if (currentInside) {
          if (!prevInside) {
            output.push(intersect(prev, current, prevSide, currentSide));
          }
          output.push(current);
        } else if (prevInside) {
          output.push(intersect(prev, current, prevSide, currentSide));
        }
      }

      return output.filter(function (p, index, arr) {
        var prev = arr[(index + arr.length - 1) % arr.length];
        return Math.abs(p.x - prev.x) > eps || Math.abs(p.y - prev.y) > eps;
      });
    }

    function pieceGeometry(width, height, angle, index) {
      var orientation = cutOrientation(angle);
      var rect = [
        { x: 0, y: 0 },
        { x: width, y: 0 },
        { x: width, y: height },
        { x: 0, y: height }
      ];
      var polygon = clipPolygon(rect, width, height, angle, lineSideForPiece(orientation, index));

      if (polygon.length < 3) {
        polygon = rect;
      }

      var minX = Math.min.apply(null, polygon.map(function (p) { return p.x; }));
      var minY = Math.min.apply(null, polygon.map(function (p) { return p.y; }));
      var maxX = Math.max.apply(null, polygon.map(function (p) { return p.x; }));
      var maxY = Math.max.apply(null, polygon.map(function (p) { return p.y; }));
      var boxW = Math.max(1, maxX - minX);
      var boxH = Math.max(1, maxY - minY);
      var clip = polygon.map(function (p) {
        var x = ((p.x - minX) / boxW * 100).toFixed(3).replace(/\.?0+$/, "");
        var y = ((p.y - minY) / boxH * 100).toFixed(3).replace(/\.?0+$/, "");
        return x + "% " + y + "%";
      }).join(",");
      var clipInner = polygon.map(function (p) {
        var x = (p.x / width * 100).toFixed(3).replace(/\.?0+$/, "");
        var y = (p.y / height * 100).toFixed(3).replace(/\.?0+$/, "");
        return x + "% " + y + "%";
      }).join(",");
      var absPolygon = polygon.map(function (p) {
        return p.x + "," + p.y;
      }).join(" ");

      return {
        minX: minX,
        minY: minY,
        width: boxW,
        height: boxH,
        clip: "polygon(" + clip + ")",
        absPolygon: absPolygon,
        clipInner: "polygon(" + clipInner + ")",
        orientation: orientation
      };
    }

    function cutPieceSize(width, height, angle, index) {
      var g = pieceGeometry(width, height, angle, index || 0);
      return { width: g.width, height: g.height };
    }

    function cutPieceHome(width, height, angle, index, centerX, centerY) {
      var g = pieceGeometry(width, height, angle, index);
      var left = centerX - width / 2 + g.minX;
      var top = centerY - height / 2 + g.minY;
      return {
        left: left,
        top: top,
        centerX: left + g.width / 2,
        centerY: top + g.height / 2,
        width: g.width,
        height: g.height
      };
    }

    /* Maps slot index (0=left, 1=right) to the correct piece index for that round.
       Circle: piece 0=top-half(dome) goes to right pod, piece 1=bottom-half(bowl) goes to left pod.
       Square: piece 0=upper-right goes to right pod, piece 1=lower-left goes to left pod (45° cut).
       Rectangle: piece index matches slot index directly. */
    function pieceIndexForSlot(r, slotIndex) {
      if (r.name === "circle") {
        return slotIndex === 0 ? 1 : 0;
      }
      if (r.name === "square") {
        return slotIndex === 0 ? 1 : 0;
      }
      return slotIndex;
    }

    function makeCutPiece(r, index, width, height, angle) {
      var g = pieceGeometry(width, height, angle, index);
      var wrap = document.createElement("div");
      wrap.className = "half-wrap";
      wrap.style.width = g.width + "px";
      wrap.style.height = g.height + "px";
      /* Remove clipPath from wrap so drop-shadow works correctly on its children */

      if (r.blockSrc) {
        /* Bypass CSS clip-path Chromium bugs by rendering the clipped image as a true SVG */
        var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", width);
        svg.setAttribute("height", height);
        svg.style.position = "absolute";
        svg.style.left = (-g.minX) + "px";
        svg.style.top = (-g.minY) + "px";
        svg.style.overflow = "visible";
        svg.classList.add("half-inner");

        var clipId = "clip-" + Math.random().toString(36).substr(2, 9);
        var defs = "<defs><clipPath id=\"" + clipId + "\"><polygon points=\"" + g.absPolygon + "\" /></clipPath>";
        var gNode = "<g>";

        if (r.name === "circle") {
          var circleClipId = "circleClip-" + Math.random().toString(36).substr(2, 9);
          defs += "<clipPath id=\"" + circleClipId + "\"><circle cx=\"" + (width / 2) + "\" cy=\"" + (height / 2) + "\" r=\"" + (width / 2) + "\" /></clipPath>";
          gNode = "<g clip-path=\"url(#" + circleClipId + ")\">";
        }
        defs += "</defs>";

        var imgNode = "<image href=\"" + r.blockSrc + "\" width=\"" + width + "\" height=\"" + height + "\" clip-path=\"url(#" + clipId + ")\" preserveAspectRatio=\"none\" />";
        svg.innerHTML = defs + gNode + imgNode + "</g>";
        wrap.appendChild(svg);
      } else {
        /* Fallback for css-square which has no blockSrc */
        var inner = makeBlock(r, width, height);
        inner.classList.add("half-inner");
        inner.style.filter = "none";
        inner.style.borderRadius = "0";
        inner.style.left = (-g.minX) + "px";
        inner.style.top = (-g.minY) + "px";
        inner.style.clipPath = g.clipInner;
        wrap.appendChild(inner);
      }
      return wrap;
    }

    function makeHalf(r, index, width, height) {
      return makeCutPiece(r, index, width, height, canonicalCutAngle(r));
    }

    function renderWhole(glow) {
      var r = currentRound();
      els.shapeStage.innerHTML = "";
      var block = makeBlock(r, r.blockW, r.blockH);
      if (glow) block.classList.add("static-glow");
      els.shapeStage.appendChild(block);
      show(els.shapeStage);
    }

    function renderHalves(target, size) {
      var r = currentRound();
      var width = size && size.width ? size.width : r.blockW;
      var height = size && size.height ? size.height : r.blockH;
      var row = document.createElement("div");
      row.className = "halves-row";
      row.appendChild(makeHalf(r, 0, width, height));
      row.appendChild(makeHalf(r, 1, width, height));
      target.innerHTML = "";
      target.appendChild(row);
    }

    function makeTeachingPieces(r, angle, width, height) {
      var orientation = cutOrientation(angle);
      var gap = 30;
      var pad = gap + 10; /* extra room for pieces sliding out */
      var lblH = 38; /* space for "Half" label below pieces */

      var g0 = pieceGeometry(width, height, angle, 0);
      var g1 = pieceGeometry(width, height, angle, 1);

      /* Expanded container so pieces don't clip when they slide apart */
      var cW = width + pad * 2;
      var cH = height + pad * 2 + lblH;

      var box = document.createElement("div");
      box.className = "teach-halves-box";

      var container = document.createElement("div");
      container.style.cssText = "position:relative;width:" + cW + "px;height:" + cH + "px;";

      var h0 = makeCutPiece(r, 0, width, height, angle);
      var h1 = makeCutPiece(r, 1, width, height, angle);
      h0.classList.add("teach-shape-glow", "teach-pop");
      h1.classList.add("teach-shape-glow", "teach-pop", "teach-pop-d1");
      h0.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
      h1.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";

      /* Offset pieces into padded container center */
      h0.style.position = "absolute";
      h0.style.left = (g0.minX + pad) + "px";
      h0.style.top = (g0.minY + pad) + "px";
      h1.style.position = "absolute";
      h1.style.left = (g1.minX + pad) + "px";
      h1.style.top = (g1.minY + pad) + "px";

      h0.dataset.gapX = "0"; h0.dataset.gapY = "0";
      h1.dataset.gapX = "0"; h1.dataset.gapY = "0";

      if (orientation === "slash") {
        h0.dataset.gapX = -gap; h0.dataset.gapY = -gap;
        h1.dataset.gapX = gap; h1.dataset.gapY = gap;
      } else if (orientation === "backslash") {
        h0.dataset.gapX = gap; h0.dataset.gapY = -gap;
        h1.dataset.gapX = -gap; h1.dataset.gapY = gap;
      } else if (orientation === "vertical") {
        h0.dataset.gapX = -gap; h0.dataset.gapY = 0;
        h1.dataset.gapX = gap; h1.dataset.gapY = 0;
      } else if (orientation === "horizontal") {
        h0.dataset.gapX = 0; h0.dataset.gapY = -gap;
        h1.dataset.gapX = 0; h1.dataset.gapY = gap;
      }

      function polygonPoints(g) {
        return g.absPolygon.split(" ").map(function (pair) {
          var xy = pair.split(",");
          return { x: parseFloat(xy[0]), y: parseFloat(xy[1]) };
        });
      }

      function polygonCentroid(points) {
        var area = 0;
        var cx = 0;
        var cy = 0;
        for (var i = 0; i < points.length; i++) {
          var p0 = points[i];
          var p1 = points[(i + 1) % points.length];
          var cross = p0.x * p1.y - p1.x * p0.y;
          area += cross;
          cx += (p0.x + p1.x) * cross;
          cy += (p0.y + p1.y) * cross;
        }
        area *= 0.5;
        if (Math.abs(area) < 0.001) {
          return points.reduce(function (acc, p) {
            acc.x += p.x / points.length;
            acc.y += p.y / points.length;
            return acc;
          }, { x: 0, y: 0 });
        }
        return { x: cx / (6 * area), y: cy / (6 * area) };
      }

      function teachingHalfLabelPosition(g, piece, index) {
        var points = polygonPoints(g);
        var centroid = polygonCentroid(points);
        var dx = parseFloat(piece.dataset.gapX || "0");
        var dy = parseFloat(piece.dataset.gapY || "0");
        var maxX = Math.max.apply(null, points.map(function (p) { return p.x; }));
        var bottom = Math.max.apply(null, points.map(function (p) { return p.y; }));
        var labelGap = (orientation === "slash" || orientation === "backslash") ? 20 : 10;
        if (r.cut === "diagonal" && orientation === "backslash" && index === 0) {
          return {
            x: pad + maxX + dx + 36,
            y: pad + centroid.y + dy + 8
          };
        }
        return {
          x: pad + centroid.x + dx,
          y: pad + bottom + dy + labelGap
        };
      }

      /* Labels follow each clipped polygon, not its bounding box. This matters for diagonal triangles. */
      var lbl0 = teachingHalfLabelPosition(g0, h0, 0);
      var lbl1 = teachingHalfLabelPosition(g1, h1, 1);

      function makeHalfLabel(pos) {
        var lbl = document.createElement("span");
        lbl.className = "t-half-lbl";
        lbl.textContent = "Half";
        lbl.style.cssText = "position:absolute;left:" + pos.x + "px;top:" + pos.y + "px;" +
          "transform:translateX(-50%) translateY(8px);opacity:0;" +
          "transition:opacity .5s ease,transform .5s ease;";
        return lbl;
      }

      var halfLbl0 = makeHalfLabel(lbl0);
      var halfLbl1 = makeHalfLabel(lbl1);

      container.appendChild(h0);
      container.appendChild(h1);
      container.appendChild(halfLbl0);
      container.appendChild(halfLbl1);
      box.appendChild(container);

      box._halfLabels = [halfLbl0, halfLbl1];
      box._pieces = [h0, h1];
      return box;
    }

    function renderTeaching(kind, angle, equal, onNext) {

      var halvesSection = document.createElement("div");

      /* ── Right column ── */
      var rightCol = document.createElement("div");

      lblWhole.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";

      lblWhole.appendChild(lblWholeText);
      rightCol.appendChild(lblWhole);

      var lblEqual = document.createElement("div");
      lblEqual.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";

      /* Step 1: whole block fades in at top position */
      later(function () {

      }, TIMING.TEACH_WHOLE_IN);

      later(function () {
        lblWhole.style.opacity = "1";
        lblWhole.style.transform = "translateY(0)";
      }, TIMING.TEACH_LABEL_IN);

      later(function () {
        /* Whole block descends to halves position */
        wholeSection.style.transform = "translateY(230px) scale(.97)";
      }, TIMING.TEACH_MOVE_DOWN);

      /* Step 5: whole fades out, halves fade in at the same Y position */
      later(function () {
        wholeSection.style.opacity = "0";
        halvesSection.style.opacity = "1";
        halvesSection.style.transform = "translateY(0) scale(1)";
        var pieces = halvesBox._pieces || [];
        requestAnimationFrame(function () {
          pieces.forEach(function (p) {
            p.style.transform = "translate(" + p.dataset.gapX + "px," + p.dataset.gapY + "px)";
          });
        });
      }, TIMING.TEACH_SPLIT);

      later(function () {
        (halvesBox._halfLabels || []).forEach(function (lbl) {
          lbl.style.opacity = "1";
          lbl.style.transform = "translateX(-50%) translateY(0)";

        lblEqual.style.transform = "translateY(0)";

    function renderStep() {
      clearTimers();
      resetScene();
      playScreenFade();

      var r = currentRound();
      var step = FLOW[state.step];
      var text = step.text ? step.text.replace("{shape}", r.name) : "";
      if (state.round > 0) {
        if (step.scene === "intro" || step.scene === "needs" || step.scene === "halves") {
          nextStep();
          return;
        }
        if (step.scene === "ready") {
          text = "Let us charge these bots now.";
        }
        if (step.scene === "whole") {
          text = "Cut the block into two equal parts.";
        }
        if (step.scene === "preplay") {
          text = "Make sure both parts fit into the slots.";
        }
      }

      if (step.scene === "intro") {
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-intro");
      }

      if (step.scene === "ready") {
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-ready", { connect: true });
      }

      if (step.scene === "whole" || step.scene === "needs" || step.scene === "halves") {
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-ready");
        renderWhole(step.scene === "whole");
      }

      if (step.scene === "play") {
        if (state.round > 0) { nextStep(); return; }
        setInstruction("");
        setupBots("layout-clear");
        /* reset Ira & play button to initial off-screen/hidden state */
        els.iraChar.style.transition = "none";
        els.iraChar.classList.remove("play-idle");
        els.iraChar.style.transform = "translateX(1200px)";
        els.iraGlowRing.classList.remove("show");
        els.playBtnImg.classList.remove("play-ready");
        els.playBtnImg.style.opacity = "0";
        els.playBtnImg.style.transform = "scale(0.85) translateY(16px)";
        seedPlayMagic();
        show(els.playStage);
        /* Ira enters from right in a single smooth motion */
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            els.iraChar.style.transition = "transform 0.72s cubic-bezier(0.25, 1.1, 0.4, 1)";
            els.iraChar.style.transform = "translateX(0)";
            later(function () { els.iraGlowRing.classList.add("show"); }, 680);
          });
        });
        /* phase 3: play button pops in */
        later(function () {
          els.playBtnImg.style.opacity = "1";
          els.playBtnImg.style.transform = "scale(1) translateY(0)";
        }, 820);
        later(function () {
          els.iraChar.style.transition = "";
          els.iraChar.classList.add("play-idle");
          els.playBtnImg.classList.add("play-ready");
        }, 1240);
      }

      if (step.scene === "tutorial") {
        if (state.round > 0) {
          nextStep();
          return;
        }
        setupTutorial();
        return;
      }

      if (step.scene === "preplay") {
        setupPreplay(text);
      }

      if (step.scene === "laser") {
        setupLaser();
        return;
      }

      if (step.duration) {
        later(nextStep, step.duration);
      }
    }

    function nextStep() {
      state.step++;
      if (state.step >= FLOW.length) {
        state.step = FLOW.length - 1;

    /* ── Tutorial guided sequence (4 moves × 4 cuts demo) ── */

    /* ── Orbital laser system — all geometry is anchored to the ring and nozzle. ── */
    var MACHINE_NATIVE_SIZE = 1454;
    var RING_INNER_R_NATIVE = 488;

    var LASER_SRC_W = 258;
    var LASER_SRC_H = 172;
    var LASER_W = 96;
    var LASER_H = 64;
    /* Source-pixel anchors in Laser.png: rear body pivot and glowing emission point. */
    var LASER_BODY_SRC_X = 42;
    var LASER_BODY_SRC_Y = 86;
    var LASER_NOZZLE_SRC_X = 238;
    var LASER_NOZZLE_SRC_Y = 86;

    var BEAM_NATIVE_SIZE = 683;
    var BEAM_START_NATIVE = 98.8398;
    var BEAM_END_NATIVE = 583.34;
    var BEAM_START_PCT = BEAM_START_NATIVE / BEAM_NATIVE_SIZE;
    var BEAM_LINE_PCT = (BEAM_END_NATIVE - BEAM_START_NATIVE) / BEAM_NATIVE_SIZE;

    function ringGeometry() {
      var w = els.machineStage.clientWidth || 900;
      var styles = getComputedStyle(els.machineStage);
      var ringSize = parseFloat(styles.getPropertyValue("--ring-size")) || 500;
      var centerY = parseFloat(styles.getPropertyValue("--ring-center-y")) || ringSize / 2;
      var ringScale = ringSize / MACHINE_NATIVE_SIZE;
      return {
        centerX: w / 2,
        centerY: centerY,
        radius: RING_INNER_R_NATIVE * ringScale
      };
    }

    function laserAnchors(deg) {
      var g = ringGeometry();
      var orbitRad = deg * Math.PI / 180;
      var beamRad = orbitRad + Math.PI;
      var laserScale = LASER_W / LASER_SRC_W;
      var bodyLocalX = LASER_BODY_SRC_X * laserScale;
      var bodyLocalY = LASER_BODY_SRC_Y * laserScale;
      var nozzleLocalX = LASER_NOZZLE_SRC_X * laserScale;
      var nozzleLocalY = LASER_NOZZLE_SRC_Y * laserScale;
      var bodyOffset = nozzleLocalX - bodyLocalX;

      var orbitX = g.centerX + g.radius * Math.cos(orbitRad);
      var orbitY = g.centerY + g.radius * Math.sin(orbitRad);
      var laserX = orbitX - Math.cos(beamRad) * bodyOffset;
      var laserY = orbitY - Math.sin(beamRad) * bodyOffset;

      return {
        nozzleX: orbitX,
        nozzleY: orbitY,
        bodyX: laserX,
        bodyY: laserY,
        bodyLocalX: bodyLocalX,
        bodyLocalY: bodyLocalY,
        nozzleLocalX: nozzleLocalX,
        nozzleLocalY: nozzleLocalY,
        rotationDeg: deg + 180,
        radius: g.radius
      };
    }

    function positionLaser(deg) {
      var p = laserAnchors(deg);
      els.laserImg.style.left = (p.bodyX - p.bodyLocalX) + "px";
      els.laserImg.style.top = (p.bodyY - p.bodyLocalY) + "px";
      els.laserImg.style.transformOrigin = p.bodyLocalX + "px " + p.bodyLocalY + "px";
      els.laserImg.style.transform = "rotate(" + p.rotationDeg + "deg)";
    }

    function positionBeam(deg) {
      var p = laserAnchors(deg);
      var beamLength = p.radius * 1.72;
      var beamSize = beamLength / BEAM_LINE_PCT;
      var startPx = BEAM_START_PCT * beamSize;
      els.beamImg.style.width = beamSize + "px";
      els.beamImg.style.height = beamSize + "px";
      els.beamImg.style.left = (p.nozzleX - startPx) + "px";
      els.beamImg.style.top = (p.nozzleY - startPx) + "px";
      els.beamImg.style.transformOrigin = startPx + "px " + startPx + "px";
      /* Beam.svg points 45° by default; deg + 135° aims it from nozzle to center. */
      els.beamImg.style.transform = "rotate(" + (deg + 135) + "deg)";
      els.wrongSlash.style.setProperty("--cut-angle", deg + "deg");
      els.cutLine.style.setProperty("--cut-angle", deg + "deg");
    }

    function showBeam(deg) {
      positionBeam(deg);
      els.beamImg.style.display = "block";
      els.beamImg.style.opacity = "1";
    }

    function showCutLine(deg) {
      els.cutLine.style.setProperty("--cut-angle", deg + "deg");
      els.cutLine.classList.add("show");
    }

    function hideBeam() {
      els.beamImg.style.opacity = "0";
      setTimeout(function () {
        if (els.beamImg.style.opacity === "0") { els.beamImg.style.display = "none"; }
      }, 220);
    }

    function _animateOrbit() {
      if (!state.orbitActive) { return; }
      var diff = state.orbitTarget - state.orbitCurrent;
      /* shortest-arc wraparound */
      if (diff > 180) { diff -= 360; }
      if (diff < -180) { diff += 360; }
      state.orbitCurrent += diff * 0.18;
      positionLaser(state.orbitCurrent);
      if (Math.abs(diff) > 0.3) {
        state.orbitRaf = requestAnimationFrame(_animateOrbit);
      } else {
        state.orbitCurrent = state.orbitTarget;
        positionLaser(state.orbitCurrent);
        state.orbitRaf = null;
      }
    }

    function snapLaser(deg) {
      if (state.orbitRaf) { cancelAnimationFrame(state.orbitRaf); state.orbitRaf = null; }
      state.orbitCurrent = deg;
      state.orbitTarget = deg;
      positionLaser(deg);
    }

    function updateLaser() {
      state.orbitTarget = state.angle;
      if (!state.orbitActive) { return; }
      if (state.orbitRaf) { cancelAnimationFrame(state.orbitRaf); state.orbitRaf = null; }
      state.orbitRaf = requestAnimationFrame(_animateOrbit);
    }

    function showLaserHead() {
      els.laserImg.style.display = "block";
      /* beam stays hidden until CUT */
      els.beamImg.style.display = "none";
      els.cutLine.classList.remove("show");
    }

    function pressButton(button) {
      button.classList.remove("pressed");
      void button.offsetWidth;
      button.classList.add("pressed");

      if (button === els.hitLeft) {
        els.btnLeft.src = ASSETS + "LeftButtonClicked.png";
        setTimeout(function () { els.btnLeft.src = ASSETS + "LeftButton.png"; }, 220);
      } else if (button === els.hitRight) {
        els.btnRight.src = ASSETS + "RightButtonClicked.png";
        setTimeout(function () { els.btnRight.src = ASSETS + "RightButton.png"; }, 220);
      } else if (button === els.hitCut) {
        els.btnCut.src = ASSETS + "ClickedCutButton.png";
        setTimeout(function () { els.btnCut.src = ASSETS + "CutButton.png"; }, 320);
      }
    }

    function rotateLaser(delta, button) {
      if (state.locked) { return; }
      stopIdleHint();
      pressButton(button);
      sndRotate();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      state.angle = (state.angle + delta + 360) % 360;
      updateLaser();
      startIdleHint();
    }

    function angleDiff(a, b) {
      var diff = Math.abs(a - b) % 360;
      return diff > 180 ? 360 - diff : diff;
    }

    function wrongPieceClip(angle, index) {
      var normalized = ((angle % 360) + 360) % 360;
      var diagonalDown = (normalized > 90 && normalized < 270);
      if (diagonalDown) {
        return index === 0 ? "polygon(0 0,100% 0,100% 100%)" : "polygon(0 0,0 100%,100% 100%)";
      }
      return index === 0 ? "polygon(0 0,100% 0,0 100%)" : "polygon(100% 0,100% 100%,0 100%)";
    }

    function machineCenterInGame() {
      var styles = getComputedStyle(els.machineStage);
      var top = parseFloat(styles.top) || 425;
      var height = els.machineStage.clientHeight || 600;
      var centerY = parseFloat(styles.getPropertyValue("--ring-center-y")) || 250;
      return {
        x: 640,
        y: top - height / 2 + centerY
      };
    }

    function slotTargetsFromFills() {
      var leftW = parseFloat(els.leftFill.style.width || "0");
      var leftH = parseFloat(els.leftFill.style.height || "0");
      var rightW = parseFloat(els.rightFill.style.width || "0");
      var rightH = parseFloat(els.rightFill.style.height || "0");
      var leftX = 150 + parseFloat(els.leftFill.style.marginLeft || "0");
      var rightX = 1130 + parseFloat(els.rightFill.style.marginLeft || "0");
      var leftY = parseFloat(els.leftFill.style.top || "0") + leftH / 2;
      var rightY = parseFloat(els.rightFill.style.top || "0") + rightH / 2;
      return [
        { x: leftX, y: leftY, width: leftW, height: leftH },
        { x: rightX, y: rightY, width: rightW, height: rightH }
      ];
    }

    function cutBlock() {
      if (state.locked) { return; }
      stopIdleHint();
      var r = currentRound();
      state.locked = true;
      state.lastCutAngle = state.angle;
      pressButton(els.hitCut);
      sndCut();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      showBeam(state.angle); /* Beam.svg fires on CUT — was hidden during alignment */

      later(function () {
        hideBeam();
        var correct = angleDiff(state.angle, r.targetAngle) <= 8 ||
          (r.targetAngle2 !== undefined && angleDiff(state.angle, r.targetAngle2) <= 8);
        if (correct) {
          state.lastCutAngle = state.angle;
          showSuccess();
        } else {
          showFail();
        }
      }, 650);
    }

    function slotScaleForPiece(target, piece) {
      return Math.min(
        (target.width || piece.width) / piece.width,
        (target.height || piece.height) / piece.height
      );
    }

    function fillSlotWithPiece(fill, r, index, angle) {
      var w = parseFloat(fill.style.width || "0");
      var h = parseFloat(fill.style.height || "0");
      var piece = makeCutPiece(r, index, r.blockW, r.blockH, angle);
      var home = cutPieceHome(r.blockW, r.blockH, angle, index, 0, 0);
      var scale = slotScaleForPiece({ width: w, height: h }, home) * visualFitScaleForRound(r);
      fill.innerHTML = "";
      var dyOffset = r.name === "rectangle" ? "-8px" : "0px";
      piece.classList.add("fit-piece");
      piece.style.transformOrigin = "center center";
      piece.style.transform = "translateZ(0) translateY(" + dyOffset + ") scale(" + scale + ")";
      piece.style.filter = "none";
      fill.appendChild(piece);
      fill.classList.add("filled");
    }

    /* ── fly the two half-pieces from machine center to bot charging slots ── */
    function flyHalvesToSlots(r, angle, onDone) {
      var layer = els.flightLayer;
      layer.innerHTML = "";

      var center = machineCenterInGame();
      var targets = slotTargetsFromFills();

      [0, 1].forEach(function (slotIdx) {
        var pieceIdx = pieceIndexForSlot(r, slotIdx);
        var home = cutPieceHome(r.blockW, r.blockH, angle, pieceIdx, center.x, center.y);
        var fly = makeCutPiece(r, pieceIdx, r.blockW, r.blockH, angle);
        fly.classList.add("flying-half");
        fly.style.left = home.left + "px";
        fly.style.top = home.top + "px";
        fly.style.width = home.width + "px";
        fly.style.height = home.height + "px";
        fly.style.transformOrigin = "center center";
        fly.style.transition = "transform .9s cubic-bezier(.18,.89,.32,1.08),opacity .9s ease";

        layer.appendChild(fly);

        var scale = slotScaleForPiece(targets[slotIdx], home) * visualFitScaleForRound(r);
        var dx = targets[slotIdx].x - home.centerX;
        var dyOffset = r.name === "rectangle" ? 8 : 0;
        var dy = targets[slotIdx].y - home.centerY - dyOffset;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            fly.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + scale + ")";
          });
        });
      });

      setTimeout(onDone, 1050);
    }

    function showSuccess() {
      var r = currentRound();
      var cutAngle = state.lastCutAngle;
      sndSuccess();
      splitMachineBlock(cutAngle);
      setInstruction("");

      function powerBotsWithHalves() {
        state.teachingActive = false;
        els.game.classList.remove("teaching-active");
        hide(els.teachStage);
        setupBots("layout-laser");
        setInstruction("");
        flyHalvesToSlots(r, cutAngle, function () {
          els.flightLayer.innerHTML = "";
          hide(els.machineStage);
          fillSlotWithPiece(els.leftFill, r, pieceIndexForSlot(r, 0), cutAngle);
          fillSlotWithPiece(els.rightFill, r, pieceIndexForSlot(r, 1), cutAngle);
          els.leftBot.src = r.happyBot;
          els.rightBot.src = r.happyBot;
          var hw = r.botWIntro + "px";
          els.leftBot.style.width = hw;
          els.rightBot.style.width = hw;
          els.leftBot.classList.add("happy", "jump");
          els.rightBot.classList.add("happy", "jump");
          els.leftPod.classList.add("glow");
          els.rightPod.classList.add("glow");

          /* Move pods and target-fills up to match the larger bots' new head height */
          var newBotTop = 720 - r.botWIntro * (r.botAspect || 1.2);
          var podW = r.podW || 132;
          var aspectL = r.podAspectLeft || 2.3;
          var aspectR = r.podAspectRight || r.podAspectLeft || 2.3;
          var newTopL = newBotTop - podW * aspectL + (r.chargerOverlap || 14);
          var newTopR = newBotTop - podW * aspectR + (r.chargerOverlap || 14);

          els.leftPod.classList.add("jump");
          els.rightPod.classList.add("jump");
          els.leftFill.classList.add("jump");
          els.rightFill.classList.add("jump");

          els.leftPod.style.transition = "top 0.4s ease";
          els.rightPod.style.transition = "top 0.4s ease";
          els.leftFill.style.transition = "top 0.4s ease";
          els.rightFill.style.transition = "top 0.4s ease";

          els.leftPod.style.top = newTopL + "px";
          els.rightPod.style.top = newTopR + "px";
          els.leftFill.style.top = (newTopL + targetSlotOffsetForRound(r, "left")) + "px";
          els.rightFill.style.top = (newTopR + targetSlotOffsetForRound(r, "right")) + "px";

          function addPulse(slotEl) {
            var pulse = document.createElement("div");
            pulse.className = "electric-pulse";
            slotEl.appendChild(pulse);
            setTimeout(function () { if (pulse.parentNode) pulse.parentNode.removeChild(pulse); }, 1200);
          }
          addPulse(document.querySelector(".left-bot"));
          addPulse(document.querySelector(".right-bot"));
          sndCharging();

          setInstruction("");

          var tgts = slotTargetsFromFills();
          burstCelebration(tgts[0].x, tgts[0].y);
          burstCelebration(tgts[1].x, tgts[1].y);
        });

        /* Show Next button — child taps to advance manually */
        later(function () {
          setInstruction("");
          state.nextAction = null;
          show(els.nextButton);
        }, 4500);
      }

      later(function () {
        setupBots("layout-laser");
        renderTeaching("teach-full", cutAngle, true, powerBotsWithHalves);
      }, 1000);
    }

    function splitMachineBlock(angle) {
      var r = currentRound();
      var cutAngle = angle === undefined ? canonicalCutAngle(r) : angle;
      var orientation = cutOrientation(cutAngle);
      var trans = "transform 0.45s cubic-bezier(.34,1.3,.64,1)";
      var h0 = makeCutPiece(r, 0, r.blockW, r.blockH, cutAngle);
      var h1 = makeCutPiece(r, 1, r.blockW, r.blockH, cutAngle);
      /* Remove the half-wrap drop-shadow in the machine — it looks odd for circles/triangles */
      h0.style.filter = "none";
      h1.style.filter = "none";
      els.machineBlock.innerHTML = "";

      if (orientation === "slash" || orientation === "backslash") {
        var g0 = pieceGeometry(r.blockW, r.blockH, cutAngle, 0);
        var g1 = pieceGeometry(r.blockW, r.blockH, cutAngle, 1);
        var container = document.createElement("div");
        container.style.cssText = "position:relative;width:" + r.blockW + "px;height:" + r.blockH + "px;";
        h0.style.position = "absolute"; h0.style.left = g0.minX + "px"; h0.style.top = g0.minY + "px";
        h1.style.position = "absolute"; h1.style.left = g1.minX + "px"; h1.style.top = g1.minY + "px";
        container.appendChild(h0);
        container.appendChild(h1);
        els.machineBlock.appendChild(container);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            h0.style.transition = trans;
            h1.style.transition = trans;
            if (orientation === "slash") {
              h0.style.transform = "translate(-12px,-12px)";
              h1.style.transform = "translate(12px,12px)";
            } else {
              h0.style.transform = "translate(12px,-12px)";
              h1.style.transform = "translate(-12px,12px)";
            }
          });
        });
        return;
      }

      var row = document.createElement("div");
      row.className = "halves-row";
      row.style.flexDirection = orientation === "vertical" ? "row" : "column";
      row.appendChild(h0);
      row.appendChild(h1);
      els.machineBlock.appendChild(row);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          h0.style.transition = trans;
          h1.style.transition = trans;
          if (orientation === "vertical") {
            h0.style.transform = "translateX(-25px)";
            h1.style.transform = "translateX(25px)";
          } else {
            h0.style.transform = "translateY(-18px)";
            h1.style.transform = "translateY(18px)";
          }
        });
      });
    }

    function showFail() {
      var r = currentRound();
      var cutAngle = state.lastCutAngle || state.angle;
      state.wrongAttempts = (state.wrongAttempts || 0) + 1;

      els.wrongSlash.classList.remove("show");
      splitMachineBlock(cutAngle);
      setInstruction("");

      later(function () {
        setupBots("layout-laser");
        setInstruction("");
        els.leftPod.classList.add("glow");
        els.rightPod.classList.add("glow");
        flyWrongToSlots(r, cutAngle, function () {
          restoreMachineForRetry(r);
          show(els.tryAgain);
        });
      }, 720);
    }

    function restoreMachineForRetry(r) {
      els.flightLayer.innerHTML = "";
      els.machineStage.classList.remove("checking-fit");
      show(els.machineStage);
      els.machineBlock.style.opacity = "";
      els.machineBlock.classList.remove("rejoin-pop");
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(makeBlock(r, r.blockW, r.blockH));
      void els.machineBlock.offsetWidth;
      els.machineBlock.classList.add("rejoin-pop");
      showLaserHead();
      snapLaser(r.startAngle);
      setInstruction("");
    }

    function flyWrongToSlots(r, angle, onDone) {
      var layer = els.flightLayer;
      layer.innerHTML = "";
      var center = machineCenterInGame();
      var targets = slotTargetsFromFills();
      var flyers = [];

      /* Use canonical piece size to maintain consistent physical scaling of the block,
         ensuring the height is matched vertically as requested. */
      var canonAngle = canonicalCutAngle(r);
      var canonG = pieceGeometry(r.blockW, r.blockH, canonAngle, 0);
      var uniformScale = slotScaleForPiece(targets[0], { width: canonG.width, height: canonG.height }) * visualFitScaleForRound(r);

      els.machineStage.classList.add("checking-fit");
      els.machineBlock.style.opacity = "0";
      els.laserImg.style.display = "none";

      [0, 1].forEach(function (slotIdx) {
        var pieceIdx = pieceIndexForSlot(r, slotIdx);
        var home = cutPieceHome(r.blockW, r.blockH, angle, pieceIdx, center.x, center.y);
        var fly = makeCutPiece(r, pieceIdx, r.blockW, r.blockH, angle);
        fly.classList.add("flying-half");
        fly.style.position = "absolute";
        fly.style.left = home.left + "px";
        fly.style.top = home.top + "px";
        fly.style.width = home.width + "px";
        fly.style.height = home.height + "px";
        fly.style.transformOrigin = "center center";
        fly.style.transition = "transform .86s " + EASE.BACK + ", filter .28s ease, opacity .28s ease";
        layer.appendChild(fly);
        flyers.push(fly);

        var scale = uniformScale; /* perfectly match hole size */
        var dx = targets[slotIdx].x - home.centerX;
        var dy = targets[slotIdx].y - home.centerY;
        var fitTransform = "translate(" + dx + "px," + dy + "px) scale(" + scale + ")";
        fly.style.setProperty("--fit-transform", fitTransform);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            fly.style.transform = fitTransform;
          });
        });
      });

      /* Mismatch feedback: pieces arrive → red glow → wiggle → return. */
      later(function () {
        flyers.forEach(function (fly) {
          fly.classList.add("wrong-fit-glow");
        });
      }, 880);

      later(function () {
        sndOops();
        flyers.forEach(function (fly) {
          fly.classList.add("soft-mismatch");
        });
      }, 980);

      later(function () {
        flyers.forEach(function (fly) {
          fly.classList.remove("soft-mismatch", "wrong-fit-glow");
          fly.style.transition = "transform .78s cubic-bezier(.65,0,.35,1), filter .28s ease";
          fly.style.filter = "drop-shadow(0 0 10px rgba(120, 219, 255, .28))";
          fly.style.transform = "translate(0,0) scale(1)";
        });
        setInstruction("");
      }, 1880);

      later(function () {
        if (typeof onDone === "function") {
          onDone();
        }
      }, 2820);
    }

    function tryAgain() {
      var r = currentRound();
      state.locked = false;
      state.angle = r.startAngle;
      els.flightLayer.innerHTML = "";
      show(els.machineStage);
      setupBots("layout-laser");
      snapLaser(r.startAngle);
      hideBeam();
      clearAttemptGuides();
      els.machineBlock.classList.remove("vibrate");
      els.machineBlock.classList.remove("rejoin-pop");
      els.machineBlock.style.opacity = "";
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(makeBlock(r, r.blockW, r.blockH));
      els.wrongSlash.classList.remove("show");
      hide(els.tryAgain);

      applyAttemptGuides();
      setInstruction("");
      startIdleHint();
    }

    function nextRound() {
      clearTimers();
      state.round++;
      state.step = 0;
      if (state.round >= ROUNDS.length) {
        completeGame();
        return;
      }
      renderStep();
    }

    function renderCompleteConfetti() {
      if (!els.completeConfetti) { return; }
      var colors = ["#4dbeff", "#9b5fd9", "#78dc2d", "#ffcf3b", "#ff6b8b", "#56e8ff"];
      els.completeConfetti.innerHTML = "";
      for (var i = 0; i < 72; i++) {
        var bit = document.createElement("span");
        var x = 4 + Math.random() * 92;
        var y = -18 - Math.random() * 60;
        var dx = -90 + Math.random() * 180;
        var fall = 610 + Math.random() * 260;
        var width = 8 + Math.random() * 10;
        var height = 18 + Math.random() * 20;
        var rotation = -60 + Math.random() * 120;
        var spin = 260 + Math.random() * 520;
        var duration = 2.7 + Math.random() * 1.8;
        var delay = Math.random() * 1.8;
        bit.style.setProperty("--x", x.toFixed(1) + "%");
        bit.style.setProperty("--y", y.toFixed(1) + "px");
        bit.style.setProperty("--dx", dx.toFixed(1) + "px");
        bit.style.setProperty("--fall", fall.toFixed(1) + "px");
        bit.style.setProperty("--w", width.toFixed(1) + "px");
        bit.style.setProperty("--h", height.toFixed(1) + "px");
        bit.style.setProperty("--r", rotation.toFixed(1) + "deg");
        bit.style.setProperty("--spin", spin.toFixed(1) + "deg");
        bit.style.setProperty("--dur", duration.toFixed(2) + "s");
        bit.style.setProperty("--d", delay.toFixed(2) + "s");
        bit.style.setProperty("--c", colors[i % colors.length]);
        els.completeConfetti.appendChild(bit);
      }
    }

    function completeGame() {
      resetScene();
      setInstruction("");
      renderCompleteConfetti();
      show(els.completeStage);
      sndKidsCheer();
      try {
        parent.postMessage({ type: "activity_complete" }, "*");
      } catch (e) { }
    }

    function finishGame() {
      state.round = 0;
      state.step = 0;
      state.plugConnectPlayed = {};
      hide(els.completeStage);
      renderStep();
    }

    function burstCelebration(cx, cy) {
      var colors = ["#FFE566", "#4DCAFF", "#FF6B8B", "#7BFF83", "#FF9D4D", "#C87AFF", "#FF4DA3", "#56FFE0"];
      var count = 22;
      for (var i = 0; i < count; i++) {
        var dot = document.createElement("div");
        dot.className = "spark-dot";
        var angle = (i / count) * 2 * Math.PI;
        var dist = 70 + Math.random() * 90;
        var sx = Math.cos(angle) * dist;
        var sy = Math.sin(angle) * dist;
        var size = 8 + Math.random() * 8;
        dot.style.cssText = "left:" + (cx - size / 2) + "px;top:" + (cy - size / 2) + "px;" +
          "width:" + size + "px;height:" + size + "px;background:" + colors[i % colors.length] + ";" +
          "animation-delay:" + (Math.random() * 0.18) + "s;";
        dot.style.setProperty("--sx", sx.toFixed(1) + "px");
        dot.style.setProperty("--sy", sy.toFixed(1) + "px");
        els.flightLayer.appendChild(dot);
        (function (el) { setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1100); })(dot);
      }
    }

    function handleNextButton() {
      sndTap();
      hide(els.nextButton);
      var action = state.nextAction;
      state.nextAction = null;
      if (typeof action === "function") {
        action();
        return;
      }
      nextRound();
    }

    els.playStage.addEventListener("click", function () { sndTap(); nextStep(); });
    els.hitLeft.addEventListener("click", function () {
      if (state.tutActive) { tutHandleLeft(); return; }
      rotateLaser(-45, els.hitLeft);
    });
    els.hitRight.addEventListener("click", function () {
      if (state.tutActive) { tutHandleRight(); return; }
      rotateLaser(45, els.hitRight);
    });
    els.hitCut.addEventListener("click", function () {
      if (state.tutActive) { tutHandleCut(); return; }
      cutBlock();
    });
    els.tryAgain.addEventListener("click", function () { sndTap(); tryAgain(); });
    els.nextButton.addEventListener("click", handleNextButton);
    els.finishButton.addEventListener("click", function () { sndTap(); finishGame(); });

    renderStep();
  </script>

  <svg width="0" height="0" style="position:absolute;z-index:-1;pointer-events:none;">
    <defs>
      <!-- Teaching Yellow Glow Shader -->
      <filter id="alpha-glow-teach" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
        <feComponentTransfer in="blur" result="boost">
          <feFuncA type="linear" slope="3" />
        </feComponentTransfer>
        <feFlood flood-color="#ffff00" result="color" />
        <feComposite in="color" in2="boost" operator="in" result="glow" />
        <feMerge>
          <feMergeNode in="glow" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Soft mismatch shader retained for gentle retry feedback if needed. -->
      <filter id="alpha-glow-wrong" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
        <feComponentTransfer in="blur" result="boost">
          <feFuncA type="linear" slope="2.2" />
        </feComponentTransfer>
        <feFlood flood-color="#7bdfff" result="softGlow" />
        <feComposite in="softGlow" in2="boost" operator="in" result="glow" />

        <feColorMatrix in="SourceGraphic" type="matrix" values="
        1 0 0 0 0
        0 1.05 0 0 0
        0 0 1.08 0 0
        0 0 0 1 0" result="tinted" />

        <feMerge>
          <feMergeNode in="glow" />
          <feMergeNode in="tinted" />
        </feMerge>
      </filter>

      <!-- Red glow for wrong-fit pieces trying to enter slots -->
      <filter id="alpha-glow-wrong-red" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
        <feComponentTransfer in="blur" result="boost">
          <feFuncA type="linear" slope="3" />
        </feComponentTransfer>
        <feFlood flood-color="#ff3333" result="color" />
        <feComposite in="color" in2="boost" operator="in" result="glow" />
        <feMerge>
          <feMergeNode in="glow" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
  </svg>

</body>
