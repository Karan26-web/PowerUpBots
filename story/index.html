      for (var i = 0; i < points.length; i++) {
        var p0 = points[i], p1 = points[(i + 1) % points.length];
        var cross = p0.x * p1.y - p1.x * p0.y;
        area += cross; cx += (p0.x + p1.x) * cross; cy += (p0.y + p1.y) * cross;
      }
      area *= 0.5;
      if (Math.abs(area) < 0.001) {
        return points.reduce(function (a, p) { a.x += p.x / points.length; a.y += p.y / points.length; return a; }, { x: 0, y: 0 });
      }
      return { x: cx / (6 * area), y: cy / (6 * area) };
    }

    function sectorGeometry(polygon, width, height) {
      var xs = polygon.map(function (p) { return p.x; });
      var ys = polygon.map(function (p) { return p.y; });
      var minX = Math.min.apply(null, xs), minY = Math.min.apply(null, ys);
      var boxW = Math.max(1, Math.max.apply(null, xs) - minX);
      var boxH = Math.max(1, Math.max.apply(null, ys) - minY);
      var clipInner = polygon.map(function (p) {
        return (p.x / width * 100).toFixed(3).replace(/\.?0+$/, "") + "% " +
               (p.y / height * 100).toFixed(3).replace(/\.?0+$/, "") + "%";
      }).join(",");
      return {
        minX: minX, minY: minY, width: boxW, height: boxH,
        clipInner: "polygon(" + clipInner + ")",
        centroid: polyCentroid(polygon)
      };
    }

    function gridSectorPieces(width, height, a1, a2) {
      var rect = [{ x: 0, y: 0 }, { x: width, y: 0 }, { x: width, y: height }, { x: 0, y: height }];
      var combos = [[1, 1], [1, -1], [-1, 1], [-1, -1]];
      var out = [];
      combos.forEach(function (c) {
        var poly = clipPolygon(rect, width, height, a1, c[0]);
        poly = clipPolygon(poly, width, height, a2, c[1]);
        if (poly.length >= 3) {
          var geo = sectorGeometry(poly, width, height);
          if (geo.width > 2 && geo.height > 2) { out.push(geo); }
        }
      });
      return out;
    }

    /* One sector piece as a positioned wrap — mirrors makeCutPiece's css-square
       branch (a full-size inner block clipped to the sector polygon). */
    function makeSectorPiece(r, geo, width, height) {
      var wrap = document.createElement("div");
      wrap.className = "half-wrap sector-wrap";
      wrap.style.width = geo.width + "px";
      wrap.style.height = geo.height + "px";
      var inner = makeBlock(r, width, height);
      inner.classList.add("half-inner");
      inner.style.filter = "none";
      /* Full block clipped to this sector polygon — keep the circle's 50% radius
         so a V+H sector yields a QUARTER-CIRCLE, not a square. Triangles/squares
         have no radius. */
      inner.style.borderRadius = (r.name === "circle" ? "50%" : "0");
      inner.style.left = (-geo.minX) + "px";
      inner.style.top = (-geo.minY) + "px";
      inner.style.clipPath = geo.clipInner;
      wrap.appendChild(inner);
      return wrap;
    }

    /* Diagonal-cut rounds (triangle1/triangle2): the block is cut into 4 right
       triangles and each seats into a corner triangle-hollow. */
    function isDiagRound(r) { return !!(r && r.winCutPair === "diag"); }

    /* Each triangle is an AXIS-ALIGNED box clipped to a 3-point polygon — no
       rotation, so the box sizes straight to the hollow cavity and the layout
       overlay can move/resize/crop it like any rectangle (and a Re-scan can't
       scatter it). cornerSlotEls + cornerForPiece are [tl,tr,bl,br], so the slot
       index IS the corner index.

       triClipAt(i, t) interpolates the SAME triangle between two readings:
         t = 0 → one of the four diagonal-cut quarters of the centre block (its
                 right angle/apex at the block centre — how the square is actually
                 cut), the four of which tile the block exactly;
         t = 1 → the seated corner triangle (right angle at the OUTER screen
                 corner) that fills the hollow.
       The two outer vertices stay fixed; only the apex slides from the block
       centre out to the corner. Animating t from 0→1 (CSS clip-path morph, or
       per-frame in the preview) makes each piece visibly OPEN OUT of the cut
       square into its corner slot — the logical "split into 4, fan to corners". */
    var TRI_OUTER = [
      [[0, 0], [100, 0]],       /* tl: top edge */
      [[100, 0], [100, 100]],   /* tr: right edge */
      [[0, 0], [0, 100]],       /* bl: left edge */
      [[100, 100], [0, 100]]    /* br: bottom edge */
    ];
    var TRI_APEX = [[0, 100], [0, 0], [100, 100], [100, 0]];   /* tl→BL, tr→TL, bl→BR, br→TR */
    /* Diamond round (triangle2): the block is cut by its DIAGONALS, so each
       quarter's right angle is at the block CENTRE. We morph each quarter to its
       seated corner triangle by interpolating ALL three vertices (the apex-slide
       model used for triangle1 can't express this). [tl,tr,bl,br]:
         T0 = the quadrant that tiles the centre diamond (apex at centre), placed
              toward its own corner so it flies straight out (no criss-cross);
         T1 = the seated corner triangle (right angle toward centre, hypotenuse to
              the outer corner) — the 180° image of triangle1's seat, matching the
              180°-rotated hollows (cornerRotate [180,270,90,0]). */
    var DIAMOND_T0 = [
      [[50, 50], [50, 0], [0, 50]],      /* tl: centre + top + left */
      [[50, 50], [50, 0], [100, 50]],    /* tr: centre + top + right */
      [[50, 50], [0, 50], [50, 100]],    /* bl: centre + left + bottom */
      [[50, 50], [100, 50], [50, 100]]   /* br: centre + right + bottom */
    ];
    var DIAMOND_T1 = [
      [[100, 100], [100, 0], [0, 100]],  /* tl seat ◢ (right angle toward centre) */
      [[0, 100], [0, 0], [100, 100]],    /* tr seat ◣ */
      [[100, 0], [0, 0], [100, 100]],    /* bl seat ◥ */
      [[0, 0], [100, 0], [0, 100]]       /* br seat ◤ */
    ];
    function triClipAt(i, t) {
      var cr = (typeof currentRound === "function") ? currentRound() : null;
      if (cr && cr.diamondHollows) {
        var p0 = DIAMOND_T0[i] || DIAMOND_T0[0], p1 = DIAMOND_T1[i] || DIAMOND_T1[0];
        var dp = p0.map(function (q, k) { return [q[0] + (p1[k][0] - q[0]) * t, q[1] + (p1[k][1] - q[1]) * t]; });
        return "polygon(" + dp.map(function (q) { return q[0].toFixed(2) + "% " + q[1].toFixed(2) + "%"; }).join(", ") + ")";
      }
      var o = TRI_OUTER[i] || TRI_OUTER[0], a = TRI_APEX[i] || TRI_APEX[0];
      var ax = (50 + (a[0] - 50) * t).toFixed(2), ay = (50 + (a[1] - 50) * t).toFixed(2);
      return "polygon(" + o[0][0] + "% " + o[0][1] + "%, " + o[1][0] + "% " + o[1][1] + "%, " + ax + "% " + ay + "%)";
    }
    function makeCornerTriangle(r, cornerIdx, w, h, t) {
      var d = document.createElement("div");
      d.className = "flying-half tri-piece";
      d.style.background = r.blockColor || "#ED9CFF";
      d.style.clipPath = triClipAt(cornerIdx, t == null ? 1 : t);
      d.style.borderRadius = "0";
      d.style.filter = "none";
      d.style.width = w + "px";
      d.style.height = h + "px";
      d.style.transformOrigin = "center center";
      return d;
    }

    /* Seated triangle box for corner-slot centre `sc`: a SQUARE sized off the
       hollow's short side (consistent across the four rotated hollow boxes), so
       all four seats are the same size and centred. slotFill.w is the factor. */
    function triSeatBox(r, sc) {
      var f = (r.slotFill && r.slotFill.w) || 0.73;
      var s = Math.min(sc.w, sc.h) * f;
      return { w: s, h: s };
    }

    /* A seated corner-triangle, positioned (centred on the slot + nudge) for the
       fit/debug view and as the rest pose after the fly/preview. */
    function makeTriSeatPiece(r, cornerIdx, sc, nudgeX, nudgeY) {
      var box = triSeatBox(r, sc);
      var piece = makeCornerTriangle(r, cornerIdx, box.w, box.h);
      piece.style.position = "absolute";
      piece.style.left = (sc.x + (nudgeX || 0) - box.w / 2) + "px";
      piece.style.top = (sc.y + (nudgeY || 0) - box.h / 2) + "px";
      return piece;
    }

    /* FOUR EQUAL PARTS: the two centre cuts are perpendicular, so each of the
       four sectors is congruent. Two valid pairings:
         • vertical + horizontal → 4 equal rectangles/squares (any block)
         • both diagonals        → 4 equal triangles (square block only; on a
                                    non-square the diagonals give 2 unequal pairs)
       This is the geometric truth used for the teaching label — distinct from
       whether the parts fit the square chargers (see gridCutFitsChargers). */
    function gridCutIsEqualParts(a1, a2) {
      var o1 = cutOrientation(a1), o2 = cutOrientation(a2);
      var axisPair = (o1 === "vertical" && o2 === "horizontal") || (o1 === "horizontal" && o2 === "vertical");
      var diagPair = (o1 === "backslash" && o2 === "slash") || (o1 === "slash" && o2 === "backslash");
      var r = currentRound();
      var isSquare = r && Math.abs((r.blockW || 0) - (r.blockH || 0)) < 1;
      return axisPair || (diagPair && isSquare);
    }

    /* The parts only seat in the SQUARE charger hollows when they are squares —
       i.e. one vertical + one horizontal cut. Equal triangles are equal, but
       they don't fit the square sockets, so this is the win condition. */
    function gridCutFitsChargers(a1, a2) {
      var o1 = cutOrientation(a1), o2 = cutOrientation(a2);
      /* Diagonal-cut rounds (triangles) win on slash + backslash; their
         triangle sockets only seat triangle pieces. All other rounds win on
         the axis pair (square/rectangle/quarter-circle sockets). */
      if (currentRound().winCutPair === "diag") {
        return (o1 === "slash" && o2 === "backslash") || (o1 === "backslash" && o2 === "slash");
      }
      return (o1 === "vertical" && o2 === "horizontal") || (o1 === "horizontal" && o2 === "vertical");
    }

    function splitOffsetForOrientation(orientation, distance) {
      var gap = distance || 28;
      if (orientation === "slash") {
        return [{ x: -gap, y: -gap }, { x: gap, y: gap }];
      }
      if (orientation === "backslash") {
        return [{ x: gap, y: -gap }, { x: -gap, y: gap }];
      }
      if (orientation === "horizontal") {
        return [{ x: 0, y: -gap }, { x: 0, y: gap }];
      }
      return [{ x: -gap, y: 0 }, { x: gap, y: 0 }];
    }

    function resultSplitGapForOrientation(orientation) {
      if (orientation === "slash" || orientation === "backslash") {
        return 4;
      }
      return 24;
    }

    function resultSplitGapForRound(r, orientation) {
      if (r && r.name === "square" && (orientation === "slash" || orientation === "backslash")) {
        return 2;
      }
      if (r && r.name === "circle" && r.variant === "circle-diagonal" &&
        (orientation === "slash" || orientation === "backslash")) {
        return 2;
      }
      return resultSplitGapForOrientation(orientation);
    }

    function renderWhole(glow, cue) {
      var r = currentRound();
      els.shapeStage.innerHTML = "";
      var wrap = document.createElement("div");
      wrap.className = "block-demo";
      wrap.style.width = r.blockW + "px";
      wrap.style.height = r.blockH + "px";
      /* Diamond round: rotate the whole demo so the block reads as a diamond and
         the diagonal cut lines/pieces read as vertical/horizontal cuts of it. */
      if (r.blockRotate) { wrap.style.transform = "rotate(" + r.blockRotate + "deg)"; }

      if (cue === "halves") {
        wrap.classList.add("equal-cue");
        var angle = canonicalCutAngle(r);
        var orientation = cutOrientation(angle);
        var splitOffsets = splitOffsetForOrientation(orientation, 6);

        var wholeBlock = makeBlock(r, r.blockW, r.blockH);
        wrap.appendChild(wholeBlock);

        var dPieces = [];
        [0, 1].forEach(function (index) {
          var g = pieceGeometry(r.blockW, r.blockH, angle, index);
          var piece = makeCutPiece(r, index, r.blockW, r.blockH, angle);
          piece.classList.add("needs-split-piece");
          piece.style.position = "absolute";
          piece.style.left = g.minX + "px";
          piece.style.top = g.minY + "px";
          piece.style.opacity = "0";
          piece.style.transform = "translate(0px,0px)";
          dPieces.push(piece);
          wrap.appendChild(piece);
        });

        var line = document.createElement("div");
        line.className = "cut-cue-line " + orientation;
        line.style.opacity = "0";
        if (orientation === "slash" || orientation === "backslash") {
          var diag = Math.sqrt(r.blockW * r.blockW + r.blockH * r.blockH);
          var deg = orientation === "backslash" ? 45 : -45;
          line.style.width = diag + "px";
          line.style.transform = "translate(-50%, -50%) rotate(" + deg + "deg)";
        }
        wrap.appendChild(line);

        later(function () {
          wholeBlock.style.transition = "opacity 0.28s ease";
          wholeBlock.style.opacity = "0";
          dPieces.forEach(function (piece) {
            piece.style.transition = "opacity 0.28s ease";
            piece.style.opacity = "1";
          });
          later(function () {
            sndSplitDemo();
            line.style.transition = "opacity 0.3s ease";
            line.style.opacity = "1";
            dPieces.forEach(function (piece, index) {
              piece.style.transition = "transform 0.5s cubic-bezier(.4,0,.2,1)";
              piece.style.transform = "translate(" + splitOffsets[index].x + "px," + splitOffsets[index].y + "px)";
            });
          }, 350);
        }, 800);
      } else {
        var block = makeBlock(r, r.blockW, r.blockH);
        if (glow) block.classList.add("static-glow");
        block.classList.add("block-pop-in");
        wrap.appendChild(block);
      }

      els.shapeStage.appendChild(wrap);
      show(els.shapeStage);
    }

    /* Opening teaching beat for the grid round: the whole square fades and
       splits into a 2×2 grid of four equal quarters with two cross cut-lines. */
    function renderQuarterCue() {
      var r = currentRound();
      els.shapeStage.innerHTML = "";
      var wrap = document.createElement("div");
      wrap.className = "block-demo equal-cue";
      wrap.style.width = r.blockW + "px";
      wrap.style.height = r.blockH + "px";
      if (r.blockRotate) { wrap.style.transform = "rotate(" + r.blockRotate + "deg)"; }

      var wholeBlock = makeBlock(r, r.blockW, r.blockH);
      wholeBlock.classList.add("static-glow");
      wrap.appendChild(wholeBlock);

      /* Diagonal rounds: cut the block into 4 triangles (the two diagonals) and
         nudge them apart, instead of the 2×2 square split. */
      if (isDiagRound(r)) {
        var geos = gridSectorPieces(r.blockW, r.blockH, 45, 135);
        var bcx = r.blockW / 2, bcy = r.blockH / 2;
        var tPieces = geos.map(function (geo) {
          var piece = makeSectorPiece(r, geo, r.blockW, r.blockH);
          piece.classList.add("needs-split-piece", "static-glow");
          piece.style.position = "absolute";
          piece.style.left = geo.minX + "px";
          piece.style.top = geo.minY + "px";
          piece.style.opacity = "0";
          piece.style.transform = "translate(0px,0px)";
          var ddx = geo.centroid.x - bcx, ddy = geo.centroid.y - bcy;
          var dlen = Math.max(1, Math.sqrt(ddx * ddx + ddy * ddy));
          piece._ox = (ddx / dlen) * 12; piece._oy = (ddy / dlen) * 12;
          wrap.appendChild(piece);
          return piece;
        });
        var dl1 = document.createElement("div");
        dl1.className = "cut-cue-line vertical"; dl1.style.opacity = "0";
        dl1.style.transform = "translateX(-50%) rotate(45deg) scaleY(1.42)";
        var dl2 = document.createElement("div");
        dl2.className = "cut-cue-line vertical"; dl2.style.opacity = "0";
        dl2.style.transform = "translateX(-50%) rotate(-45deg) scaleY(1.42)";
        wrap.appendChild(dl1); wrap.appendChild(dl2);
        later(function () {
          wholeBlock.style.transition = "opacity 0.28s ease";
          wholeBlock.style.opacity = "0";
          tPieces.forEach(function (p) { p.style.transition = "opacity 0.28s ease"; p.style.opacity = "1"; });
          later(function () {
            sndSplitDemo();
            dl1.style.transition = dl2.style.transition = "opacity 0.3s ease";
            dl1.style.opacity = dl2.style.opacity = "1";
            tPieces.forEach(function (p) {
              p.style.transition = "transform 0.5s cubic-bezier(.4,0,.2,1)";
              p.style.transform = "translate(" + p._ox + "px," + p._oy + "px)";
            });
          }, 350);
        }, 800);
        els.shapeStage.appendChild(wrap);
        show(els.shapeStage);
        return;
      }

      var gap = 12;
      var offsets = [
        { x: -gap, y: -gap }, /* TL */
        { x: gap, y: -gap },  /* TR */
        { x: -gap, y: gap },  /* BL */
        { x: gap, y: gap }    /* BR */
      ];
      var qPieces = [];
      [0, 1, 2, 3].forEach(function (index) {
        var g = gridQuarterGeometry(r.blockW, r.blockH, index);
        var piece = makeQuarterPiece(r, index, r.blockW, r.blockH);
        piece.classList.add("needs-split-piece", "static-glow");
        piece.style.position = "absolute";
        piece.style.left = g.minX + "px";
        piece.style.top = g.minY + "px";
        piece.style.opacity = "0";
        piece.style.transform = "translate(0px,0px)";
        qPieces.push(piece);
        wrap.appendChild(piece);
      });

      var vLine = document.createElement("div");
      vLine.className = "cut-cue-line vertical";
      vLine.style.opacity = "0";
      wrap.appendChild(vLine);
      var hLine = document.createElement("div");
      hLine.className = "cut-cue-line horizontal";
      hLine.style.opacity = "0";
      wrap.appendChild(hLine);

      later(function () {
        wholeBlock.style.transition = "opacity 0.28s ease";
        wholeBlock.style.opacity = "0";
        qPieces.forEach(function (piece) {
          piece.style.transition = "opacity 0.28s ease";
          piece.style.opacity = "1";
        });
        later(function () {
          sndSplitDemo();
          vLine.style.transition = "opacity 0.3s ease";
          hLine.style.transition = "opacity 0.3s ease";
          vLine.style.opacity = "1";
          hLine.style.opacity = "1";
          qPieces.forEach(function (piece, index) {
            piece.style.transition = "transform 0.5s cubic-bezier(.4,0,.2,1)";
            piece.style.transform = "translate(" + offsets[index].x + "px," + offsets[index].y + "px)";
          });
        }, 350);
      }, 800);

      els.shapeStage.appendChild(wrap);
      show(els.shapeStage);
    }

    function renderSplitCue() {
      var r = currentRound();
      var angle = canonicalCutAngle(r);
      var orientation = cutOrientation(angle);
      els.shapeStage.innerHTML = "";
      els.flightLayer.innerHTML = "";

      var demo = document.createElement("div");
      demo.className = "split-demo";
      demo.style.width = r.blockW + "px";
      demo.style.height = r.blockH + "px";

      var whole = makeBlock(r, r.blockW, r.blockH);
      whole.classList.add("static-glow");
      demo.appendChild(whole);

      var dPieces = [];
      [0, 1].forEach(function (index) {
        var g = pieceGeometry(r.blockW, r.blockH, angle, index);
        var piece = makeCutPiece(r, index, r.blockW, r.blockH, angle);
        piece.classList.add("split-demo-piece");
        /* half-wrap has position:relative (later in stylesheet than split-demo-piece's absolute),
           so inline style wins and correctly positions pieces within the block-sized container */
        piece.style.position = "absolute";
        piece.style.left = g.minX + "px";
        piece.style.top = g.minY + "px";
        dPieces.push(piece);
        demo.appendChild(piece);
      });

      els.shapeStage.appendChild(demo);
      show(els.shapeStage);

      whenInstructionAudioEnds(function () {
        playInstructionAudio("into two equal parts.");
        sndSplitDemo();
        whole.style.transition = "opacity 0.3s ease";
        whole.style.opacity = "0";

        /* Show halves with tiny seam only — pieces stay centre-aligned */
        var seamOffsets = splitOffsetForOrientation(orientation, 2);
        dPieces.forEach(function (piece, index) {
          piece.style.opacity = "1";
          piece.style.transform = "translate(" + seamOffsets[index].x + "px," + seamOffsets[index].y + "px)";
        });

        /* After a brief pause, draw the travel guides and run the full
           out-and-back preview before the final move into each hollow slot. */
        later(function () {
          var podTopL = podTopForRound(r, "layout-ready", "left");
          var podTopR = podTopForRound(r, "layout-ready", "right");
          var slotSize = targetSlotSizeForRound(r);
          /* Left bot: left:80px, slot width 260px → centre x = 80+130 = 210
             Right bot: right:80px → centre x = 1280-80-130 = 1070
             Plus per-round X nudge to align with the visual hollow */
          var leftSlotCX  = 80 + 130 + targetSlotXOffsetForRound(r, "left");
          var rightSlotCX = 1280 - 80 - 130 + targetSlotXOffsetForRound(r, "right");
          var leftSlotCY  = podTopL + targetSlotOffsetForRound(r, "left")  + slotSize.height / 2;
          var rightSlotCY = podTopR + targetSlotOffsetForRound(r, "right") + slotSize.height / 2;

          dPieces.forEach(function (piece, index) {
            var g = pieceGeometry(r.blockW, r.blockH, angle, index);
            /* Piece centre in game-space coordinates */
            var pcX = 640 - r.blockW / 2 + g.minX + g.width  / 2;
            var pcY = 360 - r.blockH / 2 + g.minY + g.height / 2;
            var goesToLeft = pieceIndexForSlot(r, 0) === index;
            var targetSide = goesToLeft ? "left" : "right";
            var previewNudge = previewSlotNudgeForRound(r, targetSide);
            var targetX = (goesToLeft ? leftSlotCX  : rightSlotCX) + previewNudge.x;
            var targetY = (goesToLeft ? leftSlotCY  : rightSlotCY) + previewNudge.y;
            var dx = targetX - pcX;
            var dy = targetY - pcY;
            var startX = pcX + seamOffsets[index].x;
            var startY = pcY + seamOffsets[index].y;
            var controlX = (startX + targetX) / 2 + (goesToLeft ? -62 : 62);
            var panelClearY = 245;
            var softArcY = Math.min(startY, targetY) - 96;
            var controlY = Math.max(panelClearY, softArcY);
            var mx = controlX - pcX;
            var my = controlY - pcY;
            var slotScale = slotScaleForPiece({ width: slotSize.width, height: slotSize.height }, g) *
              visualFitScaleForRound(r) * previewFitScaleForRound(r);
            var motionEndX = targetX;
            var motionEndY = targetY;
            var guideEndX = targetX + (targetSide === "left" ? slotSize.width / 2 + 22 : -slotSize.width / 2 - 22);
            var guideEndY = targetY;
            var p18 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.18);
            var p38 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.38);
            var p62 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.62);
            var p82 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.82);

            piece.style.setProperty("--seamX", seamOffsets[index].x + "px");
            piece.style.setProperty("--seamY", seamOffsets[index].y + "px");
            piece.style.setProperty("--tx", dx + "px");
            piece.style.setProperty("--ty", dy + "px");
            piece.style.setProperty("--mx", mx + "px");
            piece.style.setProperty("--my", my + "px");
            piece.style.setProperty("--p18x", (p18.x - pcX) + "px");
            piece.style.setProperty("--p18y", (p18.y - pcY) + "px");
            piece.style.setProperty("--p38x", (p38.x - pcX) + "px");
            piece.style.setProperty("--p38y", (p38.y - pcY) + "px");
            piece.style.setProperty("--p62x", (p62.x - pcX) + "px");
            piece.style.setProperty("--p62y", (p62.y - pcY) + "px");
            piece.style.setProperty("--p82x", (p82.x - pcX) + "px");
            piece.style.setProperty("--p82y", (p82.y - pcY) + "px");
            piece.style.setProperty("--slotScale", slotScale.toFixed(3));
            /* Clear the inline transform so the keyframe owns it */
            piece.style.transition = "none";
            piece.style.transform = "";
            if (r.name === "rectangle") {
              piece.classList.add("socket-square-preview");
            }
            piece.classList.add("fly-tease");

            addSlotPathGuide(startX, startY, controlX, controlY, guideEndX, guideEndY, index);
          });
        }, 700);
      });
    }

    function bezierPoint(startX, startY, controlX, controlY, endX, endY, t) {
      var inv = 1 - t;
      return {
        x: inv * inv * startX + 2 * inv * t * controlX + t * t * endX,
        y: inv * inv * startY + 2 * inv * t * controlY + t * t * endY
      };
    }

    function addSlotPathGuide(startX, startY, controlX, controlY, targetX, targetY, index) {
      var svg = els.flightLayer.querySelector(".slot-path-guide");
      var ns = "http://www.w3.org/2000/svg";
      if (!svg) {
        svg = document.createElementNS(ns, "svg");
        svg.setAttribute("class", "slot-path-guide");
        svg.setAttribute("viewBox", "0 0 1280 720");
        svg.setAttribute("aria-hidden", "true");

        els.flightLayer.appendChild(svg);
      }

      /* Compute arrowhead geometry first so the dashed path can stop at the
         arrow's base — otherwise the line draws through the arrow body. */
      var endAngle = Math.atan2(targetY - controlY, targetX - controlX);
      var size = 28;
      var tipX = targetX;
      var tipY = targetY;
      var backX = tipX - Math.cos(endAngle) * size;
      var backY = tipY - Math.sin(endAngle) * size;
      var wing = size * 0.58;
      var leftX = backX + Math.cos(endAngle + Math.PI / 2) * wing;
      var leftY = backY + Math.sin(endAngle + Math.PI / 2) * wing;
      var rightX = backX + Math.cos(endAngle - Math.PI / 2) * wing;
      var rightY = backY + Math.sin(endAngle - Math.PI / 2) * wing;

      var d = "M " + startX.toFixed(1) + " " + startY.toFixed(1) +
        " Q " + controlX.toFixed(1) + " " + controlY.toFixed(1) +
        " " + backX.toFixed(1) + " " + backY.toFixed(1);

      var shadow = document.createElementNS(ns, "path");
      shadow.setAttribute("class", "slot-path-shadow");
      shadow.setAttribute("d", d);
      svg.appendChild(shadow);

      var path = document.createElementNS(ns, "path");
      path.setAttribute("d", d);
      path.style.animationDelay = (index * 0.16) + "s";
      svg.appendChild(path);

      var arrow = document.createElementNS(ns, "polygon");
      arrow.setAttribute("class", "slot-path-arrow");
      arrow.setAttribute("points",
        tipX.toFixed(1) + "," + tipY.toFixed(1) + " " +
        leftX.toFixed(1) + "," + leftY.toFixed(1) + " " +
        rightX.toFixed(1) + "," + rightY.toFixed(1));
      arrow.style.animationDelay = (index * 0.16) + "s";
      svg.appendChild(arrow);
    }

    function renderHalves(target, size) {
      var r = currentRound();
      var width = size && size.width ? size.width : r.blockW;
      var height = size && size.height ? size.height : r.blockH;
      var row = document.createElement("div");
      row.className = "halves-row";
      row.appendChild(makeHalf(r, 0, width, height));
      row.appendChild(makeHalf(r, 1, width, height));
      target.innerHTML = "";
      target.appendChild(row);
    }

    function makeTeachingPieces(r, angle, width, height) {
      var orientation = cutOrientation(angle);
      var gap = 30;
      var pad = gap + 10; /* extra room for pieces sliding out */
      var lblH = 38; /* space for "Half" label below pieces */

      var g0 = pieceGeometry(width, height, angle, 0);
      var g1 = pieceGeometry(width, height, angle, 1);

      /* Expanded container so pieces don't clip when they slide apart */
      var cW = width + pad * 2;
      var cH = height + pad * 2 + lblH;

      var box = document.createElement("div");
      box.className = "teach-halves-box";

      var container = document.createElement("div");
      container.style.cssText = "position:relative;width:" + cW + "px;height:" + cH + "px;";

      var h0 = makeCutPiece(r, 0, width, height, angle);
      var h1 = makeCutPiece(r, 1, width, height, angle);
      h0.classList.add("teach-shape-glow", "teach-pop");
      h1.classList.add("teach-shape-glow", "teach-pop", "teach-pop-d1");
      h0.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
      h1.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";

      /* Offset pieces into padded container center */
      h0.style.position = "absolute";
      h0.style.left = (g0.minX + pad) + "px";
      h0.style.top = (g0.minY + pad) + "px";
      h1.style.position = "absolute";
      h1.style.left = (g1.minX + pad) + "px";
      h1.style.top = (g1.minY + pad) + "px";

      h0.dataset.gapX = "0"; h0.dataset.gapY = "0";
      h1.dataset.gapX = "0"; h1.dataset.gapY = "0";

      if (orientation === "slash") {
        h0.dataset.gapX = -gap; h0.dataset.gapY = -gap;
        h1.dataset.gapX = gap; h1.dataset.gapY = gap;
      } else if (orientation === "backslash") {
        h0.dataset.gapX = gap; h0.dataset.gapY = -gap;
        h1.dataset.gapX = -gap; h1.dataset.gapY = gap;
      } else if (orientation === "vertical") {
        h0.dataset.gapX = -gap; h0.dataset.gapY = 0;
        h1.dataset.gapX = gap; h1.dataset.gapY = 0;
      } else if (orientation === "horizontal") {
        h0.dataset.gapX = 0; h0.dataset.gapY = -gap;
        h1.dataset.gapX = 0; h1.dataset.gapY = gap;
      }

      function polygonPoints(g) {
        return g.absPolygon.split(" ").map(function (pair) {
          var xy = pair.split(",");
          return { x: parseFloat(xy[0]), y: parseFloat(xy[1]) };
        });
      }

      function polygonCentroid(points) {
        var area = 0;
        var cx = 0;
        var cy = 0;
        for (var i = 0; i < points.length; i++) {
          var p0 = points[i];
          var p1 = points[(i + 1) % points.length];
          var cross = p0.x * p1.y - p1.x * p0.y;
          area += cross;
          cx += (p0.x + p1.x) * cross;
          cy += (p0.y + p1.y) * cross;
        }
        area *= 0.5;
        if (Math.abs(area) < 0.001) {
          return points.reduce(function (acc, p) {
            acc.x += p.x / points.length;
            acc.y += p.y / points.length;
            return acc;
          }, { x: 0, y: 0 });
        }
        return { x: cx / (6 * area), y: cy / (6 * area) };
      }

      function teachingHalfLabelPosition(g, piece, index) {
        var points = polygonPoints(g);
        var centroid = polygonCentroid(points);
        var dx = parseFloat(piece.dataset.gapX || "0");
        var dy = parseFloat(piece.dataset.gapY || "0");
        var maxX = Math.max.apply(null, points.map(function (p) { return p.x; }));
        var bottom = Math.max.apply(null, points.map(function (p) { return p.y; }));
        var labelGap = (orientation === "slash" || orientation === "backslash") ? 10 : 10;
        /* For circle rounds with diagonal cuts the visible half-disk's bottom is the
           chord-circle intersection on the "upper" side (~0.854h), not the polygon
           bottom corner (h). Pull the label up to match the actual curve. */
        if (r.name === "circle" && (orientation === "slash" || orientation === "backslash")) {
          var upperPiece = index === 0;
          if (upperPiece) {
            bottom = height * (2 + Math.sqrt(2)) / 4;
          }
        }
        if (r.cut === "diagonal" && orientation === "backslash" && index === 0) {
          return {
            x: pad + maxX + dx + 36,
            y: pad + centroid.y + dy + 8
          };
        }
        return {
          x: pad + centroid.x + dx,
          y: pad + bottom + dy + labelGap
        };
      }

      /* Labels follow each clipped polygon, not its bounding box. This matters for diagonal triangles. */
      var lbl0 = teachingHalfLabelPosition(g0, h0, 0);
      var lbl1 = teachingHalfLabelPosition(g1, h1, 1);

      function makeHalfLabel(pos) {
        var lbl = document.createElement("span");
        lbl.className = "t-half-lbl";
        lbl.textContent = "Half";
        lbl.style.cssText = "position:absolute;left:" + pos.x + "px;top:" + pos.y + "px;" +
          "transform:translateX(-50%) translateY(8px);opacity:0;" +
          "transition:opacity .5s ease,transform .5s ease;";
        return lbl;
      }

      var halfLbl0 = makeHalfLabel(lbl0);
      var halfLbl1 = makeHalfLabel(lbl1);

      container.appendChild(h0);
      container.appendChild(h1);
      container.appendChild(halfLbl0);
      container.appendChild(halfLbl1);
      box.appendChild(container);

      box._halfLabels = [halfLbl0, halfLbl1];
      box._pieces = [h0, h1];
      return box;
    }

    function renderTeaching(kind, angle, equal, onNext) {
      var r = currentRound();
      var cutAngle = angle === undefined ? canonicalCutAngle(r) : angle;
      var w;
      if (r.name === "rectangle" && r.variant === "rectangle-tall") {
        w = 80;
      } else if (r.name === "rectangle" && r.variant === "rectangle-wide") {
        w = 360;
      } else if (r.name === "rectangle" && r.variant === "rectangle-vertical") {
        w = 110;
      } else if (r.name === "rectangle" && r.variant === "rectangle-wide-hcut") {
        w = 180;
      } else if (r.name === "rectangle" && r.variant === "rectangle-flat-hcut") {
        w = 220;
      } else if (r.name === "rectangle") {
        w = 170;
      } else if (r.name === "circle") {
        w = 145;
      } else {
        w = 130;
      }
      var h = Math.round(w * r.blockH / r.blockW);
      els.teachContent.innerHTML = "";
      state.teachingActive = true;
      els.game.classList.add("teaching-active");
      setInstruction("");

      /* ── Frame ── */
      var frame = document.createElement("div");
      frame.className = "teach-frame";

      /* ── Left column ── */
      var leftCol = document.createElement("div");
      leftCol.className = "teach-frame-left";

      /* Whole block section — appears at top, stays there */
      var wholeSection = document.createElement("div");
      wholeSection.className = "teach-whole-section";
      wholeSection.style.opacity = "0";
      var wholeBlk = makeBlock(r, w, h);
      wholeSection.appendChild(wholeBlk);
      leftCol.appendChild(wholeSection);

      /* Moving clone — this replica descends and turns into the halves */
      var cloneSection = document.createElement("div");
      cloneSection.className = "teach-clone-section";
      var cloneBlk = makeBlock(r, w, h);
      cloneSection.appendChild(cloneBlk);
      leftCol.appendChild(cloneSection);

      /* Halves section — positioned below whole section, initially hidden */
      var halvesSection = document.createElement("div");
      halvesSection.className = "teach-halves-section";
      halvesSection.style.opacity = "0";
      var halvesBox = makeTeachingPieces(r, cutAngle, w, h);
      halvesSection.appendChild(halvesBox);
      leftCol.appendChild(halvesSection);

      /* ── Right column ── */
      var rightCol = document.createElement("div");
      rightCol.className = "teach-frame-right";

      var lblWhole = document.createElement("div");
      lblWhole.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";
      var lblWholeText = document.createElement("div");
      lblWholeText.className = "teach-big-label";
      lblWholeText.textContent = "1 Whole";
      lblWhole.appendChild(lblWholeText);
      rightCol.appendChild(lblWhole);

      var lblEqual = document.createElement("div");
      lblEqual.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";
      var lblEqualText = document.createElement("div");
      lblEqualText.className = "teach-equal-label";
      lblEqualText.textContent = equal === false ? "2 Equal Parts" : "2 Equal Parts";
      lblEqual.appendChild(lblEqualText);
      rightCol.appendChild(lblEqual);

      frame.appendChild(leftCol);
      frame.appendChild(rightCol);
      els.teachContent.appendChild(frame);
      show(els.teachStage);

      /* Step 1: whole block fades in at top position */
      later(function () {
        wholeSection.style.opacity = "1";
      }, TIMING.TEACH_WHOLE_IN);

      later(function () {
        lblWhole.style.opacity = "1";
        lblWhole.style.transform = "translateY(0)";
        wholeBlk.classList.add("teach-shape-glow");
      }, TIMING.TEACH_LABEL_IN);

      later(function () {
        /* Clone descends to halves position while the original whole stays visible */
        cloneSection.style.opacity = "1";
        cloneSection.style.transform = "translateY(230px) scale(.97)";
      }, TIMING.TEACH_MOVE_DOWN);

      /* Step 5: clone fades out, halves fade in at the same Y position */
      later(function () {
        wholeBlk.classList.remove("teach-shape-glow");
        cloneSection.style.opacity = "0";
        halvesSection.style.opacity = "1";
        halvesSection.style.transform = "translateY(0) scale(1)";
        var pieces = halvesBox._pieces || [];
        requestAnimationFrame(function () {
          pieces.forEach(function (p) {
            /* Remove teach-pop fill-mode so its transform no longer competes with the inline translate */
            p.classList.remove("teach-pop", "teach-pop-d1");
            p.style.transform = "translate(" + p.dataset.gapX + "px," + p.dataset.gapY + "px)";
          });
        });
      }, TIMING.TEACH_SPLIT);

      later(function () {
        (halvesBox._halfLabels || []).forEach(function (lbl) {
          lbl.style.opacity = "1";
          lbl.style.transform = "translateX(-50%) translateY(0)";
        });
      }, TIMING.TEACH_HALF_LABELS);

      later(function () {
        (halvesBox._pieces || []).forEach(function (p) {
          p.style.transition = "filter 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
          p.classList.remove("teach-shape-glow");
        });
      }, TIMING.TEACH_SPLIT + 3000);

      later(function () {
        lblEqual.style.opacity = "1";
        lblEqual.style.transform = "translateY(0)";
      }, TIMING.TEACH_EQUAL_LABEL);

      if (typeof onNext === "function") {
        scheduleTeachingNext(onNext);
      }
    }

    /* Builds the lower "pieces" box for the grid teaching screen: the real
       sector pieces from the two cuts, stacked to reform the whole, each tagged
       with an outward gap for the split step. "Quater" labels (one per piece,
       just outside it) appear only when the cut is correct (4 equal squares). */
    function makeTeachingGridPieces(r, a1, a2, correct, w, h) {
      var gap = 13;
      var pad = gap + 14;
      var lblPad = 70;   /* horizontal room for the side "Quater" labels */
      var geos = gridSectorPieces(w, h, a1, a2);
      /* Both-diagonals cut → 4 triangles fanning out from the centre. Their
         labels go in a diamond (above/below/left/right) instead of the square
         grid's left/right columns, where the top & bottom triangles (both at
         centroid.x ≈ w/2) would otherwise stack on one side. */
      var o1 = cutOrientation(a1), o2 = cutOrientation(a2);
      var diagonalCut = (o1 === "backslash" || o1 === "slash") && (o2 === "backslash" || o2 === "slash");
      var box = document.createElement("div");
      box.className = "teach-halves-box";
      /* The diagonal X-cut places labels above/below the block, so it needs
         extra vertical room; the square grid keeps its tight inset. */
      var vPad = diagonalCut ? 70 : pad;
      var container = document.createElement("div");
      container.style.cssText = "position:relative;width:" + (w + pad * 2 + lblPad * 2) +
        "px;height:" + (h + vPad * 2) + "px;";

      var ox = pad + lblPad;   /* piece origin x inside the padded container */
      var pieces = [], labels = [];
      geos.forEach(function (geo, i) {
        var p = makeSectorPiece(r, geo, w, h);
        p.classList.add("teach-shape-glow", "teach-pop");
        if (i % 2 === 1) { p.classList.add("teach-pop-d1"); }
        p.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
        p.style.position = "absolute";
        p.style.left = (ox + geo.minX) + "px";
        p.style.top = (vPad + geo.minY) + "px";
        var cx = geo.centroid.x - w / 2, cy = geo.centroid.y - h / 2;
        var len = Math.max(1, Math.sqrt(cx * cx + cy * cy));
        p.dataset.gapX = ((cx / len) * gap).toFixed(1);
        p.dataset.gapY = ((cy / len) * gap).toFixed(1);
        container.appendChild(p);
        pieces.push(p);

        if (correct) {
          var anchorX, lx, ly;
          if (diagonalCut && r.blockRotate) {
            /* Diamond round: the grid box is rotated 45°, so the four triangles
               sit at the diamond's edges. Place EVERY label at the same radial
               distance from the centre — by the diamond's 4-fold symmetry that
               gives all four the same gap, with room so the text never sticks to
               a piece. */
            var ddx = geo.centroid.x - w / 2, ddy = geo.centroid.y - h / 2;
            var dlen = Math.max(1, Math.sqrt(ddx * ddx + ddy * ddy));
            var R = (w / 2) + 82;
            lx = ox + w / 2 + (ddx / dlen) * R;
            ly = vPad + h / 2 + (ddy / dlen) * R;
            anchorX = "-50%";
          } else if (diagonalCut) {
            /* Place each triangle's label just outside the block on the side it
               points toward: left/right triangles beside it, top/bottom above
               and below — so the four "Quarter" labels never collide. */
            var dx = geo.centroid.x - w / 2, dy = geo.centroid.y - h / 2;
            if (Math.abs(dx) >= Math.abs(dy)) {
              anchorX = dx >= 0 ? "0%" : "-100%";
              lx = dx >= 0 ? (ox + w + 26) : (ox - 26);
              ly = vPad + h / 2;
            } else {
              anchorX = "-50%";
              lx = ox + w / 2;
              /* clear the 13px outward nudge + a comfortable gap above/below */
              ly = dy >= 0 ? (vPad + h + 47) : (vPad - 47);
            }
          } else {
            /* Square grid: anchor each label by its INNER edge just outside the
               piece so the wide "Quater" text never overlaps the block —
               left-column labels right-aligned to the piece's left, right-column
               labels left-aligned to its right. */
            var leftCol = geo.centroid.x < w / 2;
            anchorX = leftCol ? "-100%" : "0%";
            lx = leftCol ? (ox + geo.minX - 16) : (ox + geo.minX + geo.width + 16);
            ly = vPad + geo.centroid.y;
          }
          var lbl = document.createElement("span");
          lbl.className = "t-half-lbl";
          /* Diamond round: the grid box is rotated, so counter-rotate the TEXT
             back to upright (keep the label's position around the diamond). */
          if (r.blockRotate) {
            var lblInner = document.createElement("span");
            lblInner.textContent = "Quarter";
            lblInner.style.display = "inline-block";
            lblInner.style.transform = "rotate(" + (-r.blockRotate) + "deg)";
            lbl.appendChild(lblInner);
          } else {
            lbl.textContent = "Quarter";
          }
          lbl.dataset.anchorX = anchorX;
          lbl.style.cssText = "position:absolute;white-space:nowrap;left:" + lx + "px;top:" +
            ly + "px;transform:translate(" + anchorX + ",-50%) translateY(10px);" +
            "opacity:0;transition:opacity .5s ease,transform .5s ease;";
          container.appendChild(lbl);
          labels.push(lbl);
        }
      });
      box.appendChild(container);
      box._pieces = pieces;
      box._halfLabels = labels;
      return box;
    }

    /* Grid teaching screen (Figma 9:1419): whole block + "1 Whole" → a clone
       descends and splits into the REAL pieces the player cut → "4 Equal Parts"
       + "Quater" labels when correct, or "Not equal parts" when not. Mirrors
       renderTeaching's structure/animation but with the 2-cut sector pieces. */

      var TEACH_MAX = 150;

      var gridSection = document.createElement("div");

      leftCol.appendChild(gridSection);

      var rightCol = document.createElement("div");
      rightCol.className = "teach-frame-right";
      var lblWhole = document.createElement("div");
      lblWhole.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";
      var lblWholeText = document.createElement("div");
      lblWholeText.className = "teach-big-label";
      lblWholeText.textContent = "1 Whole";
      lblWhole.appendChild(lblWholeText);
      rightCol.appendChild(lblWhole);

      var lblEqual = document.createElement("div");
      lblEqual.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";
      var lblEqualText = document.createElement("div");
      lblEqualText.className = "teach-equal-label" + (correct ? "" : " teach-wrong-label");
      lblEqualText.textContent = correct ? "4 Equal Parts" : "Not equal parts";
      lblEqual.appendChild(lblEqualText);
      rightCol.appendChild(lblEqual);

      frame.appendChild(leftCol);
      frame.appendChild(rightCol);
      els.teachContent.appendChild(frame);
      show(els.teachStage);

      later(function () { wholeSection.style.opacity = "1"; }, TIMING.TEACH_WHOLE_IN);
      later(function () {
        lblWhole.style.opacity = "1"; lblWhole.style.transform = "translateY(0)";
        wholeBlk.classList.add("teach-shape-glow");
      }, TIMING.TEACH_LABEL_IN);
      later(function () {
        cloneSection.style.opacity = "1";
        cloneSection.style.transform = "translateY(230px) scale(.97)";
      }, TIMING.TEACH_MOVE_DOWN);
      later(function () {
        wholeBlk.classList.remove("teach-shape-glow");
        cloneSection.style.opacity = "0";
        gridSection.style.opacity = "1";
        gridSection.style.transform = "translateY(0) scale(1)";
        var pieces = gridBox._pieces || [];
        requestAnimationFrame(function () {

    /* Centre point (game-space 1280×720) of a DOM element. */
    function gameSpaceCenter(el) {
      var stage = els.game || document.getElementById("game");
      var sr = stage.getBoundingClientRect();
      var er = el.getBoundingClientRect();
      var sx = 1280 / sr.width;
      var sy = 720 / sr.height;
      return {
        x: (er.left - sr.left + er.width / 2) * sx,
        y: (er.top - sr.top + er.height / 2) * sy,
        w: er.width * sx,
        h: er.height * sy
      };
    }

    /* Draw glowing white/blue wires from each corner pod to a bot's head and
       animate them drawing in. Pairing: TL→left, BL→mid-left, TR→right,
       BR→mid-right (outer corners to outer bots). */
    /* Circuit-style connectors from each corner pod to a bot head. Geometry is
       computed live from getBoundingClientRect (via gameSpaceCenter) so it
       stays correct at any scale. Each pod gets its OWN <path> (no single giant
       wire), drawn in with a dash sweep, plus a glowing bead that rides the same
       path via SVG animateMotion. Routing matches the Figma reference:
         • Top pods  → across the top, then straight down into the bot head.
         • Bottom pods → short run out, riser up to head height, then in to the head.
       Pairing (outer corners → outer bots, matching the reference):
         TL→bot1(left), BL→bot2(mid-left), TR→bot4(right), BR→bot3(mid-right). */
    /* Global pixel offset for the whole charging-wire bundle, in 1280×720 game
       space. Set from the debug overlay's "pod-connectors" export (grab a wire,
       drag, Download Layout JSON) to nudge all wires into alignment at once. */
    var CONNECTOR_NUDGE = { x: 0, y: 0 };
    /* Per-wire override for the head end of each charging wire (where it lands on
       the bot's head), in 1280×720 game space, pairs order [TL,TR,BL,BR]. null =
       use the computed (bot-x, crown-y) landing. Drag the cyan head dots in the
       debug overlay to tune, then bake the exported {i,x,y} back here. */
    var CONNECTOR_HEADS = [null, null, null, null];
    var connectorWires = [];   /* live wire descriptors so the debug tool can re-route a single head */

    /* L-shaped wire path. Top wires run across then drop into the head; bottom
       wires rise to a rail above the heads, across, then down into the head. */
    function connWirePath(top, sx, sy, hx, hy) {
      var s = sx.toFixed(1), t = sy.toFixed(1), X = hx.toFixed(1), Y = hy.toFixed(1);
      if (top) { return "M " + s + " " + t + " H " + X + " V " + Y; }
      return "M " + s + " " + t + " V " + (hy - 90).toFixed(1) + " H " + X + " V " + Y;
    }
    function connWireLen(top, sx, sy, hx, hy) {
      if (top) { return Math.abs(hx - sx) + Math.abs(hy - sy); }
      var railY = hy - 90;
      return Math.abs(railY - sy) + Math.abs(hx - sx) + Math.abs(hy - railY);
    }
    /* Re-route a single wire to a new head endpoint without redrawing the bundle
       (keeps the others' draw-in/bead timing). */
    function rebuildConnWire(w) {
      if (!w || !w.path) { return; }
      var d = connWirePath(w.top, w.sx, w.sy, w.hx, w.hy);
      w.path.setAttribute("d", d);
      w.path.style.setProperty("--len", connWireLen(w.top, w.sx, w.sy, w.hx, w.hy).toFixed(0));
      if (w.motion) { w.motion.setAttribute("path", d); }
    }
    function playPodConnectors(success, opts) {
      var quiet = !!(opts && opts.quiet);   /* static alignment draw: no SFX, no beads/plugs/glow */
      var svg = els.podConnectors;
      if (!svg) { return; }
      svg.innerHTML = "";
      connectorWires = [];
      svg.style.transform = "translate(" + CONNECTOR_NUDGE.x + "px," + CONNECTOR_NUDGE.y + "px)";
      show(svg);
      if (!quiet) { sndPodCharge(); }   /* electric charge SFX, timed to the wire-draw + bead travel */
      var ns = "http://www.w3.org/2000/svg";
      var slotByCls = {};
      els.cornerSlotEls.forEach(function (s) {
        if (s.classList.contains("cs-tl")) slotByCls.tl = s;
        else if (s.classList.contains("cs-tr")) slotByCls.tr = s;
        else if (s.classList.contains("cs-bl")) slotByCls.bl = s;
        else if (s.classList.contains("cs-br")) slotByCls.br = s;
      });
      /* Pairing + routing per Figma node 16:2094:
           TL → bot2 (mid-left), TR → bot3 (mid-right)  — top hollows feed the INNER bots
           BL → bot1 (left),     BR → bot4 (right)       — bottom hollows feed the OUTER bots
         Top wires: across at hollow height, then drop into the head.
         Bottom wires: up to a rail above the heads, across, then down into the head. */
      var pairs = [
        { slot: slotByCls.tl, bot: els.midLeftBot, top: true },
        { slot: slotByCls.tr, bot: els.midRightBot, top: true },
        { slot: slotByCls.bl, bot: els.leftBot, top: false },
        { slot: slotByCls.br, bot: els.rightBot, top: false }
      ];
      var EDGE = 0.30;   /* start at the inner-recess border, not the hollow centre */
      var BOTTOM_EDGE = 0.44;  /* bottom hollows exit at the top rim (higher than EDGE) per Figma 16:2094 */
      var diag = isDiagRound(currentRound());   /* triangle pods sit toward the outer corner */
      var beads = [];
      pairs.forEach(function (p, i) {
        if (!p.slot || !p.bot) { return; }
        var a = gameSpaceCenter(p.slot);   /* pod centre */
        var b = gameSpaceCenter(p.bot);    /* bot centre */
        var headY = b.y - b.h * (success ? 0.52 : 0.30);   /* success: land ON the head-plug crown (~0.52 above centre), not the face. charge screen keeps 0.30, unchanged */
        var sx, sy;
        if (diag) {
          /* Anchor the wire ON the seated triangle's mass (its ~centroid) so the
             line springs from the pod, not the empty box corner. triangle1's mass
             sits toward the OUTER corner; the diamond (triangle2) is rotated 180°
             so its mass sits toward the CENTRE — flip the anchor inward there. */
          var sgx = (p.slot.classList.contains("cs-tr") || p.slot.classList.contains("cs-br")) ? 1 : -1;
          var sgy = (p.slot.classList.contains("cs-bl") || p.slot.classList.contains("cs-br")) ? 1 : -1;
          if (currentRound().diamondHollows) { sgx = -sgx; sgy = -sgy; }
          sx = a.x + sgx * a.w / 6;
          sy = a.y + sgy * a.h / 6;
        } else if (p.top) {
          /* top hollows exit the left/right edge toward the bot */
          sx = a.x + (b.x >= a.x ? 1 : -1) * a.w * EDGE;
          sy = a.y;
        } else {
          /* bottom hollows exit the top edge (the wire goes up first) */
          sx = a.x;
          sy = a.y - a.h * BOTTOM_EDGE;
        }
        /* head landing point — bot crown by default, or a baked/debug override */
        var hx = b.x, hyv = headY;
        if (CONNECTOR_HEADS[i]) { hx = CONNECTOR_HEADS[i].x; hyv = CONNECTOR_HEADS[i].y; }
        var d = connWirePath(p.top, sx, sy, hx, hyv);
        var len = connWireLen(p.top, sx, sy, hx, hyv);

        var path = document.createElementNS(ns, "path");
        path.setAttribute("d", d);
        path.style.setProperty("--len", len.toFixed(0));
        path.style.animationDelay = (0.5 + i * 0.15) + "s";   /* pods settle first, then draw with stagger */
        svg.appendChild(path);

        /* glowing start node on the hollow's border */
        var node = document.createElementNS(ns, "circle");
        node.setAttribute("class", "pod-wire-node");
        node.setAttribute("cx", sx.toFixed(1));
        node.setAttribute("cy", sy.toFixed(1));
        node.setAttribute("r", "5");
        svg.appendChild(node);

        /* record this wire so the debug overlay can drag its head endpoint live */
        connectorWires[i] = { i: i, top: p.top, sx: sx, sy: sy, hx: hx, hy: hyv, path: path, node: node, motion: null };

        if (quiet) { return; }   /* alignment view: wires only, no travelling beads */

        /* travelling electricity bead — rides this exact path */
        var bead = document.createElementNS(ns, "circle");
        bead.setAttribute("class", "pod-energy");
        bead.setAttribute("r", "5.5");
        bead.setAttribute("cx", "0");
        bead.setAttribute("cy", "0");
        var motion = document.createElementNS(ns, "animateMotion");
        motion.setAttribute("path", d);
        motion.setAttribute("dur", "1.1s");
        motion.setAttribute("begin", "indefinite"); /* triggered in JS so it ignores the page-load timeline */
        /* Energy travels the wire exactly once, then rests at the bot head
           (fill=freeze) — the charge is "delivered" and the head glows. */
        motion.setAttribute("repeatCount", "1");
        motion.setAttribute("fill", "freeze");
        motion.setAttribute("calcMode", "spline");
        motion.setAttribute("keyTimes", "0;1");
        motion.setAttribute("keySplines", "0.22 1 0.36 1");
        bead.appendChild(motion);
        svg.appendChild(bead);
        connectorWires[i].motion = motion;
        beads.push({ motion: motion, delay: 1500 + i * 150, bot: p.bot }); /* energy travels after the wire is drawn */
      });

      /* Kick each bead off relative to NOW (beginElement) so the staggered
         timing is correct no matter how long the page has been open. The wire
         finishes drawing into the head at be.delay (its draw-delay + 1s draw),
         so seat this bot's plug at that exact moment — line and plug connect to
         the head together. */
      beads.forEach(function (be) {
        later(function () { try { be.motion.beginElement(); } catch (e) {} }, be.delay);
        later(function () { seatHeadPlug(be.bot, success); }, be.delay);
      });

      /* Bots glow softly once the circuit has energised. */
      if (!quiet) {
        later(function () {
          [els.leftBot, els.rightBot, els.midLeftBot, els.midRightBot].forEach(function (bt) {
            if (bt) { bt.classList.add("pod-charged-glow"); }
          });
        }, 2000);
      }
    }

    /* Debug-overlay hooks: drag each wire's head endpoint (where it meets the
       bot head) and export. Coords are 1280×720 game space, pairs order
       [TL,TR,BL,BR]. The overlay reads/sets these; values get baked into
       CONNECTOR_HEADS above. */
    window.__connectorHeads = function () {
      return connectorWires.filter(Boolean).map(function (w) {
        return { i: w.i, x: Math.round(w.hx * 10) / 10, y: Math.round(w.hy * 10) / 10, top: w.top };
      });
    };
    window.__connectorNudge = function () { return { x: CONNECTOR_NUDGE.x, y: CONNECTOR_NUDGE.y }; };
    window.__setConnectorHead = function (i, x, y) {
      CONNECTOR_HEADS[i] = { x: x, y: y };
      var w = connectorWires[i];
      if (w) { w.hx = x; w.hy = y; rebuildConnWire(w); }
    };

    /* Charger plug (CSS/SVG only, mirrors the reference art) seated on top of a
       bot's head the moment its wire's energy bead arrives. Appended into the
       bot-slot so it tracks the bot; removed in resetScene() on the next screen. */
    function headPlugMarkup() {
      return "" +
        '<div class="hp-knob"></div>' +
        '<div class="hp-body"></div>' +
        '<svg class="hp-bolt" viewBox="0 0 22 31" aria-hidden="true">' +
          '<path d="M13 2 L5 17 L10.5 17 L9 30 L18 11 L12 11 Z" fill="none" ' +
          'stroke="#2bc3f2" stroke-width="2.3" stroke-linejoin="round" stroke-linecap="round"/>' +
        "</svg>";
    }

    function seatHeadPlug(bot, success) {
      if (!bot || !bot.parentNode) { return; }
      var slot = bot.parentNode;
      if (slot.querySelector(".head-plug")) { return; }   /* already seated */
      var plug = document.createElement("div");
      plug.className = "head-plug" + (success ? " seat-success" : "");
      plug.innerHTML = headPlugMarkup();
      slot.appendChild(plug);
      /* next frame so the connect animation plays from its start state */
      requestAnimationFrame(function () { plug.classList.add("connected"); });
    }

    function setupPlugReady(text) {
      els.sceneBg.style.display = "block";

    function setupCutInstruct(text) {
      var r = currentRound();
      els.sceneBg.style.display = "block";
      els.focusDim.classList.add("show");   /* dim bg, spotlight the block + hollows */
      /* Grid round: show the four empty corner slots only — the bots stay
