<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerUp Bots </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #d9e7ff;
      display: flex;
      align-items: center;
      justify-content: center
    }

    button {
      font: inherit
    }

    #game {
      position: absolute;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      transform-origin: top left;
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
      color: #154aa5;
      user-select: none;
      background: #d9e7ff;
      isolation: isolate;
      --ease-in-out-soft: cubic-bezier(.65, 0, .35, 1);
      --ease-out-back: cubic-bezier(.18, .89, .32, 1.18);
      --ease-snap: cubic-bezier(.16, 1.18, .3, 1);
    }

    /* Screen transition fade overlay removed; it caused a visible white flash. */

    /* ── Lab-gate intro ──
       LabGate.webp split across two 50%-wide halves that part left/right. The
       image (2762×1732, ~1.6:1) is scaled by WIDTH (background-size 200% auto →
       full image spans both halves) and centred vertically, so it covers the
       whole 16:9 frame with no distortion — only a little top/bottom crop.
       Sits above everything, never takes input; JS parts the doors then drops it. */
    #labGate {
      position: absolute;
      inset: 0;
      z-index: 200;
      overflow: hidden;
      pointer-events: none;
      display: none;   /* shown only while the transition runs (.gate-active) */
    }

    #labGate.gate-active {
      display: block;
    }

    .gate-half {
      position: absolute;
      top: 0;
      height: 100%;
      width: 50%;
      background-image: url("assets/LabGate.webp");
      background-size: 200% auto;       /* full image across both halves; cover width */
      background-repeat: no-repeat;
      will-change: transform;
      transition: transform 1.5s var(--ease-in-out-soft);
    }

    .gate-left {
      left: 0;
      background-position: left center;
    }

    .gate-right {
      right: 0;
      background-position: right center;
    }

    #labGate.gate-open .gate-left {
      transform: translateX(-100%);
    }

    #labGate.gate-open .gate-right {
      transform: translateX(100%);
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }

    /* Dim overlay that spotlights the block + hollows on the teaching screens
       (Figma 11:1819). Sits above the bg (z0) but below the corner hollows
       (z3) and the centre block (#shapeStage z12), so those pop while the
       background recedes. Fades in only on the screens that opt in. */
    #focusDim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.20);
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }

    #focusDim.show {
      opacity: 1;
    }

    .hidden {
      opacity: 0;
      pointer-events: none
    }

    #instruction {
      position: absolute;
      top: 8px;
      left: 32px;
      width: 1120px;
      height: 150px;
      z-index: 40;
      transition: opacity .28s ease, transform .28s ease;
    }

    #instruction {
      filter: drop-shadow(0 10px 16px rgba(77, 151, 220, .12));
    }

    #instruction.hidden {
      transform: translateY(-8px)
    }

    #game.teaching-active #instruction {
      opacity: 0 !important;
      pointer-events: none;
      visibility: hidden;
    }

    #instruction img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #instructionText {
      position: absolute;
      left: 154px;
      right: 14px;
      top: 42px;
      min-height: 58px;
      display: flex;
      align-items: center;
      color: #154aa5;
      font-size: 26px;
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
    }

    #scene {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .bot-slot {
      position: absolute;
      width: 260px;
      height: 520px;
      transform-origin: bottom center;
    }

    .bot-slot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: var(--power-spark-top, 510px);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.35);
      opacity: 0;
      background: radial-gradient(circle, #fff 0 18%, #8af3ff 32%, rgba(114, 219, 255, 0) 72%);
      box-shadow: 0 0 0 rgba(116, 219, 255, 0);
      pointer-events: none;
      z-index: 12;
    }

    .layout-ready.power-connecting .bot-slot::after {
      animation: connectionFlash .66s cubic-bezier(.18, .89, .32, 1.18) 1.58s both;
    }

    .layout-ready.power-connecting .right-bot::after {
      animation-delay: 1.75s;
    }

    .bot-img {
      position: absolute;
      left: 50%;
      bottom: 0;
      max-width: none;
      object-fit: contain;
      transform: translateX(-50%);
      transition: filter .35s ease, transform .45s cubic-bezier(.18, .89, .35, 1.18);
      z-index: 8;
      will-change: transform, filter;
      backface-visibility: hidden;
    }

    .bot-img.happy {
      filter: drop-shadow(0 0 16px rgba(116, 219, 255, .95));
    }

    .bot-slot.celebrate-jump {
      animation: botSlotCelebrateJump .72s ease-in-out 2;
    }

    .layout-ready.power-connecting .bot-img {
      animation: botPowerNotice 2.7s cubic-bezier(.65, 0, .35, 1) .92s both;
    }

    .layout-ready.power-connecting .right-bot .bot-img {
      animation-delay: 1.06s;
    }

    .electric-pulse {
      position: absolute;
      left: 50%;
      top: 150px;
      width: 4px;
      height: 40px;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 0 16px 6px #74dbff;
      transform: translateX(-50%);
      animation: pulseDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      z-index: 10;
    }

    @keyframes pulseDown {
      0% {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      80% {
        transform: translate(-50%, 380px);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, 380px);
        opacity: 0;
      }
    }

    @keyframes botSlotCelebrateJump {

      0%,
      100% {
        transform: translateY(0);
      }

      42% {
        transform: translateY(-14px);
      }
    }

    @keyframes botPowerNotice {

      0%,
      38%,
      100% {
        transform: translateX(-50%) translateY(0) scale(1);
        filter: none;
      }

      48% {
        transform: translateX(-50%) translateY(-5px) scale(1.018);
        filter: drop-shadow(0 0 10px rgba(116, 219, 255, .55));
      }

      59% {
        transform: translateX(-50%) translateY(1px) scale(.996);
      }
    }

    @keyframes connectionFlash {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.35);
        box-shadow: 0 0 0 rgba(116, 219, 255, 0);
      }

      42% {
        opacity: .95;
        transform: translate(-50%, -50%) scale(1.2);
        box-shadow: 0 0 22px 10px rgba(116, 219, 255, .42);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.9);
        box-shadow: 0 0 36px 18px rgba(116, 219, 255, 0);
      }
    }

    .pod-img {
      position: absolute;
      left: 50%;
      top: 0;
      width: 134px;
      height: auto;
      transform: translateX(-50%);
      object-fit: contain;
      opacity: 0;
      transition: opacity .35s ease, filter .35s ease;
      z-index: 4;
      will-change: transform, opacity;
      backface-visibility: hidden;
    }

    .pod-img.visible {
      opacity: 1
    }

    .pod-img.glow {
      animation: podGlow 1s ease-in-out 2
    }

    .pod-img.front-layer {
      z-index: 60;
    }

    .pod-connector-neck-cover {
      position: absolute;
      left: 50%;
      width: var(--connector-cover-w, 20px);
      height: var(--connector-cover-h, 15px);
      transform: translateX(-50%);
      border-radius: 10px 10px 5px 5px;
      background:
        linear-gradient(90deg,
          rgba(213, 235, 255, .98) 0%,
          rgba(247, 253, 255, .98) 48%,
          rgba(197, 225, 249, .98) 100%);
      border: 1px solid rgba(126, 179, 214, .66);
      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, .82),
        inset 0 -2px 4px rgba(126, 179, 214, .28),
        0 0 4px rgba(56, 172, 223, .22);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .pod-connector-neck-cover::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -10px;
      width: 5px;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, #153d72 0%, #2e5d96 48%, #123866 100%);
      box-shadow: 0 0 2px rgba(74, 170, 240, .26);
    }

    .pod-connector-neck-cover.visible {
      opacity: 1;
    }

    /* Charging connector clamped onto each bot head when the circuit energises
       (charging screen only). Built entirely in CSS/SVG — no image asset. A
       compact white cap with a blue top knob (where the wire meets) and a cyan
       lightning outline — no face/visor, so it reads as a plug on the crown.
       Appended into each .bot-slot by seatHeadPlug(); removed in resetScene(). */
    .head-plug {
      position: absolute;
      left: 50%;
      bottom: 216px;   /* calibrated for the charge ("plug") screen bots */
      width: 96px;
      height: 64px;
      transform: translateX(-50%) scale(.44);
      transform-origin: 50% 100%;
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      filter: drop-shadow(0 5px 7px rgba(20, 70, 120, .3));
    }

    /* Success/grid-fit screen uses different-sized bots, so the plug seats lower
       to rest on those heads (the charge-screen 216px floats above them). Raised
       to 202px so the plug crown follows the wire heads (now landed at ~0.52 of
       the bot height) — keeps the bead seated on the plug. Charge screen uses the
       base .head-plug (216px) and is unaffected. */
    .head-plug.seat-success {
      bottom: 202px;
    }

    .head-plug.connected {
      animation: headPlugConnect .5s cubic-bezier(.2, 1.25, .4, 1) both;
    }

    @keyframes headPlugConnect {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-12px) scale(.3);
      }

      62% {
        opacity: 1;
        transform: translateX(-50%) translateY(2px) scale(.5);
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(.44);
      }
    }

    .head-plug .hp-knob {
      position: absolute;
      left: 50%;
      top: 0;
      width: 22px;
      height: 19px;
      transform: translateX(-50%);
      border-radius: 7px 7px 5px 5px;
      background: linear-gradient(180deg, #6cd9f7 0%, #34c0f2 58%, #15a4dd 100%);
      box-shadow:
        inset 0 2px 2px rgba(255, 255, 255, .55),
        inset 0 -3px 4px rgba(8, 92, 142, .42);
      z-index: 1;
    }

    .head-plug .hp-body {
      position: absolute;
      left: 0;
      top: 12px;
      width: 100%;
      height: 52px;
      border-radius: 30px 30px 24px 24px;
      background: linear-gradient(180deg, #ffffff 0%, #f2faff 55%, #e6f2fb 100%);
      box-shadow:
        inset 0 3px 4px rgba(255, 255, 255, .92),
        inset 0 -5px 8px rgba(150, 190, 220, .38);
      z-index: 2;
    }

    .head-plug .hp-bolt {
      position: absolute;
      left: 50%;
      top: 24px;
      width: 21px;
      height: 28px;
      transform: translateX(-50%);
      z-index: 3;
    }

    @keyframes podGlow {

      0%,
      100% {
        filter: brightness(1)
      }

      50% {
        filter: brightness(1.55) saturate(1.75) drop-shadow(0 0 16px rgba(76, 222, 255, .9))
      }
    }

    .layout-intro .left-bot {
      left: 360px;
      bottom: 0
    }

    .layout-intro .right-bot {
      right: 360px;
      bottom: 0
    }

    .layout-intro .bot-img {
      width: 205px
    }

    .layout-intro .pod-img {
      display: none
    }

    /* ── 4-bot screens (intro + corner-hollow) ── */
    /* Mid bots exist only for the 4-bot screens; hidden in every other layout. */
    .mid-left-bot,
    .mid-right-bot {
      display: none;
    }

    /* 4 bots in a centered row, sized ~134px per reference image 1 */
    .layout-intro4 .bot-slot,
    .layout-corners4 .bot-slot {
      display: block;
      bottom: 0;
    }

    .layout-intro4 .left-bot,
    .layout-corners4 .left-bot {
      left: 246px;
      right: auto;
    }

    .layout-intro4 .mid-left-bot,
    .layout-corners4 .mid-left-bot {
      left: 422px;
      right: auto;
    }

    .layout-intro4 .mid-right-bot,
    .layout-corners4 .mid-right-bot {
      right: 422px;
      left: auto;
    }

    .layout-intro4 .right-bot,
    .layout-corners4 .right-bot {
      right: 246px;
      left: auto;
    }

    .layout-intro4 .bot-img,
    .layout-corners4 .bot-img {
      width: 134px;
      bottom: 40px;
    }

    .layout-intro4 .pod-img,
    .layout-intro4 .target-fill,
    .layout-corners4 .pod-img,
    .layout-corners4 .target-fill {
      display: none;
    }

    /* 4 square hollows that pop into the corners on the plug screen */
    #cornerSlots {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    #cornerSlots.hidden {
      display: none;
    }

    /* Glowing wires from corner pods to bot heads (grid round, pod screen). */
    #podConnectors {
      position: absolute;
      inset: 0;
      width: 1280px;
      height: 720px;
      z-index: 4;
      pointer-events: none;
      overflow: visible;
    }

    #podConnectors.hidden {
      display: none;
    }

    #podConnectors path {
      fill: none;
      stroke: #7ff8ff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 4px rgba(127, 248, 255, .95))
        drop-shadow(0 0 10px rgba(0, 224, 255, .8))
        drop-shadow(0 0 22px rgba(0, 200, 255, .45));
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      /* draw in over 1s, ease-out; per-wire stagger set inline in JS */
      animation: podWireDraw 1s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes podWireDraw {
      to { stroke-dashoffset: 0; }
    }

    #podConnectors .pod-wire-node {
      fill: #eaffff;
      filter: drop-shadow(0 0 6px rgba(127, 248, 255, .95));
    }

    /* Travelling electricity bead that rides each wire (SVG animateMotion). */
    #podConnectors .pod-energy {
      fill: #ffffff;
      opacity: 0;
      filter:
        drop-shadow(0 0 5px rgba(255, 255, 255, .95))
        drop-shadow(0 0 12px rgba(127, 248, 255, .95))
        drop-shadow(0 0 22px rgba(0, 224, 255, .7));
      animation: podEnergyAppear .3s ease forwards;
    }

    @keyframes podEnergyAppear {
      to { opacity: 1; }
    }

    /* Bots glow softly once the circuit energises (~2s). */
    .bot-img.pod-charged-glow {
      filter: drop-shadow(0 0 14px rgba(127, 248, 255, .8)) drop-shadow(0 0 26px rgba(0, 200, 255, .4));
      transition: filter .5s ease;
    }

    /* Purple light-cone spotlight over the bots (charge / pods screens only). */
    #botSpotlight {
      position: absolute;
      left: 50%;
      top: -30px;
      width: 860px;
      height: 770px;
      transform: translateX(-50%);
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity .45s ease;
    }

    #botSpotlight.show {
      opacity: 1;
    }

    /* Charge-beam "power on": the cone flashes brighter, then settles to its
       steady glow. Base transform is preserved so it doesn't jump off-centre. */
    #botSpotlight.charge-flash {
      animation: chargeBeamFlash 1s ease-out forwards;
    }

    @keyframes chargeBeamFlash {
      0%   { opacity: 0; transform: translateX(-50%) scaleY(.92); filter: brightness(1.6); }
      22%  { opacity: 1; transform: translateX(-50%) scaleY(1.04); filter: brightness(2); }
      55%  { opacity: .9; transform: translateX(-50%) scaleY(.99); filter: brightness(1.25); }
      100% { opacity: 1; transform: translateX(-50%) scaleY(1); filter: brightness(1); }
    }

    /* The cone itself — Figma settings ported to reliable CSS:
       fill rgba(228,170,253,.28), layer opacity .5, backdrop blur.
       Trapezoid (narrow top → wide bottom) via clip-path; blur scaled from
       Figma's 250.8px over its 1230px frame to this 860px element (~175px). */
    #botSpotlight .cone {
      position: absolute;
      inset: 0;
      opacity: 0.5;
      background: rgba(239, 201, 255, 0.49);   /* Figma 43:469 fill #EFC9FF @ .49 */
      -webkit-backdrop-filter: blur(175px);
      backdrop-filter: blur(175px);
      clip-path: polygon(23.6% 0%, 74.8% 0%, 98.6% 100%, 1.3% 100%);
    }

    .corner-slot {
      position: absolute;
      width: 170px;
      height: auto;
      opacity: 0;
      transform: rotate(var(--cs-rot, 0deg)) scale(.7);
      transition: opacity .4s ease, transform .45s var(--ease-out-back);
    }

    .corner-slot.show {
      opacity: 1;
      transform: rotate(var(--cs-rot, 0deg)) scale(1);
    }

    /* Fixed position that always clears the instruction panel (panel ends
       ≈y183), whether or not the panel is showing — so the upper hollows never
       shift as it appears/disappears. */
    .cs-tl {
      left: 90px;
      top: 202px;
    }

    .cs-tr {
      right: 90px;
      top: 202px;
    }

    /* Cutting/laser screen has no instruction panel, so the top hollows sit
       higher there (per Figma node 11:1948, hollow centre ≈ y140 → top 84). */
    #cornerSlots.slots-high .cs-tl,
    #cornerSlots.slots-high .cs-tr {
      top: 84px;
    }

    .cs-bl {
      left: 90px;
      bottom: 95px;
    }

    .cs-br {
      right: 90px;
      bottom: 95px;
    }

    /* Plug/charging connector screen (Figma 16:2094): all four hollows sit
       higher — uppers near the top, lowers level with the bots' upper bodies. */
    #cornerSlots.slots-connector .cs-tl,
    #cornerSlots.slots-connector .cs-tr {
      top: 109px;
    }

    #cornerSlots.slots-connector .cs-bl,
    #cornerSlots.slots-connector .cs-br {
      bottom: 114px;
    }

    /* Fit/success screen reuses slots-connector but ALSO shows the instruction
       panel (panel bottom ≈y158). Drop only the upper hollows so they clear it;
       the seated blocks + top wires follow (both computed from live slot
       centres). The real plug screen has slots-connector WITHOUT slots-fit, so
       its Figma-calibrated upper position (109) is untouched. */
    #cornerSlots.slots-fit .cs-tl,
    #cornerSlots.slots-fit .cs-tr {
      top: 186px;   /* panel bottom ≈158 → ~28px gap to the hollow box (clears the seated block too) */
    }

    /* Diamond round (triangle2, Figma 37:2681): the four hollows are bigger and
       pushed further into the corners to frame the centre diamond. Defined LAST
       so it overrides slots-high/connector/fit — triangle2 uses ONE hollow layout
       on every screen. Positions are centres-derived (≈half 92×87). */
    #cornerSlots.slots-diamond .corner-slot {
      width: 185px;
    }
    #cornerSlots.slots-diamond .cs-tl {
      left: 56px;
      top: 131px;
      right: auto;
      bottom: auto;
    }
    #cornerSlots.slots-diamond .cs-tr {
      right: 48px;
      top: 126px;
      left: auto;
      bottom: auto;
    }
    #cornerSlots.slots-diamond .cs-bl {
      left: 58px;
      bottom: 63px;
      right: auto;
      top: auto;
    }
    #cornerSlots.slots-diamond .cs-br {
      right: 47px;
      bottom: 70px;
      left: auto;
      top: auto;
    }

    .layout-intro-plug .left-bot,
    .layout-intro-connected .left-bot {
      left: 360px;
      top: 0;
      bottom: auto;
      height: 720px
    }

    .layout-intro-plug .right-bot,
    .layout-intro-connected .right-bot {
      right: 360px;
      top: 0;
      bottom: auto;
      height: 720px
    }

    .layout-intro-plug .bot-img,
    .layout-intro-connected .bot-img {
      bottom: 0
    }

    .layout-intro-plug .pod-img,
    .layout-intro-connected .pod-img {
      display: block;
      width: 160px
    }

    .pod-seq-layer {
      position: absolute;
      left: 50%;
      width: 160px;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      opacity: 0;
      z-index: 4;
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
    }

    .pod-seq-hollow {
      clip-path: inset(0 0 68.5% 0 round 14px);
      animation: podHollowArrive .48s cubic-bezier(.22, 1, .36, 1) both;
    }

    .pod-seq-cable {
      clip-path: inset(32% 0 0 0 round 12px);
      animation: podCableDescend .78s cubic-bezier(.2, .92, .24, 1) .46s both;
    }

    .layout-intro-plug.power-connecting .pod-img.visible {
      z-index: 4;
      opacity: 0;
      animation: powerPodTakeover 1.42s linear both;
    }

    .layout-intro-plug.power-connecting .right-bot .pod-img.visible {
      animation-delay: .12s;
    }

    .layout-intro-plug.power-connecting .bot-slot::after {
      animation: connectionFlash .48s cubic-bezier(.22, 1, .36, 1) 1.08s both;
    }

    .layout-intro-plug.power-connecting .right-bot::after {
      animation-delay: 1.14s;
    }

    .layout-intro-plug.power-connecting .bot-img {
      animation: botPowerNotice 1.55s cubic-bezier(.65, 0, .35, 1) .92s both;
    }

    .layout-intro-plug.power-connecting .right-bot .bot-img {
      animation-delay: .98s;
    }

    @keyframes podHollowArrive {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-24px) scale(.99);
        filter: brightness(.94);
      }

      72% {
        opacity: 1;
        transform: translateX(-50%) translateY(1px) scale(1.004);
        filter: brightness(1.045) drop-shadow(0 0 7px rgba(116, 219, 255, .2));
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1);

      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 18 20;
      filter:
        drop-shadow(0 0 6px rgba(255, 255, 255, .9))
        drop-shadow(0 0 14px rgba(93, 218, 255, .58));
      animation: slotPathMarch 1.45s linear infinite, slotPathPulse 1.9s ease-in-out infinite;
    }

    .slot-path-guide .slot-path-shadow {
      stroke: rgba(55, 153, 220, .18);
      stroke-width: 18;
      stroke-dasharray: none;
      filter: blur(7px);
      animation: none;
    }

    .slot-path-guide .slot-path-arrow {
      fill: rgba(255, 255, 255, .96);
      stroke: rgba(255, 255, 255, .96);
      stroke-width: 2;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 6px rgba(255, 255, 255, .95))
        drop-shadow(0 0 13px rgba(93, 218, 255, .62));
      animation: slotPathPulse 1.9s ease-in-out infinite;
    }

    @keyframes slotPathMarch {
      to { stroke-dashoffset: -38; }
    }

    @keyframes slotPathPulse {
      0%, 100% { opacity: .78; }
      50% { opacity: 1; }
    }

    /* Guided slot preview: each half travels to the hollow, snaps back faster,
       then finishes with one final move into the hollow. The dotted SVG path mirrors
       the sampled Bezier points so the motion and visual cue agree. */
    .split-demo-piece.fly-tease {
      transition: none;
      animation: splitFlyToHollowTease 7.8s linear forwards;
      filter: drop-shadow(0 0 14px rgba(94, 226, 255, .55));
    }

    @keyframes splitFlyToHollowTease {
      0%, 7% {
        transform: translate(var(--seamX, 0px), var(--seamY, 0px)) scale(1);
        opacity: 1;
      }
      13% {
        transform: translate(var(--p18x), var(--p18y)) scale(.98);
        opacity: .96;
      }
      19% {
        transform: translate(var(--p38x), var(--p38y)) scale(.91);
        opacity: .98;
      }
      27% {
        transform: translate(var(--p62x), var(--p62y)) scale(.82);
        opacity: 1;
      }
      35% {
        transform: translate(var(--p82x), var(--p82y)) scale(calc(var(--slotScale, .68) + .04));
        opacity: 1;
      }
      42% {
        transform: translate(var(--tx), var(--ty)) scale(var(--slotScale, .68));
        opacity: 1;
      }
      49% {
        transform: translate(var(--tx), var(--ty)) scale(var(--slotScale, .68));
        opacity: 1;
      }
      54% {
        transform: translate(var(--p82x), var(--p82y)) scale(calc(var(--slotScale, .68) + .04));
        opacity: 1;
      }
      58% {
        transform: translate(var(--p62x), var(--p62y)) scale(.82);
        opacity: .98;
      }
      62% {
        transform: translate(var(--p38x), var(--p38y)) scale(.91);
        opacity: .96;
      }
      66% {
        transform: translate(var(--seamX, 0px), var(--seamY, 0px)) scale(1);
        opacity: 1;
      }
      72% {
        transform: translate(var(--seamX, 0px), var(--seamY, 0px)) scale(1);
        opacity: 1;
      }
      78% {
        transform: translate(var(--p18x), var(--p18y)) scale(.98);
        opacity: .96;
      }
      86% {
        transform: translate(var(--p38x), var(--p38y)) scale(.91);
        opacity: .98;
      }
      92% {
        transform: translate(var(--p62x), var(--p62y)) scale(.82);
        opacity: 1;
      }
      97% {
        transform: translate(var(--p82x), var(--p82y)) scale(calc(var(--slotScale, .68) + .04));
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(var(--slotScale, .68));

      }
    }

    .teach-frame {
      width: 1100px;
      height: 560px;
      display: flex;
      align-items: stretch;
      padding: 50px;
      gap: 50px;
      box-sizing: border-box;
      position: relative;
      border: none;
      border-radius: 34px;
      /* Neon panel drawn in pure CSS (vector) so the border stays razor-sharp
         at every viewport scale and DPI. It previously used a 2542x1522
         TeachingScreen.webp stretched to 1100x560, then upscaled again by the
         #game transform — a double resample that softened the thin neon line
         and read as "not smooth" on load. Vector has no resample, no decode. */
      background:
        radial-gradient(120% 120% at 50% 42%, rgba(60, 140, 210, .45) 0%, rgba(20, 70, 125, 0) 60%),
        repeating-linear-gradient(0deg, rgba(150, 200, 255, .09) 0 1px, transparent 1px 23px),
        repeating-linear-gradient(90deg, rgba(150, 200, 255, .09) 0 1px, transparent 1px 23px),
        linear-gradient(160deg, #1a558f 0%, #133f72 55%, #102f5c 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, .9) inset,
        0 0 7px 2px rgba(120, 225, 255, .85) inset,
        0 0 22px 4px rgba(70, 150, 255, .30) inset;
    }

    /* Gradient neon ring (cyan → magenta) tracing the rounded border. */
    .teach-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 34px;
      pointer-events: none;
      padding: 3px;
      background: linear-gradient(135deg, #7fe9ff 0%, #bcdcff 32%, #cbb0ff 62%, #ef84ff 100%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter: drop-shadow(0 0 5px rgba(120, 220, 255, .9)) drop-shadow(0 0 5px rgba(225, 130, 255, .55));

      box-shadow: 0 0 26px 4px rgba(70, 150, 255, .45), 0 0 50px 8px rgba(60, 120, 230, .22);

      background: linear-gradient(150deg, #e85bb0 0%, #c8327f 100%);
      z-index: 2;

    /* candy pink gradient fill */
    .np-fill {
      clip-path: polygon(23.0% 43.9%, 23.2% 40.8%, 23.7% 38.3%, 24.5% 36.3%, 25.7% 34.8%, 27.2% 33.8%, 29.1% 33.3%, 31.3% 33.4%, 33.8% 34.0%, 36.6% 35.1%, 48.4% 40.5%, 52.5% 42.6%, 55.6% 44.7%, 57.6% 46.8%, 58.6% 48.9%, 58.6% 51.1%, 57.6% 53.2%, 55.6% 55.3%, 52.5% 57.4%, 48.4% 59.5%, 36.6% 64.9%, 33.8% 66.0%, 31.3% 66.6%, 29.1% 66.7%, 27.2% 66.2%, 25.7% 65.2%, 24.5% 63.7%, 23.7% 61.7%, 23.2% 59.2%, 23.0% 56.1%);
      background: linear-gradient(150deg, #ff7ccb 0%, #ff4fbd 46%, #ff2aa8 100%);
      z-index: 3;
    }
    /* glossy top-left highlight (clipped to the fill triangle) */
    .np-fill::before {
      content: "";
      position: absolute;
      left: 27%; top: 38%;
      width: 26%; height: 13%;
      border-radius: 50%;
      background: radial-gradient(60% 70% at 50% 40%, rgba(255, 255, 255, .92), rgba(255, 255, 255, 0) 72%);
      transform: rotate(-14deg);
    }
    /* inner shadow for depth along the lower-right */
    .np-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(80% 60% at 58% 70%, rgba(150, 8, 78, .55), rgba(150, 8, 78, 0) 58%);
    }
    /* motion streaks trailing off the left */
    .np-streaks {
      left: -1%; top: 35%;
      width: 22%; height: 30%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, .9) 100%);
      -webkit-mask: repeating-linear-gradient(0deg, #000 0 3px, transparent 3px 9px);
              mask: repeating-linear-gradient(0deg, #000 0 3px, transparent 3px 9px);
      filter: blur(.3px);
      z-index: 0;
    }
    /* corner sparkles (4-point stars) */
    .np-spark {
      background: #fff;
      clip-path: polygon(50% 0, 58% 42%, 100% 50%, 58% 58%, 50% 100%, 42% 58%, 0 50%, 42% 42%);
      filter: drop-shadow(0 0 3px rgba(255, 255, 255, .9));
      z-index: 5;
    }
    .np-spark-a { right: 5%;  top: 5%;  width: 12%; aspect-ratio: 1; }
    .np-spark-b { right: 15%; top: 30%; width: 6%;  aspect-ratio: 1; opacity: .85; }
    /* press compress */
    #nextButton.is-success:active .np-frame { filter: drop-shadow(0 2px 3px rgba(70, 50, 80, .3)); }

    #tryAgain:not(.hidden) {
      animation: tryAgainPulse 1.6s ease-in-out infinite;
    }

    @keyframes tryAgainPulse {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, .8)) drop-shadow(0 0 18px rgba(255, 255, 255, .45));
      }
      50% {
        transform: translateX(-50%) scale(1.055);
        filter: drop-shadow(0 0 16px rgba(255, 255, 255, .95)) drop-shadow(0 0 32px rgba(255, 255, 255, .6));
      }
    }

    #tryAgain:active {
      transform: translateX(-50%) scale(.96)
    }

    #nextButton:active {
      opacity: .82;
      transform: translateX(-50%) scale(.96)
    }

    /* Success Next button sits on the right edge, vertically centred. Its own
       transform anchor is translateY(-50%) (not the base translateX), so its
       hover/active/pulse rules below re-state it to avoid snapping to centre. */
    #nextButton.is-success {
      left: auto;
      right: 40px;
      top: 50%;
      bottom: auto;
      width: 150px;
      transform: translateY(-50%);
      filter: drop-shadow(0 0 18px rgba(255, 130, 205, .8)) drop-shadow(0 8px 16px rgba(211, 79, 163, .45));
    }

    #nextButton.is-success:hover {
      transform: translateY(-50%) scale(1.035);
    }

    #nextButton.is-success:active {
      transform: translateY(-50%) scale(.96);
    }

    #nextButton.is-success:not(.hidden) {
      animation: nextSuccessPulse 1.6s ease-in-out infinite;
    }

    @keyframes nextSuccessPulse {
      0%, 100% {
        filter: drop-shadow(0 0 18px rgba(255, 130, 205, .8)) drop-shadow(0 8px 16px rgba(211, 79, 163, .45));
        transform: translateY(-50%) scale(1);
      }
      50% {
        filter: drop-shadow(0 0 28px rgba(255, 160, 220, 1)) drop-shadow(0 0 44px rgba(233, 91, 176, .62));
        transform: translateY(-50%) scale(1.045);
      }
    }

    #finishButton {
      position: absolute;
      left: 50%;
      bottom: 22px;
      width: 250px;
      height: 66px;
      transform: translateX(-50%);
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #55e5ff 0%, #14b9ee 100%);
      color: #fff;
      font-size: 29px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(18, 109, 181, .36);
      box-shadow: inset 0 -5px 0 rgba(0, 131, 210, .28), 0 4px 0 #0aa7e6;
      z-index: 8;
      cursor: pointer;
      transition: transform .12s ease, filter .2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #finishButton:hover {
      filter: brightness(1.05)
    }

    #finishButton:active {
      transform: translateX(-50%) scale(.96)
    }

    #completeStage {
      position: absolute;
      inset: 0;
      z-index: 60;
      overflow: hidden;
      isolation: isolate;
      background-color: #e6f0ff;
      background:
        radial-gradient(circle at 50% 40%, #ffffff 0 13%, #e5efff 35%, #c5daff 100%),
        linear-gradient(180deg, #e6f0ff 0%, #dbeaff 100%);
      transition: opacity .35s ease;
    }

    #completeStage::before {
      content: "";
      position: absolute;
      inset: -110px -180px -60px;
      background: repeating-conic-gradient(from -10deg at 50% 32%,
          rgba(255, 255, 255, .5) 0deg,
          rgba(255, 255, 255, .5) 8deg,
          rgba(170, 201, 255, .2) 8deg,
          rgba(170, 201, 255, .2) 18deg);
      opacity: .74;
      z-index: 0;
      pointer-events: none;
    }

    #completeStage::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 58px;
      height: 31px;
      background: rgba(86, 150, 244, .55);
      box-shadow: 0 -1px 0 rgba(255, 255, 255, .46), 0 6px 16px rgba(77, 136, 221, .2);
      z-index: 1;
    }

    .complete-copy {
      position: absolute;
      left: 50%;
      top: 54px;
      width: 640px;
      transform: translateX(-50%);
      text-align: center;
      color: #10295d;
      font-weight: 900;
      z-index: 6;
      text-shadow: 0 3px 0 rgba(255, 255, 255, .76), 0 6px 13px rgba(20, 50, 104, .16);
    }

    .complete-title {
      font-size: 56px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .complete-sub {
      margin-top: 12px;
      font-size: 32px;
      line-height: 1.1;
      color: #10295d;
    }

    .complete-bots {
      position: absolute;
      left: 50%;
      bottom: 80px;
      width: 940px;
      height: 392px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      transform: translateX(-50%);
      z-index: 3;
    }

    .complete-bot {
      position: relative;
      width: 260px;
      height: 372px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .complete-bot-img {
      display: block;
      width: var(--bot-w);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 16px 20px rgba(63, 96, 151, .2)) drop-shadow(0 0 22px rgba(86, 229, 255, .56));
      animation: completeBotBounce 1.6s ease-in-out infinite;
    }

    .complete-bot:nth-child(2) .complete-bot-img {
      animation-delay: .14s;
    }

    .complete-bot:nth-child(3) .complete-bot-img {
      animation-delay: .28s;
    }

    .complete-token {
      position: absolute;
      left: 50%;
      top: 7px;
      width: 92px;
      height: 92px;
      transform: translateX(-50%);
      animation: completeTokenFloat 1.6s ease-in-out infinite;
    }

    .complete-token-rect {
      top: 27px;
      width: 126px;
      height: 64px;
      border-radius: 0;
      background: #c74c67;
    }

    .complete-token-triangle {
      background: #9B5FD9;
      clip-path: polygon(0 0, 100% 0, 100% 100%);
    }

    .complete-token-circle {
      background: #efa033;
      clip-path: inset(0 0 50% 0);
      border-radius: 50%;
    }

    .complete-confetti {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 5;
      pointer-events: none;
    }

    .complete-confetti span {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w, 12px);
      height: var(--h, 28px);
      border-radius: 6px 6px 3px 3px;
      background: var(--c);
      opacity: 0;
      transform: translate3d(0, -80px, 0) rotate(var(--r));
      animation: completeConfettiFall var(--dur, 3.4s) linear infinite;
      animation-delay: var(--d);
    }

    .complete-ground-shadow {
      position: absolute;
      left: 50%;
      bottom: -2px;
      width: 150px;
      height: 18px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: rgba(47, 85, 144, .16);
      filter: blur(3px);
      z-index: -1;
    }

    @keyframes completeBotBounce {

      0%,
      100% {
        transform: translateY(0) rotate(0)
      }

      50% {
        transform: translateY(-10px) rotate(1.2deg)
      }
    }

    @keyframes completeTokenFloat {

      0%,
      100% {
        transform: translateX(-50%) translateY(0)
      }

      50% {
        transform: translateX(-50%) translateY(-8px)
      }
    }

    @keyframes completeConfettiFall {

      0% {
        opacity: 0;
        transform: translate3d(0, -100px, 0) rotate(var(--r))
      }

      10% {
        opacity: 1
      }

      92% {
        opacity: 1
      }

      100% {
        opacity: 0;
        transform: translate3d(var(--dx, 0px), var(--fall, 780px), 0) rotate(calc(var(--r) + var(--spin, 380deg)))
      }
    }

    /* ── Interactive kid-game animations ── */
    @keyframes piecePopIn {
      0% {
        opacity: 0;
        transform: scale(.45) rotate(-10deg)
      }

      65% {
        transform: scale(1.15) rotate(4deg)
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0)
      }
    }

    .teach-pop {
      animation: piecePopIn .4s cubic-bezier(.34, 1.5, .64, 1) both
    }

    .teach-pop-d1 {
      animation-delay: .16s
    }

    @keyframes sparkDot {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1)
      }

      100% {
        opacity: 0;
        transform: translate(var(--sx), var(--sy)) scale(0)
      }
    }

    .spark-dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkDot .75s ease-out both;
      will-change: transform, opacity;
    }

    @keyframes nextBtnPop {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(.2) rotate(-15deg)
      }

      60% {
        transform: translateX(-50%) scale(1.2) rotate(5deg)
      }

      80% {
        transform: translateX(-50%) scale(.94) rotate(-1deg)
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1) rotate(0)
      }
    }

    @keyframes nextBtnGlow {

      0%,
      100% {
        filter: none
      }

      50% {
        filter: drop-shadow(0 0 14px rgba(116, 219, 255, .95)) brightness(1.12)
      }
    }

    #nextButton:not(.hidden) {
      animation: nextBtnPop .5s cubic-bezier(.34, 1.3, .64, 1) both,
        nextBtnGlow 1.4s ease-in-out .52s infinite;
    }

    @keyframes idleHintPulse {

      0%,
      100% {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, .3));
        transform: scale(1);
      }

      50% {
        filter: drop-shadow(0 0 22px rgba(116, 219, 255, .95));
        transform: scale(1.14);
      }
    }

    #btnLeft.idle-hint {
      animation: idleHintPulse 1.4s ease-in-out infinite;
      z-index: 40;
    }

    #btnRight.idle-hint {
      animation: idleHintPulse 1.4s ease-in-out infinite;
      z-index: 40;
    }

    .wrong-fit-glow {
      filter: none !important;
    }

    .wrong-fit-hold {
      animation: none;
    }

    @media (prefers-reduced-motion:reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important
      }
    }

  </style>
</head>

<body>
  <main id="game" aria-label="PowerUp Bots halves game">
    <img id="sceneBg" class="bg" src="assets/Mainbg.webp" alt="">
    <div id="focusDim" aria-hidden="true"></div>

    <section id="instruction" class="hidden" aria-live="polite">

    <section id="scene">

        <img class="corner-slot cs-tr" src="assets/SquareHollow.webp" alt="">
        <img class="corner-slot cs-bl" src="assets/SquareHollow.webp" alt="">

      <div id="flightLayer" aria-hidden="true"></div>

      <div class="gate-half gate-right"></div>
    </div>

  <script>
    (function () {
      var game = document.getElementById("game");

      function resize() {
        var scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
        game.style.transform = "scale(" + scale + ")";
        game.style.left = ((window.innerWidth - 1280 * scale) / 2) + "px";
        game.style.top = ((window.innerHeight - 720 * scale) / 2) + "px";
      }

      window.addEventListener("resize", resize);
      resize();
    })();

    var ASSETS = "assets/";

    var TIMING = {
      SHORT_SCREEN: 3800,
      LONG_SCREEN: 5400,
      PREPLAY_SCREEN: 4000,
      PLUG_SCREEN: 5200,   /* let the wire-draw + plug connect + energy beads (finish ~3.8s) settle with a beat */
      READY_TEXT_SCREEN: 3300,
      CHARGE_BEAM_IN: 550,    /* hold on the bots-only beat before the light-cone flashes on */
      INTRO_SCREEN: 6500,     /* lead-in + beam flash + flashlight cue, then the panel/voice, then a held beat */
      MOVE_SCREEN: 1500,
      HALVES_DEMO_SCREEN: 12500,
      TEACH_WHOLE_IN: 150,
      TEACH_LABEL_IN: 850,
      TEACH_MOVE_DOWN: 1900,
      TEACH_SPLIT: 2700,
      TEACH_HALF_LABELS: 3400,
      TEACH_EQUAL_LABEL: 4400,
      TEACH_NEXT_BUTTON: 5500
    };

    var EASE = {
      SOFT: "cubic-bezier(.65, 0, .35, 1)",
      BACK: "cubic-bezier(.18, .89, .32, 1.18)",
      SNAP: "cubic-bezier(.16, 1.18, .3, 1)"
    };

    /* ── Web Audio sounds ── */
    var _ac = null;
    var _pendingPlugConnect = null;
    var THEME_BASE_VOLUME = 0.12;
    var THEME_DUCK_VOLUME = 0.04;

    function idleHintDirection() {
      var r = currentRound();
      if (!r) return null;
      var cur = state.angle;
      var targets = acceptedCutAnglesForRound(r);
      /* Grid round: steer toward whichever axis still needs a cut, so after the
         first (e.g. vertical) cut the hint points the player to the
         perpendicular (horizontal) one instead of saying "already aligned". */
      if (r.cut === "grid") {
        var done = state.gridCutOrients || [];
        if (done.indexOf("vertical") !== -1 && done.indexOf("horizontal") === -1) {
          targets = [0, 180];
        } else if (done.indexOf("horizontal") !== -1 && done.indexOf("vertical") === -1) {
          targets = [90, 270];
        }
      }
      /* Button semantics (matching tutorial): LEFT button rotates +45,
         RIGHT button rotates -45. So "go +angle" → press LEFT,
         "go -angle" → press RIGHT. */
      var bestPlusSteps = Infinity, bestMinusSteps = Infinity;
      targets.forEach(function (t) {
        var plusSteps = ((t - cur + 360) % 360) / 45;
        var minusSteps = ((cur - t + 360) % 360) / 45;
        if (plusSteps < bestPlusSteps) { bestPlusSteps = plusSteps; }
        if (minusSteps < bestMinusSteps) { bestMinusSteps = minusSteps; }
      });
      if (bestPlusSteps === 0 || bestMinusSteps === 0) { return null; } /* already aligned — let cut do its thing */
      return bestPlusSteps < bestMinusSteps ? "left" : "right";

         this, the next round's setupBots writes new top/marginLeft/width

    function isIntroPlacement(layout) {
      return layout === "layout-intro" || layout === "layout-intro-plug" || layout === "layout-intro-connected";
    }

    function botWidthForLayout(r, layout) {
      if (isIntroPlacement(layout)) {
        return r.botWIntro;
      }
      if (layout === "layout-laser") {
        return r.botWLaser || r.botWReady;
      }
      return r.botWReady;
    }

    function showsChargingPods(layout) {
      return layout === "layout-ready" || layout === "layout-laser" ||
        layout === "layout-intro-plug" || layout === "layout-intro-connected";
    }

    function introPlugYOffset(layout) {
      return layout === "layout-intro-plug" || layout === "layout-intro-connected" ? 18 : 0;
    }

    function connectedPodPlacement(layout, options) {
      return layout === "layout-intro-connected" ||
        layout === "layout-intro-plug" ||
        layout === "layout-ready" ||
        layout === "layout-laser";
    }

    function connectorOverlapBoostForRound(r, layout, options) {
      if (!connectedPodPlacement(layout, options)) {
        return 0;
      }
      if (layout === "layout-ready" && r && r.readyConnectorOverlapBoost !== undefined) {
        return r.readyConnectorOverlapBoost;
      }
      if (layout === "layout-laser" && r && r.laserConnectorOverlapBoost !== undefined) {
        return r.laserConnectorOverlapBoost;
      }
      return r && r.connectorOverlapBoost !== undefined ? r.connectorOverlapBoost : 0;
    }

    function clearPodIntroLayers() {
      Array.prototype.slice.call(els.bots.querySelectorAll(".pod-seq-layer")).forEach(function (node) {
        if (node.parentNode) {
          node.parentNode.removeChild(node);
        }
      });
    }

    function clearHollowFocusLayers() {
      Array.prototype.slice.call(els.bots.querySelectorAll(".pod-hollow-focus, .pod-hollow-focus-frame")).forEach(function (node) {
        if (node.parentNode) {
          node.parentNode.removeChild(node);
        }
      });
    }

    function clearConnectorStemCovers() {
      Array.prototype.slice.call(els.bots.querySelectorAll(".pod-connector-neck-cover")).forEach(function (node) {
        if (node.parentNode) {
          node.parentNode.removeChild(node);
        }
      });
    }

    function addPodIntroLayer(slotEl, podEl, className, delay) {
      var layer = document.createElement("img");
      layer.className = "pod-seq-layer " + className;
      layer.src = podEl.src;
      layer.alt = "";
      layer.setAttribute("aria-hidden", "true");
      layer.style.top = podEl.style.top;
      layer.style.width = podEl.style.width;
      layer.style.transform = podEl.style.transform;
      layer.style.marginLeft = podEl.style.marginLeft || "0px";
      if (delay) {
        layer.style.animationDelay = delay + "ms";
      }
      slotEl.insertBefore(layer, podEl);
    }

    function addPlugIntroSequence(options) {
      options = options || {};
      if (!options.connect) { return; }
      [
        { slot: els.leftBot.parentNode, pod: els.leftPod, delay: 0 },
        { slot: els.rightBot.parentNode, pod: els.rightPod, delay: 60 }
      ].forEach(function (item) {
        addPodIntroLayer(item.slot, item.pod, "pod-seq-hollow", item.delay);
        addPodIntroLayer(item.slot, item.pod, "pod-seq-cable", 460 + item.delay);
      });
    }

    /* Hides a horizontal band of the pod-img via a CSS mask. Used to remove the
       "neck" taper in the circle-horizontal LEFT pod asset, where the asset's
       narrow arc tip transitions through a wide cream taper into the cable —
       the orange piece's narrow apex can't cover that taper, so the cream
       reads as an asymmetric "thick rim" next to the other pod. Hiding the
       band makes the cable visually emerge from the orange's apex like the
       other side. `band` is `{start, end}` as fractions of the pod-img height,
       or null/undefined to clear. */
    function applyPodMaskBand(podEl, band) {
      if (!podEl) { return; }
      if (!band) {
        podEl.style.webkitMaskImage = "";
        podEl.style.maskImage = "";
        return;
      }
      var startPct = (band.start * 100).toFixed(3) + "%";
      var endPct = (band.end * 100).toFixed(3) + "%";
      var grad = "linear-gradient(to bottom, black 0%, black " + startPct +
                 ", transparent " + startPct + ", transparent " + endPct +
                 ", black " + endPct + ", black 100%)";
      podEl.style.webkitMaskImage = grad;
      podEl.style.maskImage = grad;
    }

    function connectorStemCoverForRound(r, side, podW) {
      if (!r || !r.connectorStemCover) { return null; }
      var cfg = side === "right" ? r.connectorStemCover.right : r.connectorStemCover.left;
      if (!cfg) { return null; }
      var scale = podW / (r.podW || podW || 1);
      return {
        top: (cfg.top || 0) * scale,
        width: (cfg.width || 20) * scale,
        height: (cfg.height || 15) * scale,
        x: (cfg.x || 0) * scale
      };
    }

    function connectorStemCoverNode(slotEl) {
      var covers = slotEl ? slotEl.querySelectorAll(".pod-connector-neck-cover") : [];
      return covers.length ? covers[0] : null;
    }

    function addConnectorStemCover(slotEl, podEl) {
      var r = currentRound();
      var side = slotEl.classList.contains("right-bot") ? "right" : "left";
      var podW = parseFloat(podEl.style.width) || (r && r.podW) || 132;
      var cfg = connectorStemCoverForRound(r, side, podW);
      if (!cfg) { return; }
      var cover = connectorStemCoverNode(slotEl);
      if (!cover) {
        cover = document.createElement("div");
        cover.className = "pod-connector-neck-cover visible";
        cover.setAttribute("aria-hidden", "true");
        slotEl.insertBefore(cover, podEl.nextSibling);
      }
      cover.setAttribute("aria-hidden", "true");
      cover.classList.add("visible");
      cover.style.transition = podEl.style.transition || "top .4s ease, margin-left .4s ease";
      cover.style.top = (parseFloat(podEl.style.top) + cfg.top) + "px";
      cover.style.marginLeft = ((parseFloat(podEl.style.marginLeft) || 0) + cfg.x) + "px";
      cover.style.setProperty("--connector-cover-w", cfg.width + "px");
      cover.style.setProperty("--connector-cover-h", cfg.height + "px");
    }

    function diagonalSemicircleFocusPath(r, side, w, h, pad) {
      var angle = canonicalCutAngle(r) * Math.PI / 180;
      var orientation = cutOrientation(canonicalCutAngle(r));
      var slotIndex = side === "right" ? 1 : 0;
      var pieceIndex = pieceIndexForSlot(r, slotIndex);
      var keepSign = lineSideForPiece(orientation, pieceIndex);
      var cx = pad + w / 2;
      var cy = pad + h / 2;
      var radius = Math.min(w, h) / 2;
      var dx = Math.cos(angle);
      var dy = Math.sin(angle);
      var startA = angle;
      var endA = angle + Math.PI;
      var midA = Math.atan2(-dx * keepSign, dy * keepSign);
      var twoPi = Math.PI * 2;

      function norm(a) {
        a = a % twoPi;
        return a < 0 ? a + twoPi : a;
      }

      function forwardDistance(a, b) {
        return (norm(b) - norm(a) + twoPi) % twoPi;
      }

      function point(a) {
        return {
          x: cx + Math.cos(a) * radius,
          y: cy + Math.sin(a) * radius
        };
      }

      function fmt(p) {
        return p.x.toFixed(1) + "," + p.y.toFixed(1);
      }

      var start = point(startA);
      var end = point(endA);
      var forwardArc = forwardDistance(endA, midA) <= Math.PI + 0.001;
      var arcDistance = forwardArc ? forwardDistance(endA, startA) : forwardDistance(startA, endA);
      var path = "M" + fmt(start) + " L" + fmt(end);
      var steps = 28;
      for (var i = 1; i <= steps; i++) {
        var t = i / steps;
        var a = forwardArc ? endA + arcDistance * t : endA - arcDistance * t;
        path += " L" + fmt(point(a));
      }
      return path + " Z";
    }

    function addSemicircleFocusLayer(slotEl, side) {
      var r = currentRound();
      if (!r || r.name !== "circle" ||
        (r.variant !== "circle-horizontal" && r.variant !== "circle-vertical" &&
          r.variant !== "circle-diagonal")) {
        return false;
      }
      var fill = side === "right" ? els.rightFill : els.leftFill;
      if (!fill) { return false; }

      // Diagonal-circle: outline the SAME calibrated hollow shape the fill uses,
      // anchored to the pod box, so the cyan highlight traces the hollow exactly
      // (instead of the old slot-relative, hand-offset path that drifted inside it).
      if (r.variant === "circle-diagonal") {
        var dgeo = DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)];
        var dpod = side === "right" ? els.rightPod : els.leftPod;
        if (dgeo && dpod) {
          var fPodW = r.podW || 132;
          var fPodH = diagPodH(r, side);
          // The left/right pods are different assets with hollows ~6% different in size.
          // The cue uses ONE uniform radius so both sides look equal; biased slightly small
          // so it never spills out of the smaller hollow (at most a hair inside the larger).
          var fcx = dgeo.fx * fPodW, fcy = dgeo.fy * fPodW, frr = DIAG_FOCUS_RADIUS_FRAC * fPodW;
          var fd = semicircleSegmentPath(fcx, fcy, frr, dgeo.diamAng, dgeo.keepDir, DIAG_FILL_FLATPAD);
          var fns = "http://www.w3.org/2000/svg";
          var fsvg = document.createElementNS(fns, "svg");
          fsvg.setAttribute("viewBox", "0 0 " + fPodW + " " + fPodH);
          fsvg.classList.add("pod-hollow-focus-frame", "semicircle-focus", r.variant, "slot-" + side);
          fsvg.setAttribute("aria-hidden", "true");
          fsvg.style.top = (parseFloat(dpod.style.top) || 0) + "px";
          fsvg.style.width = fPodW + "px";
          fsvg.style.height = fPodH + "px";
          fsvg.style.marginLeft = (parseFloat(dpod.style.marginLeft) || 0) + "px";
          fsvg.style.transform = "translateX(-50%)"; // centre on the pod even before the pulse animation starts
          fsvg.style.transformOrigin = fcx + "px " + fcy + "px"; // pulse scales around the hollow, not the tall box
          ["semicircle-focus-aura", "semicircle-focus-rim"].forEach(function (className) {
            var fp = document.createElementNS(fns, "path");
            fp.setAttribute("class", className);
            fp.setAttribute("d", fd);
            fsvg.appendChild(fp);
          });
          slotEl.insertBefore(fsvg, fill.nextSibling);
          return true;
        }
      }

      var baseW = parseFloat(fill.style.width) || targetSlotSizeForRound(r).width;
      var baseH = parseFloat(fill.style.height) || targetSlotSizeForRound(r).height;
      var top = parseFloat(fill.style.top) || 0;
      var marginLeft = parseFloat(fill.style.marginLeft) || 0;
      var pad = r.variant === "circle-diagonal" ? 14 : (r.variant === "circle-vertical" ? 12 : 10);
      var focusOffset = (r.semicircleFocusOffset && (side === "right" ? r.semicircleFocusOffset.right : r.semicircleFocusOffset.left)) || {};
      var focusScaleCfg = r.semicircleFocusScale;
      var focusScale = 1;
      if (typeof focusScaleCfg === "number") {
        focusScale = focusScaleCfg;
      } else if (focusScaleCfg) {
        focusScale = side === "right" ? (focusScaleCfg.right || 1) : (focusScaleCfg.left || 1);
      }
      var w = baseW * focusScale;
      var h = baseH * focusScale;
      var svgW = w + pad * 2;
      var svgH = h + pad * 2;
      var p = pad;
      var d = "";

      if (r.variant === "circle-horizontal") {
        if (side === "right") {
          d = "M" + p + "," + (p + h) +
            " L" + (p + w) + "," + (p + h) +
            " C" + (p + w) + "," + (p - h * 0.333) +
            " " + p + "," + (p - h * 0.333) +
            " " + p + "," + (p + h) + " Z";
        } else {
          d = "M" + p + "," + p +
            " L" + (p + w) + "," + p +
            " C" + (p + w) + "," + (p + h * 1.333) +
            " " + p + "," + (p + h * 1.333) +
            " " + p + "," + p + " Z";
        }
      } else if (r.variant === "circle-vertical" && side === "right") {
        d = "M" + p + "," + p +
          " L" + p + "," + (p + h) +
          " C" + (p + w * 1.333) + "," + (p + h) +
          " " + (p + w * 1.333) + "," + p +
          " " + p + "," + p + " Z";
      } else if (r.variant === "circle-vertical") {
        d = "M" + (p + w) + "," + p +
          " L" + (p + w) + "," + (p + h) +
          " C" + (p - w * 0.333) + "," + (p + h) +
          " " + (p - w * 0.333) + "," + p +
          " " + (p + w) + "," + p + " Z";
      } else {
        d = diagonalSemicircleFocusPath(r, side, w, h, p);
      }

      var ns = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(ns, "svg");
      svg.setAttribute("viewBox", "0 0 " + svgW + " " + svgH);
      svg.classList.add("pod-hollow-focus-frame", "semicircle-focus", r.variant, "slot-" + side);
      svg.setAttribute("aria-hidden", "true");
      svg.style.top = (top - pad - (h - baseH) / 2 + (focusOffset.y || 0)) + "px";
      svg.style.width = svgW + "px";
      svg.style.height = svgH + "px";
      svg.style.marginLeft = (marginLeft - (w - baseW) / 2 + (focusOffset.x || 0)) + "px";

      ["semicircle-focus-aura", "semicircle-focus-rim"].forEach(function (className) {
        var path = document.createElementNS(ns, "path");
        path.setAttribute("class", className);
        path.setAttribute("d", d);
        svg.appendChild(path);
      });
      slotEl.insertBefore(svg, fill.nextSibling);
      return true;
    }

    function addHollowFocusLayer(slotEl, podEl) {
      var r = currentRound();
      var side = slotEl.classList.contains("right-bot") ? "right" : "left";
      var isTrianglePod = r && r.name === "square";
      var podW = parseFloat(podEl.style.width) || (r && r.podW) || 132;
      if (addSemicircleFocusLayer(slotEl, side)) {
        return;
      }
      if (isTrianglePod) {
        var ns = "http://www.w3.org/2000/svg";
        var svg = document.createElementNS(ns, "svg");
        var isRight = side === "right";
        var viewBox = isRight ? "0 0 444 430" : "0 0 469 390";
        var points = isRight ? "10,59 375,59 375,424" : "69,2 69,367 434,367";
        svg.setAttribute("viewBox", viewBox);
        svg.classList.add("pod-hollow-focus-frame", "triangle-focus", isRight ? "triangle-right" : "triangle-left");
        svg.setAttribute("aria-hidden", "true");
        svg.style.top = podEl.style.top;
        svg.style.width = podW + "px";
        svg.style.height = Math.round(podW * (isRight ? 430 / 444 : 390 / 469)) + "px";
        svg.style.marginLeft = podEl.style.marginLeft || "0px";

        ["triangle-focus-aura", "triangle-focus-rim"].forEach(function (className) {
          var poly = document.createElementNS(ns, "polygon");
          poly.setAttribute("class", className);
          poly.setAttribute("points", points);
          svg.appendChild(poly);
        });
        slotEl.insertBefore(svg, podEl.nextSibling);
        return;
      }

      var layer = document.createElement("img");
      layer.className = "pod-hollow-focus";
      layer.src = podEl.src;
      layer.alt = "";
      layer.setAttribute("aria-hidden", "true");
      layer.style.top = podEl.style.top;
      layer.style.width = podEl.style.width;
      layer.style.transform = podEl.style.transform;
      layer.style.marginLeft = podEl.style.marginLeft || "0px";
      if (r && r.hollowFocusClip) {
        layer.style.clipPath = r.hollowFocusClip;
      }
      slotEl.insertBefore(layer, podEl.nextSibling);

      var frame = document.createElement("div");
      frame.className = "pod-hollow-focus-frame";
      frame.setAttribute("aria-hidden", "true");
      var focusOffset = (r && r.focusFrameOffset) || {};
      var focusScale = podW / ((r && r.podW) || podW || 1);
      frame.style.top = (parseFloat(podEl.style.top) + (focusOffset.top || 0) * focusScale) + "px";
      var ffs = r && r.focusFrameSize;
      var wRatio = (ffs && ffs.wRatio) || 0.79;
      var hRatio = (ffs && ffs.hRatio) || 0.79;
      frame.style.setProperty("--hollow-focus-w", Math.round(podW * wRatio) + "px");
      frame.style.setProperty("--hollow-focus-h", Math.round(podW * hRatio) + "px");
      frame.style.marginLeft = ((parseFloat(podEl.style.marginLeft) || 0) + (focusOffset.x || 0) * focusScale) + "px";
      if (podEl.style.transform && podEl.style.transform.indexOf("scaleX(-1)") !== -1) {
        frame.style.transform = "translateX(-50%) scaleX(-1)";
      }
      slotEl.insertBefore(frame, layer.nextSibling);
    }

    function setupBots(layout, options) {
      var r = currentRound();
      options = options || {};
      var shouldAnimateConnection = (layout === "layout-ready" || layout === "layout-intro-plug") && options.connect === true;
      var className = layout;
      if (shouldAnimateConnection) {
        className += " power-connecting";
      } else if (showsChargingPods(layout)) {
        className += " power-connected";
      }
      if (options.moveFromCenter) {
        className += " move-from-center";
      }
      clearPodIntroLayers();
      clearHollowFocusLayers();
      clearConnectorStemCovers();
      /* Defensive: setupBots is also called outside the renderStep path
         (showSuccess, showFail, tryAgain, restoreMachineForRetry). If a
         stale inline transition from a previous switchBotsToHappy survived
         to this point, the new top/marginLeft we're about to write below
         would animate over ~0.4s — visible as a slide/snap. Snap inline
         transitions to none before we write the new geometry; CSS-class
         driven animations (powerCableConnect etc.) still fire normally. */
      [els.leftPod, els.rightPod, els.leftFill, els.rightFill].forEach(function (el) {
        if (el) { el.style.transition = ""; }
      });
      els.leftBot.parentNode.classList.remove("celebrate-jump");
      els.rightBot.parentNode.classList.remove("celebrate-jump");
      els.bots.className = className;
      els.leftBot.src = r.sadBot;
      els.rightBot.src = r.sadBot;
      els.leftPod.src = r.podLeft || r.pod;
      els.rightPod.src = r.podRight || r.pod;
      els.leftPod.style.transform = r.podFlipLeft ? "translateX(-50%) scaleX(-1)" : "translateX(-50%)";
      els.rightPod.style.transform = r.podFlipRight ? "translateX(-50%) scaleX(-1)" : "translateX(-50%)";
      /* Defer pod-mask application until fillSlotWithPiece runs. The mask
         (used by round 7 LEFT pod to hide the cream "neck" taper that the
         orange piece's apex can't cover) creates a visible *cable cut*
         between the bowl and the connector when the slot is still empty —
         because the masked band sits in the bowl-to-cable transition of
         the asset. Clearing the mask in the empty state lets the cable
         render whole; fillSlotWithPiece re-applies the mask once the
         orange piece is in the bowl and hiding the taper is actually

    function clearTargetFills() {

      var width = slotSize.width;
      var height = slotSize.height;

      ].forEach(function (item) {

        fill.style.left = "50%";

        fill.style.marginLeft = (targetSlotXOffsetForRound(r, item.side) + podXOffsetForRound(r, item.side)) + "px";

        fill.style.setProperty("--slot-focus-radius", focusStyle.radius);

    function setSocketFocus(active) {

      });
      clearHollowFocusLayers();
      if (!active) { return; }
      addHollowFocusLayer(els.leftBot.parentNode, els.leftPod);
      addHollowFocusLayer(els.rightBot.parentNode, els.rightPod);
    }

    function makeBlock(r, width, height) {
      if (r.blockSrc) {
        var img = document.createElement("img");
        img.src = r.blockSrc;
        img.className = "whole-block";
        img.style.width = width + "px";
        img.style.height = height + "px";
        if (r.name === "circle") {

        }

      }
      var square = document.createElement("div");
      square.className = "whole-block css-square";

      square.style.height = height + "px";

    }

    function normalizedAngle(angle) {
      return ((angle % 360) + 360) % 360;
    }

    function lineAngleDegrees(angle) {

      return snap === 180 ? 0 : snap;
    }

    function canonicalCutAngle(r) {

      if (r.cut === "horizontal") { return 0; }
      if (r.cut === "diagonal") { return 45; }
      if (r.cut === "diagonal135") { return 135; }
      return 90;
    }

    function cutOrientation(angle) {

      if (snap === 90) { return "vertical"; }
      if (snap === 45) { return "backslash"; }
      return "slash";
    }

    function lineSideForPiece(orientation, index) {
      if (orientation === "horizontal") {
        return index === 0 ? 1 : -1;
      }
      if (orientation === "backslash") {
        return index === 0 ? 1 : -1;
      }
      return index === 0 ? -1 : 1;
    }

    function clipPolygon(points, width, height, angle, keepSign) {
      var rad = lineAngleDegrees(angle) * Math.PI / 180;
      var dx = Math.cos(rad);
      var dy = Math.sin(rad);
      var cx = width / 2;
      var cy = height / 2;
      var eps = 0.001;

      function side(p) {
        return (p.x - cx) * dy - (p.y - cy) * dx;
      }
      function inside(s) {
        return keepSign > 0 ? s >= -eps : s <= eps;
      }
      function intersect(a, b, sa, sb) {
        var t = sa / (sa - sb);
        return {
          x: a.x + (b.x - a.x) * t,
          y: a.y + (b.y - a.y) * t
        };
      }

      var output = [];
      for (var i = 0; i < points.length; i++) {
        var current = points[i];
        var prev = points[(i + points.length - 1) % points.length];
        var currentSide = side(current);
        var prevSide = side(prev);
        var currentInside = inside(currentSide);
        var prevInside = inside(prevSide);

        if (currentInside) {
          if (!prevInside) {
            output.push(intersect(prev, current, prevSide, currentSide));
          }
          output.push(current);
        } else if (prevInside) {
          output.push(intersect(prev, current, prevSide, currentSide));
        }
      }

      return output.filter(function (p, index, arr) {
        var prev = arr[(index + arr.length - 1) % arr.length];
        return Math.abs(p.x - prev.x) > eps || Math.abs(p.y - prev.y) > eps;
      });
    }

    function pieceGeometry(width, height, angle, index) {
      var orientation = cutOrientation(angle);
      var rect = [
        { x: 0, y: 0 },
        { x: width, y: 0 },
        { x: width, y: height },
        { x: 0, y: height }
      ];
      var polygon = clipPolygon(rect, width, height, angle, lineSideForPiece(orientation, index));

      if (polygon.length < 3) {
        polygon = rect;
      }

      var minX = Math.min.apply(null, polygon.map(function (p) { return p.x; }));
      var minY = Math.min.apply(null, polygon.map(function (p) { return p.y; }));
      var maxX = Math.max.apply(null, polygon.map(function (p) { return p.x; }));
      var maxY = Math.max.apply(null, polygon.map(function (p) { return p.y; }));
      var boxW = Math.max(1, maxX - minX);
      var boxH = Math.max(1, maxY - minY);
      var clip = polygon.map(function (p) {
        var x = ((p.x - minX) / boxW * 100).toFixed(3).replace(/\.?0+$/, "");
        var y = ((p.y - minY) / boxH * 100).toFixed(3).replace(/\.?0+$/, "");
        return x + "% " + y + "%";
      }).join(",");
      var clipInner = polygon.map(function (p) {
        var x = (p.x / width * 100).toFixed(3).replace(/\.?0+$/, "");
        var y = (p.y / height * 100).toFixed(3).replace(/\.?0+$/, "");
        return x + "% " + y + "%";

        minY: minY,
        width: boxW,
        height: boxH,

        clipInner: "polygon(" + clipInner + ")",

    }

        top: top,

        centerY: top + g.height / 2,
        width: g.width,
        height: g.height

    }

    /* Maps slot index (0=left, 1=right) to the correct piece index for that round.

       Square: piece 0=upper-right goes to right pod, piece 1=lower-left goes to left pod (45° cut).

        return slotIndex === 0 ? 1 : 0;
      }
      if (r.name === "square") {
        return slotIndex === 0 ? 1 : 0;
      }

    }

    function makeCutPiece(r, index, width, height, angle) {
      var g = pieceGeometry(width, height, angle, index);
      var wrap = document.createElement("div");
      wrap.className = "half-wrap";
      wrap.style.width = g.width + "px";
      wrap.style.height = g.height + "px";
      /* Remove clipPath from wrap so drop-shadow works correctly on its children */

      if (r.blockSrc) {
        /* Build the clipped image as a true SVG, constructed via the DOM API
           (createElementNS) instead of `svg.innerHTML = ...`. Setting
           innerHTML on an SVG element has a known Chromium first-paint
           glitch where the inner `<image>` paints UNCLIPPED for one frame
           before the `<defs>/<clipPath>` reference is resolved — visible as
           an oversized rectangle (rectangle block) or full circle (circle
           block) right before the half snaps into its real shape. Building
           the same tree node-by-node forces the clip-path linkage to be
           live on the very first paint. Safe: produces a structurally

        svg.style.left = (-g.minX) + "px";
        svg.style.top = (-g.minY) + "px";

        var defs = document.createElementNS(ns, "defs");

        clip.setAttribute("id", clipId);

        poly.setAttribute("points", g.absPolygon);
        clip.appendChild(poly);
        defs.appendChild(clip);

          var circleClip = document.createElementNS(ns, "clipPath");

        var imageEl = document.createElementNS(ns, "image");
        imageEl.setAttributeNS(xlinkNs, "xlink:href", r.blockSrc);
        imageEl.setAttribute("href", r.blockSrc);
        imageEl.setAttribute("width", width);
        imageEl.setAttribute("height", height);
        imageEl.setAttribute("clip-path", "url(#" + clipId + ")");
        imageEl.setAttribute("preserveAspectRatio", "none");
        groupEl.appendChild(imageEl);
        svg.appendChild(groupEl);

           block clipped to this piece's polygon — so for the circle keep its 50%
           radius (full disc) and the clip yields a SEMICIRCLE, not a square. */
        var inner = makeBlock(r, width, height);

        inner.style.filter = "none";
        inner.style.borderRadius = (r.name === "circle" ? "50%" : "0");
        inner.style.left = (-g.minX) + "px";
        inner.style.top = (-g.minY) + "px";
        inner.style.clipPath = g.clipInner;
        wrap.appendChild(inner);
      }
      return wrap;
    }

    function makeHalf(r, index, width, height) {
      return makeCutPiece(r, index, width, height, canonicalCutAngle(r));
    }

    /* ── 2×2 grid pieces (square cut into four equal parts) ──

    function gridQuarterGeometry(width, height, index) {

    function quarterRadius(r, index) {

    }

    function makeQuarterPiece(r, index, width, height) {
      var g = gridQuarterGeometry(width, height, index);
      var wrap = document.createElement("div");
      wrap.className = "half-wrap quarter-wrap";
      wrap.style.width = g.width + "px";
      wrap.style.height = g.height + "px";

        holder.style.height = g.height + "px";

        img.src = r.blockSrc;

        img.style.width = width + "px";
        img.style.height = height + "px";
        img.style.left = (-g.minX) + "px";
        img.style.top = (-g.minY) + "px";

    /* ── Arbitrary two-cut geometry ──
