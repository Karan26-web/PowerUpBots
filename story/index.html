      if (r.cut === "grid") { setupGridBots({ showBots: false, showSlots: true }); }
      else { setupBots("layout-ready"); }
      setInstruction(text);
      /* "Cut the block into four equal parts": the block visibly SPLITS into 4
         here (grid round), so the cut actually happens before "make sure all
         parts fit" — bridging the two screens. Non-grid keeps the whole block. */
      if (r.cut === "grid") { renderQuarterCue(); }
      else { renderWhole(true); }
    }

    /* Guided slot preview for the grid round (Figma 11:1908): the four quarter
       pieces sit in a 2×2 at centre, a curved dashed arrow arcs from each piece
       to its corner hollow, and the pieces travel along those arcs into the
       hollows and back to centre, looping until the scene advances. */
    function gridSlotPreview() {
      var r = currentRound();
      els.flightLayer.innerHTML = "";   /* clears any stale guide + pieces */
      hide(els.shapeStage);
      /* Seat the preview pieces at the SAME spot as the real success/fit screen
         (flyQuartersToCorners non-diag): slot centre + SquareHollow's left/up
         cavity offset, so the demo lands the pieces exactly where they'll seat. */
      var nudgeX = r.slotNudge ? r.slotNudge.x : -4;
      var nudgeY = r.slotNudge ? r.slotNudge.y : -3;

      var slots = els.cornerSlotEls.map(function (s) { return gameSpaceCenter(s); });
      var cx = 640, cy = 360, gap = 5;
      var anims = [];

      /* Diagonal rounds: the cut block's four diagonal triangles fly out from the
         centre. Each starts as its cut quarter (the four tile the block) and OPENS
         OUT (clip morph) into the seated corner triangle as it slides to its slot
         and shrinks from block size to the cavity — a single fly-out, then hold. */
      if (isDiagRound(r)) {
        var dnx = r.slotNudge ? r.slotNudge.x : 0, dny = r.slotNudge ? r.slotNudge.y : 0;
        els.cornerSlotEls.forEach(function (slot, i) {
          var sc = slots[i];
          var box = triSeatBox(r, sc);
          var piece = makeCornerTriangle(r, i, box.w, box.h, 0);   /* start: cut quarter */
          piece.style.position = "absolute";
          piece.style.left = (cx - box.w / 2) + "px";
          piece.style.top = (cy - box.h / 2) + "px";
          els.flightLayer.appendChild(piece);
          var ex = sc.x + dnx, ey = sc.y + dny;   /* seat = hollow centre */
          /* Clean radial guide: a gentle tangential bow (shared sign → the four
             arcs pinwheel instead of crossing the block); arrow starts at the
             block edge and its head points straight at the hollow. */
          var dx = ex - cx, dy = ey - cy;
          var len = Math.sqrt(dx * dx + dy * dy) || 1;
          var ux = dx / len, uy = dy / len;
          var ctlX = (cx + ex) / 2 - uy * 26, ctlY = (cy + ey) / 2 + ux * 26;
          /* Aim the arrow at the seated triangle's CENTROID (the filled centre of
             the hollow). The hollow's box centre sits on the piece's hypotenuse
             edge, so an arrow ending there reads as "pointing at the border".
             Diamond only; triangle1 keeps the box-centre target. The piece still
             SEATS at ex,ey — only the guide arrow is re-aimed. */
          var aimX = ex, aimY = ey;
          if (r.diamondHollows) {
            var t1 = DIAMOND_T1[i] || DIAMOND_T1[0];
            var ccx = (t1[0][0] + t1[1][0] + t1[2][0]) / 3, ccy = (t1[0][1] + t1[1][1] + t1[2][1]) / 3;
            aimX = ex + (ccx - 50) / 100 * box.w;
            aimY = ey + (ccy - 50) / 100 * box.h;
          }
          addSlotPathGuide(cx + ux * 104, cy + uy * 104, ctlX, ctlY, aimX, aimY, i);
          /* start ASSEMBLED at block size (the four cut quarters tile a clean
             square at centre); the bounce then carries them out to the hollows. */
          var startScale = (r.blockW || 200) / box.w;
          piece.style.transform = "scale(" + startScale.toFixed(3) + ")";
          anims.push({ piece: piece, sx: cx, sy: cy, cx2: ctlX, cy2: ctlY, ex: ex, ey: ey, diag: true, corner: i, startScale: startScale });
        });
      } else {
      [0, 1, 2, 3].forEach(function (i) {
        var slot = slots[i];
        var g = gridQuarterGeometry(r.blockW, r.blockH, i);
        /* Start TOUCHING (the four quarters form the whole block); the split
           reveal then nudges each outward before they fly. */
        /* Start TOUCHING — the four quarters form a clean whole block at centre. */
        var pcx = cx - r.blockW / 2 + g.minX + g.width / 2;
        var pcy = cy - r.blockH / 2 + g.minY + g.height / 2;
        var piece = makeQuarterPiece(r, i, r.blockW, r.blockH);
        piece.classList.add("flying-half");
        piece.style.position = "absolute";
        piece.style.left = (pcx - g.width / 2) + "px";
        piece.style.top = (pcy - g.height / 2) + "px";
        piece.style.transformOrigin = "center center";
        piece.style.filter = "none";
        els.flightLayer.appendChild(piece);

        /* Curved arrow: top pieces bow up to the top hollows, bottom pieces bow
           down to the bottom hollows — matches the four arcs in the design. */
        var bow = (i < 2) ? -70 : 70;
        var ctrlX = (pcx + slot.x) / 2, ctrlY = (pcy + slot.y) / 2 + bow;
        /* Seated size. Default: ≈94px longest side (covers the square hollow).
           Rounds with slotFill fill the hollow box per-axis (the wide rectangle
           hollow needs a wider/shorter piece than a uniform square scale gives). */
        var seatX, seatY;
        if (r.squareSeat) {
          /* square seat off the hollow's short side (circle quarters) */
          var qs = Math.min(slot.w, slot.h) * r.slotFill.w;
          seatX = qs / g.width; seatY = qs / g.height;
        } else if (r.slotFill) {
          seatX = (slot.w * r.slotFill.w) / g.width;
          seatY = (slot.h * r.slotFill.h) / g.height;
        } else {
          seatX = seatY = 94 / Math.max(g.width, g.height);
        }
        addSlotPathGuide(pcx, pcy, ctrlX, ctrlY, slot.x, slot.y, i);
        anims.push({ piece: piece, sx: pcx, sy: pcy, cx2: ctrlX, cy2: ctrlY, ex: slot.x + nudgeX, ey: slot.y + nudgeY, seatX: seatX, seatY: seatY });
      });
      }

      /* The four parts start ASSEMBLED as a clean block at centre (t=0). After a
         short beat showing the whole block, they BOUNCE into the hollows twice:
           seg 0  out  → hollows (t 0→1, opens into the seated pieces)
           seg 1  back → centre  (t 1→0, re-forms the whole block)
           seg 2  out  → hollows (t 0→1)  ... then hold and advance.
         So the demo reads "whole block → fits the slots → back to whole → fits
         again", landing in the hollows. */
      var SEG = 1500, HOLD = 650, SHOW_SQUARE = 600, MAX_SEG = 2;   /* HOLD pauses on the re-formed square between trips */
      var seg = 0, segStart = null, startTime = null;
      function ease(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
      function applyPiece(a, px, py, t) {
        var tx = (px - a.sx).toFixed(1), ty = (py - a.sy).toFixed(1);
        if (a.diag) {
          var s = a.startScale + (1 - a.startScale) * t;
          a.piece.style.transform = "translate(" + tx + "px," + ty + "px) scale(" + s.toFixed(3) + ")";
          a.piece.style.clipPath = triClipAt(a.corner, t);   /* t=0 tiles the square → t=1 seats */
        } else {
          var scX = 1 + (a.seatX - 1) * t, scY = 1 + (a.seatY - 1) * t;
          a.piece.style.transform = "translate(" + tx + "px," + ty + "px) scale(" + scX.toFixed(3) + "," + scY.toFixed(3) + ")";
        }
      }
      function frame(now) {
        if (startTime === null) { startTime = now; }
        if (now - startTime < SHOW_SQUARE) {
          /* hold the assembled whole block (t=0, at centre) before the bounce */
          anims.forEach(function (a) { applyPiece(a, a.sx, a.sy, 0); });
          state.previewRaf = requestAnimationFrame(frame);
          return;
        }
        if (segStart === null) { segStart = now; }
        var raw = Math.max(0, Math.min(1, (now - segStart) / SEG));
        var t = (seg % 2 === 0) ? ease(raw) : 1 - ease(raw);   /* even = out, odd = back */
        anims.forEach(function (a) {
          var p = bezierPoint(a.sx, a.sy, a.cx2, a.cy2, a.ex, a.ey, t);
          applyPiece(a, p.x, p.y, t);
        });
        if (raw >= 1) {
          if (seg >= MAX_SEG) { state.previewRaf = null; return; }   /* held in the hollows after out-back-out */
          seg++; segStart = now + HOLD;
        }
        state.previewRaf = requestAnimationFrame(frame);
      }
      state.previewRaf = requestAnimationFrame(frame);
    }

    function setupSlotInstruct(text) {
      var r = currentRound();
      els.sceneBg.style.display = "block";
      els.focusDim.classList.add("show");   /* dim bg, spotlight the hollow slots */
      if (r.cut === "grid") {
        setupGridBots({ showBots: false, showSlots: true });
        setInstruction(text);
        /* Let the hollows pop in, then run the guided arrow preview. */
        later(gridSlotPreview, 350);
      } else {
        setupBots("layout-ready");
        setInstruction(text);
        /* No block glow on this screen — attention should land on the
           hollow slots only, since the instruction is about fitting parts
           into them. */
        renderWhole(false);
        setSocketFocus(true);
        later(function () { setSocketFocus(true); }, 500);
      }
    }

    function renderStep() {
      clearTimers();
      resetScene();
      playScreenFade();

      var r = currentRound();
      var step = FLOW[state.step];
      var text = step.text ? step.text.replace("{shape}", r.name) : "";

      /* Backgrounds: only the bot screens use the studio room (Mainbg) + the
         light-cone spotlight — the two charge screens (intro, plug) here, and
         the fit screen (set in gridFitFlow, which doesn't re-run renderStep).
         Every other screen — including the cutting screens — uses the plain
         Bg2 gradient. The tutorial overrides this with its own bg. */
      var isBotScreen = (step.scene === "intro" || step.scene === "plug");
      els.sceneBg.src = ASSETS + (isBotScreen ? "Mainbg.webp" : "Bg2.webp");
      if (els.botSpotlight) {
        if (step.scene === "intro") {
          /* Bots register first, then the charge beam flashes on with an SFX and
             holds. resetScene already cleared the spotlight for the bots-only beat.
             When the lab gate is mid-open the intro renders behind the closed
             doors — runLabGate fires the beam once they finish, so skip it here. */
          if (!state.gateOpening) { later(playChargeBeam, TIMING.CHARGE_BEAM_IN); }
        } else {
          els.botSpotlight.classList.toggle("show", isBotScreen);
        }
      }

      /* Later rounds still play their own "whole" + "quarters" teaching beats
         (reskinned via currentRound()), but the one-time charge intro and the
         interactive laser tutorial are round-0 only. */
      if (state.round > 0) {
        if (step.scene === "intro" || step.scene === "plug" || step.scene === "plugReady" ||
          step.scene === "moveOut" || step.scene === "needs" ||
          step.scene === "halves" || step.scene === "laserIntro" || step.scene === "tutorial" || step.scene === "preplay") {
          nextStep();
          return;
        }
      }

      if (step.scene === "intro") {
        setupIntro4();
      }

      if (step.scene === "plug") {
        setupCorners4();
        if (r.cut === "grid") { later(playPodConnectors, 760); }
      }

      /* Grid round keeps the 4-bot/corner layout and skips the 2-bot
         "ready"/"move out"/"laser intro" beats — its intro is just
         4 screens: charge → pods → whole → quarters → tutorial. */
      if (step.scene === "plugReady") {
        if (r.cut === "grid") { nextStep(); return; }
        setupPlugReady(text);
      }

      if (step.scene === "moveOut") {
        if (r.cut === "grid") { nextStep(); return; }
        setupMoveOut();
      }

      if (step.scene === "whole") {
        setupWholeIntro(text);
      }

      /* Grid rounds get the four-part split demo and skip the 2-part demos. */
      if (step.scene === "quarters") {
        if (r.cut !== "grid") { nextStep(); return; }
        els.sceneBg.style.display = "block";
        els.focusDim.classList.add("show");   /* dim bg, spotlight the block + hollows */
        setupGridBots({ showBots: false, showSlots: true });
        setInstruction("");
        renderQuarterCue();
        later(function () { setInstruction(text); }, 680);
      }

      if (step.scene === "needs") {
        if (r.cut === "grid") { nextStep(); return; }
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-ready");
        renderWhole(false, "halves");
      }

      if (step.scene === "halves") {
        if (r.cut === "grid") { nextStep(); return; }
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-ready");
        renderSplitCue();
      }

      if (step.scene === "play") {
        if (state.round > 0) { nextStep(); return; }
        state.locked = false;
        setInstruction("");
        setupBots("layout-clear");
        els.playBg.src = ASSETS + "GameStartScreen.webp";
        els.playButtonImg.src = ASSETS + "LetsGoButton.webp";
        els.playButtonImg.alt = "Let's Go";
        els.playButton.setAttribute("aria-label", "Let's go");
        els.playStage.classList.add("start-mode");
        els.iraChar.classList.remove("play-idle");
        els.iraChar.style.transition = "";
        els.iraChar.style.transform = "";
        els.iraGlowRing.classList.remove("show");
        els.playStage.classList.remove("play-exit");
        els.playButton.classList.remove("play-ready", "play-clicked");
        els.playButton.style.opacity = "0";
        els.playButton.style.transform = "scale(0.85) translateY(16px)";
        show(els.playStage);
        later(function () {
          els.playButton.style.opacity = "1";
          els.playButton.style.transform = "scale(1) translateY(0)";
        }, 220);
        later(function () {
          els.playButton.classList.add("play-ready");
        }, 560);
      }

      if (step.scene === "tutorial") {
        if (state.round > 0) {
          nextStep();
          return;
        }
        setupTutorial();
        return;
      }

      if (step.scene === "preplay") {
        setupPreplay(text);
      }

      if (step.scene === "laserIntro") {
        if (r.cut === "grid") { nextStep(); return; }
        setupLaserIntro(text);
      }

      if (step.scene === "cutInstruct") {
        setupCutInstruct(text);
      }

      if (step.scene === "slotInstruct") {
        setupSlotInstruct(text);
      }

      if (step.scene === "laser") {
        setupLaser();
        return;
      }

      if (step.duration) {
        later(nextStep, step.duration);
      }
    }

    function nextStep() {
      state.step++;
      if (state.step >= FLOW.length) {
        state.step = FLOW.length - 1;
      }
      renderStep();
    }

    /* ── Tutorial guided sequence (2 cuts → 4 quarters) ──
       One vertical cut splits the block into two halves; rotating the laser a
       quarter turn and making one horizontal cut splits those halves into four
       equal pieces. */
    var TUTORIAL_START_ANGLE = 45;            /* laser at 45° → diagonal; first move brings it to vertical */
    /* Smaller block for the tutorial so it sits comfortably inside the ring. */
    var TUT_BLOCK = 200;
    var TUT = [
      { bubble: "left", btn: "left" },    /* step 0: rotate +45 → 90° (vertical) */
      { bubble: "cut", btn: "cut" },     /* step 1: vertical cut → 2 halves */
      { bubble: "left", btn: "left" },    /* step 2: rotate +45 → 135° */
      { bubble: "left", btn: "left" },    /* step 3: rotate +45 → 180° (horizontal) */
      { bubble: "cut", btn: "cut" }      /* step 4: horizontal cut → 4 quarters, advance */
    ];

    function setupTutorial() {
      var r = currentRound();
      state.tutActive = true;
      state.tutStep = -1;
      state.tutMoveVOPlayed = false;
      state.tutCutVOPlayed = false;
      state.locked = false;
      state.angle = TUTORIAL_START_ANGLE;
      /* Decode-gate the tutorial background swap. resetScene already left
         sceneBg at display:none with src=Mainbg.webp; if we flip src to
         BgForTutorial and show it before the new bitmap is decoded, the
         element repaints its last-decoded frame (Mainbg) for a frame — the
         reported "wrong background for a sec" flash. Keep it hidden, swap the
         src, then reveal only once the new bitmap is ready. The asset is
         warm-cached at startup, so decode() resolves on the next microtask
         and the reveal is effectively instant with no Mainbg frame. */
      els.sceneBg.style.display = "none";
      els.sceneBg.src = ASSETS + "BgForTutorial.webp";
      var revealTutorialBg = function () { els.sceneBg.style.display = "block"; };
      if (typeof els.sceneBg.decode === "function") {
        els.sceneBg.decode().then(revealTutorialBg, revealTutorialBg);
      } else {
        revealTutorialBg();
      }
      /* Grid round's tutorial cuts only in the machine — no side bots / slots.
         (Using layout-laser here flashed two sideways bots during the
         game→tutorial transition.) */
      setupGridBots({ showBots: false, showSlots: false });
      setInstruction("");
      /* LaserMachine.webp as tutorial overlay; LaserMachineWithoutLines stays as base */
      els.tutorialOverlay.classList.add("show");
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(makeBlock(r, TUT_BLOCK, TUT_BLOCK));
      els.blockCover.style.width = (TUT_BLOCK + 22) + "px";
      els.blockCover.style.height = (TUT_BLOCK + 22) + "px";
      els.blockCover.style.borderRadius = (r.name === "circle" ? "50%" : "18px");
      els.blockCover.style.opacity = "1";
      els.cutLine.style.width = (TUT_BLOCK + 12) + "px";
      els.cutLine.style.height = (TUT_BLOCK + 12) + "px";
      els.cutLine.style.borderRadius = (r.name === "circle" ? "50%" : "0");
      els.cutLine.classList.remove("show");
      els.wrongSlash.style.width = els.blockCover.style.width;
      els.wrongSlash.style.height = els.blockCover.style.height;
      els.wrongSlash.style.borderRadius = els.blockCover.style.borderRadius;
      state.orbitActive = true;
      snapLaser(TUTORIAL_START_ANGLE);
      showLaserHead();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) {
        el.classList.add("fade");
      });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      els.cutOverlay.classList.remove("show");
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      show(els.machineStage);
      later(function () {
        if (state.tutActive && state.tutStep === -1) {
          tutSetStep(0);
        }
      }, 900);
    }

    function tutSetStep(n) {
      state.tutStep = n;
      var t = TUT[n];
      setInstruction("");
      els.bots.className = "layout-clear";
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      els.cutOverlay.classList.remove("show");

      els.btnLeft.classList.remove("tut-highlight", "tut-disabled");
      els.btnRight.classList.remove("tut-highlight", "tut-disabled");
      els.btnCut.classList.remove("tut-highlight", "tut-disabled");

      if (t.bubble === "left") {
        els.bubbleLeft.classList.remove("fade");
        if (els.handGesture) els.handGesture.className = "hand-gesture point-left show";
        els.btnLeft.classList.add("tut-highlight");
        if (!state.tutMoveVOPlayed) { playInstructionAudio("Tap to move."); state.tutMoveVOPlayed = true; }
      }
      if (t.bubble === "right") {
        els.bubbleRight.classList.remove("fade");
        if (els.handGesture) els.handGesture.className = "hand-gesture point-right show";
        els.btnRight.classList.add("tut-highlight");
        if (!state.tutMoveVOPlayed) { playInstructionAudio("Tap to move."); state.tutMoveVOPlayed = true; }
      }
      if (t.bubble === "cut") {
        els.bubbleCut.classList.remove("fade");
        if (els.handGesture) els.handGesture.className = "hand-gesture point-cut show";
        els.btnCut.classList.add("tut-highlight");
        if (!state.tutCutVOPlayed) { playInstructionAudio("Tap to cut."); state.tutCutVOPlayed = true; }
      }
      /* Grey out the two buttons that aren't the prompted one. */
      [els.btnLeft, els.btnRight, els.btnCut].forEach(function (b) {
        if (!b.classList.contains("tut-highlight")) { b.classList.add("tut-disabled"); }
      });

      els.hitLeft.disabled = (t.btn !== "left");
      els.hitRight.disabled = (t.btn !== "right");
      els.hitCut.disabled = (t.btn !== "cut");
    }

    function tutHandleRight() {
      var step = state.tutStep;
      if (!state.tutActive || state.locked) { return; }
      if (step < 0 || step >= TUT.length || TUT[step].btn !== "right") { return; }
      pressButton(els.hitRight);
      sndRotate();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      state.angle = normalizedAngle(state.angle - 45);
      updateLaser(); /* smooth orbital rotation — NO beam */
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      later(function () { tutSetStep(step + 1); }, 520);
    }

    function tutHandleLeft() {
      var step = state.tutStep;
      if (!state.tutActive || state.locked) { return; }
      if (step < 0 || step >= TUT.length || TUT[step].btn !== "left") { return; }
      pressButton(els.hitLeft);
      sndRotate();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      state.angle = normalizedAngle(state.angle + 45);
      updateLaser(); /* smooth orbital rotation — NO beam */
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      later(function () { tutSetStep(step + 1); }, 520);
    }

    function tutHandleCut() {
      var step = state.tutStep;
      if (!state.tutActive || state.locked) { return; }
      if (step < 0 || step >= TUT.length || TUT[step].btn !== "cut") { return; }
      state.locked = true;
      pressButton(els.hitCut);
      sndCut();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      els.cutOverlay.classList.remove("show");
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      showBeam(state.angle); /* Beam.svg fires on CUT */
      var isFinalCut = (step >= TUT.length - 1);
      later(function () {
        hideBeam();
        /* First cut (vertical) → two halves; final cut (horizontal) splits
           those halves into four equal quarters. */
        if (isFinalCut) { tutSplitGrid(); } else { tutSplitHalves(); }
      }, 950);
      later(function () {
        if (!isFinalCut) {
          /* Keep the halves on screen — the next (horizontal) cut divides them. */
          state.locked = false;
          tutSetStep(step + 1);
        } else {
          state.tutActive = false;
          lowerThemeAfterTutorial();
          nextStep();
        }
      }, 1900);
    }

    /* Vertical cut: whole tutorial block → two side-by-side halves. */
    function tutSplitHalves() {
      var r = currentRound();
      var hw = TUT_BLOCK / 2, gap = 14;
      var trans = "transform 0.45s cubic-bezier(.34,1.3,.64,1)";
      var container = document.createElement("div");
      container.style.cssText = "position:relative;width:" + TUT_BLOCK + "px;height:" + TUT_BLOCK + "px;";
      var left = makeBlock(r, hw, TUT_BLOCK);
      var right = makeBlock(r, hw, TUT_BLOCK);
      [left, right].forEach(function (p) {
        p.style.position = "absolute"; p.style.top = "0"; p.style.filter = "none"; p.style.borderRadius = "0";
      });
      left.style.left = "0"; right.style.left = hw + "px";
      container.appendChild(left); container.appendChild(right);
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(container);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          left.style.transition = right.style.transition = trans;
          left.style.transform = "translateX(-" + gap + "px)";
          right.style.transform = "translateX(" + gap + "px)";
        });
      });
    }

    /* Horizontal cut: the two halves → four equal quarters. The quarters start
       laid out exactly like the existing halves (vertical gap only), then the
       horizontal gap opens so it reads as a single new cut. */
    function tutSplitGrid() {
      var r = currentRound();
      var hw = TUT_BLOCK / 2, hh = TUT_BLOCK / 2, gap = 14;
      var trans = "transform 0.45s cubic-bezier(.34,1.3,.64,1)";
      var defs = [
        { x: 0, y: 0, tx: -gap, ty: -gap },   /* TL */
        { x: hw, y: 0, tx: gap, ty: -gap },   /* TR */
        { x: 0, y: hh, tx: -gap, ty: gap },   /* BL */
        { x: hw, y: hh, tx: gap, ty: gap }    /* BR */
      ];
      var container = document.createElement("div");
      container.style.cssText = "position:relative;width:" + TUT_BLOCK + "px;height:" + TUT_BLOCK + "px;";
      var pieces = defs.map(function (d) {
        var p = makeBlock(r, hw, hh);
        p.style.position = "absolute"; p.style.left = d.x + "px"; p.style.top = d.y + "px";
        p.style.filter = "none"; p.style.borderRadius = "0";
        /* Match the current halves: horizontal gap already applied, no vertical gap yet. */
        p.style.transform = "translate(" + d.tx + "px,0px)";
        container.appendChild(p);
        return p;
      });
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(container);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          pieces.forEach(function (p, i) {
            p.style.transition = trans;
            p.style.transform = "translate(" + defs[i].tx + "px," + defs[i].ty + "px)";
          });
        });
      });
    }

    function setupPreplay(text) {
      state.locked = false;
      setInstruction("");
      setupBots("layout-clear");
      els.playBg.src = ASSETS + "LetsPlayBG.webp";
      els.playButtonImg.src = ASSETS + "PlayButton.webp";
      els.playButtonImg.alt = "Play";
      els.playButton.setAttribute("aria-label", "Play");
      els.playStage.classList.add("preplay-mode");
      els.playStage.classList.remove("play-exit");
      els.playButton.classList.remove("play-ready", "play-clicked");
      els.playButton.style.opacity = "0";
      els.playButton.style.transform = "scale(0.85) translateY(16px)";
      els.iraChar.classList.remove("play-idle");
      els.iraChar.style.transition = "none";
      els.iraChar.style.transform = "translateX(1200px)";
      els.iraGlowRing.classList.remove("show");
      seedPlayMagic();

      function revealPlayButton() {
        els.iraChar.style.transition = "";
        els.iraChar.classList.add("play-idle");
        els.playButton.style.opacity = "1";
        els.playButton.style.transform = "scale(1) translateY(0)";
        els.playButton.classList.add("play-ready");
      }

      function startPreplaySequence() {
        // Guard against state changes that may have occurred while we waited
        // for the new background to finish decoding.
        if (FLOW[state.step] && FLOW[state.step].scene !== "preplay") { return; }
        show(els.playStage);

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            els.iraChar.style.transition = "transform 0.72s cubic-bezier(0.25, 1.1, 0.4, 1)";
            els.iraChar.style.transform = "translateX(0)";
            later(function () { els.iraGlowRing.classList.add("show"); }, 680);
          });
        });

        // After Ira finishes sliding in, play "You are all set." then "Let's play.",
        // then reveal the Play button.
        later(function () {
          var first = playInstructionAudio("You are all set.");
          whenInstructionAudioEnds(first, function () {
            var second = playInstructionAudio("Let's play.");
            whenInstructionAudioEnds(second, function () {
              revealPlayButton();
            });
          });
        }, 760);
      }

      // Wait for the new LetsPlayBG.webp to finish decoding before unhiding the
      // stage; otherwise the <img> keeps painting the previously-decoded
      // GameStartScreen.webp for a frame, flashing the start screen.

    /* ── Orbital laser system — all geometry is anchored to the ring and nozzle. ── */
    var MACHINE_NATIVE_SIZE = 1454;
    var RING_INNER_R_NATIVE = 488;

    var LASER_SRC_W = 258;
    var LASER_SRC_H = 172;
    var LASER_W = 96;
    var LASER_H = 64;
    /* Source-pixel anchors in Laser.webp: rear body pivot and glowing emission point. */
    var LASER_BODY_SRC_X = 42;
    var LASER_BODY_SRC_Y = 86;
    var LASER_NOZZLE_SRC_X = 238;
    var LASER_NOZZLE_SRC_Y = 86;

    var BEAM_NATIVE_SIZE = 683;
    var BEAM_START_NATIVE = 98.8398;
    var BEAM_END_NATIVE = 583.34;
    var BEAM_START_PCT = BEAM_START_NATIVE / BEAM_NATIVE_SIZE;
    var BEAM_LINE_PCT = (BEAM_END_NATIVE - BEAM_START_NATIVE) / BEAM_NATIVE_SIZE;

    function ringGeometry() {
      var w = els.machineStage.clientWidth || 900;
      var styles = getComputedStyle(els.machineStage);
      var ringSize = parseFloat(styles.getPropertyValue("--ring-size")) || 500;
      var centerY = parseFloat(styles.getPropertyValue("--ring-center-y")) || ringSize / 2;
      var ringScale = ringSize / MACHINE_NATIVE_SIZE;
      return {
        centerX: w / 2,
        centerY: centerY,
        radius: RING_INNER_R_NATIVE * ringScale
      };
    }

    function laserAnchors(deg) {
      var g = ringGeometry();
      var orbitRad = deg * Math.PI / 180;
      var beamRad = orbitRad + Math.PI;
      var laserScale = LASER_W / LASER_SRC_W;
      var bodyLocalX = LASER_BODY_SRC_X * laserScale;
      var bodyLocalY = LASER_BODY_SRC_Y * laserScale;
      var nozzleLocalX = LASER_NOZZLE_SRC_X * laserScale;
      var nozzleLocalY = LASER_NOZZLE_SRC_Y * laserScale;
      var bodyOffset = nozzleLocalX - bodyLocalX;

      var orbitX = g.centerX + g.radius * Math.cos(orbitRad);
      var orbitY = g.centerY + g.radius * Math.sin(orbitRad);
      var laserX = orbitX - Math.cos(beamRad) * bodyOffset;
      var laserY = orbitY - Math.sin(beamRad) * bodyOffset;

      return {
        nozzleX: orbitX,
        nozzleY: orbitY,
        bodyX: laserX,
        bodyY: laserY,
        bodyLocalX: bodyLocalX,
        bodyLocalY: bodyLocalY,
        nozzleLocalX: nozzleLocalX,
        nozzleLocalY: nozzleLocalY,
        rotationDeg: deg + 180,
        radius: g.radius
      };
    }

    function positionLaser(deg) {
      var p = laserAnchors(deg);
      els.laserImg.style.left = (p.bodyX - p.bodyLocalX) + "px";
      els.laserImg.style.top = (p.bodyY - p.bodyLocalY) + "px";
      els.laserImg.style.transformOrigin = p.bodyLocalX + "px " + p.bodyLocalY + "px";
      els.laserImg.style.transform = "rotate(" + p.rotationDeg + "deg)";
    }

    function positionBeam(deg) {
      var p = laserAnchors(deg);
      var beamLength = p.radius * 1.72;
      var beamSize = beamLength / BEAM_LINE_PCT;
      var startPx = BEAM_START_PCT * beamSize;
      els.beamImg.style.width = beamSize + "px";
      els.beamImg.style.height = beamSize + "px";
      els.beamImg.style.left = (p.nozzleX - startPx) + "px";
      els.beamImg.style.top = (p.nozzleY - startPx) + "px";
      els.beamImg.style.transformOrigin = startPx + "px " + startPx + "px";
      /* Beam.svg points 45° by default; deg + 135° aims it from nozzle to center. */
      els.beamImg.style.transform = "rotate(" + (deg + 135) + "deg)";
      els.wrongSlash.style.setProperty("--cut-angle", deg + "deg");
      els.cutLine.style.setProperty("--cut-angle", deg + "deg");
    }

    function showBeam(deg) {
      positionBeam(deg);
      els.beamImg.style.display = "block";
      els.beamImg.style.opacity = "1";
    }

    function showCutLine(deg) {
      els.cutLine.style.setProperty("--cut-angle", deg + "deg");
      els.cutLine.style.width = "";
      els.cutLine.style.height = "";
      els.cutLine.style.borderRadius = "";
      els.cutLine.classList.add("show", "correct-guide");
    }

    function showMachineGuideLine(deg) {
      els.tutorialOverlay.classList.remove("show", "supportive-guide", "line-guide");
      els.guideLineHighlight.classList.remove("show");
      els.guideLineHighlight.style.clipPath = "";
      els.cutLine.classList.remove("show", "correct-guide");
      var idx = machineSvgLineIndexForAngle(deg);
      loadLaserMachineSvg().then(function (svgText) {
        if ((state.wrongAttempts || 0) < 2) { return; }
        els.machineSvgLayer.innerHTML = svgText;
        var svg = els.machineSvgLayer.querySelector("svg");
        if (svg) {
          svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
          var lines = svg.querySelectorAll("line");
          lines.forEach(function (ln) { ln.classList.remove("correct-line-glow"); });
          if (idx >= 0 && lines[idx]) {
            lines[idx].classList.add("correct-line-glow");
          }
        }
        els.machineSvgLayer.classList.add("show");
        els.machineImg.style.display = "none";
      });
    }

    function hideBeam() {
      els.beamImg.style.opacity = "0";
      setTimeout(function () {
        if (els.beamImg.style.opacity === "0") { els.beamImg.style.display = "none"; }
      }, 220);
    }

    function _animateOrbit() {
      if (!state.orbitActive) { return; }
      var diff = state.orbitTarget - state.orbitCurrent;
      /* shortest-arc wraparound */
      if (diff > 180) { diff -= 360; }
      if (diff < -180) { diff += 360; }
      state.orbitCurrent += diff * 0.18;
      positionLaser(state.orbitCurrent);
      if (Math.abs(diff) > 0.3) {
        state.orbitRaf = requestAnimationFrame(_animateOrbit);
      } else {
        state.orbitCurrent = state.orbitTarget;
        positionLaser(state.orbitCurrent);
        state.orbitRaf = null;
      }
    }

    function snapLaser(deg) {
      if (state.orbitRaf) { cancelAnimationFrame(state.orbitRaf); state.orbitRaf = null; }
      state.orbitCurrent = deg;
      state.orbitTarget = deg;
      positionLaser(deg);
    }

    function updateLaser() {
      state.orbitTarget = state.angle;
      if (!state.orbitActive) { return; }
      if (state.orbitRaf) { cancelAnimationFrame(state.orbitRaf); state.orbitRaf = null; }
      state.orbitRaf = requestAnimationFrame(_animateOrbit);
    }

    function showLaserHead() {

    function rotateLaser(delta, button) {
      if (state.locked) { return; }
      stopIdleHint();
      pressButton(button);
      sndRotate();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });

    }

    function angleDiff(a, b) {
      var diff = Math.abs(a - b) % 360;
      return diff > 180 ? 360 - diff : diff;
    }

    function acceptedCutAnglesForRound(r) {
      if (r.acceptedAngles && r.acceptedAngles.length) {
        return r.acceptedAngles;
      }
      var targets = [r.targetAngle];
      if (r.targetAngle2 !== undefined) { targets.push(r.targetAngle2); }
      return targets;
    }

    function isCorrectCutForRound(r, angle) {
      return acceptedCutAnglesForRound(r).some(function (target) {
        return angleDiff(angle, target) <= 8;
      });
    }

    function resolvedCutAngleForRound(r, angle) {
      if (r.successAngle !== undefined && isCorrectCutForRound(r, angle)) {
        return r.successAngle;
      }
      return angle;
    }

    function wrongPieceClip(angle, index) {
      var normalized = ((angle % 360) + 360) % 360;
      var diagonalDown = (normalized > 90 && normalized < 270);
      if (diagonalDown) {
        return index === 0 ? "polygon(0 0,100% 0,100% 100%)" : "polygon(0 0,0 100%,100% 100%)";
      }
      return index === 0 ? "polygon(0 0,100% 0,0 100%)" : "polygon(100% 0,100% 100%,0 100%)";
    }

    function machineCenterInGame() {
      var styles = getComputedStyle(els.machineStage);
      var top = parseFloat(styles.top) || 425;
      var height = els.machineStage.clientHeight || 600;
      var centerY = parseFloat(styles.getPropertyValue("--ring-center-y")) || 250;
      return {
        x: 640,
        y: top - height / 2 + centerY
      };
    }

    function slotTargetsFromFills() {
      var leftW = parseFloat(els.leftFill.style.width || "0");
      var leftH = parseFloat(els.leftFill.style.height || "0");
      var rightW = parseFloat(els.rightFill.style.width || "0");
      var rightH = parseFloat(els.rightFill.style.height || "0");
      var leftSlot = els.leftFill.parentNode;
      var rightSlot = els.rightFill.parentNode;
      var leftX = (leftSlot.offsetLeft || 20) + leftSlot.offsetWidth / 2 + parseFloat(els.leftFill.style.marginLeft || "0");
      var rightX = (rightSlot.offsetLeft || 1000) + rightSlot.offsetWidth / 2 + parseFloat(els.rightFill.style.marginLeft || "0");
      var leftY = parseFloat(els.leftFill.style.top || "0") + leftH / 2;
      var rightY = parseFloat(els.rightFill.style.top || "0") + rightH / 2;
      return [
        { x: leftX, y: leftY, width: leftW, height: leftH },
        { x: rightX, y: rightY, width: rightW, height: rightH }
      ];
    }

    function cutBlock() {
      if (state.locked) { return; }
      var r = currentRound();
      if (r.cut === "grid") { gridCutBlock(); return; }
      stopIdleHint();
      state.locked = true;
      state.lastCutAngle = state.angle;
      pressButton(els.hitCut);
      sndCut();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      showBeam(state.angle); /* Beam.svg fires on CUT — was hidden during alignment */

      later(function () {
        hideBeam();
        var correct = isCorrectCutForRound(r, state.angle);
        if (correct) {
          state.lastCutAngle = resolvedCutAngleForRound(r, state.angle);
          showSuccess();
        } else {
          showFail();
        }
      }, 650);
    }

    /* ── Grid round (square → 4 quarters) gameplay ──────────────────────────
       The square round needs two perpendicular straight cuts (one vertical,
       one horizontal). The first valid cut splits the block into two halves;
       the second perpendicular cut makes four equal quarters, after which the
       four bots arrive and each quarter flies into a corner slot to charge
       them. A diagonal / repeated cut counts as a miss → the bots still come
       but the pieces don't fit, then Try Again. */
    function gridCutBlock() {
      if (state.locked) { return; }
      stopIdleHint();
      var r = currentRound();
      state.locked = true;
      state.lastCutAngle = state.angle;
      pressButton(els.hitCut);
      sndCut();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      showBeam(state.angle);

      /* The player ALWAYS makes two cuts, whatever their orientation. We record
         both snapped cut angles, split the block into the REAL resulting pieces,
         teach (whole → those pieces), then judge: correct only when the two cuts
         are one vertical + one horizontal (→ four equal squares). */
      /* Diamond round: the block is displayed rotated by blockRotate, so a cut at
         screen angle `state.angle` is, in the block's own frame, `state.angle -
         blockRotate`. Record/geometry/win all run in that block-local frame (so a
         screen V/H cut of the diamond = a diagonal cut of the square → triangles),
         while the beam/laser keep showing the real screen angle. */
      var effAngle = state.angle - (r.blockRotate || 0);
      var lineAngle = lineAngleDegrees(effAngle);   /* snapped 0/45/90/135 (block-local) */
      var angles = state.gridCutAngles || (state.gridCutAngles = []);
      var orients = state.gridCutOrients || (state.gridCutOrients = []);

      later(function () {
        hideBeam();
        if (angles.length === 0) {
          /* First cut → split the block in two along this line; cut again. */
          angles.push(lineAngle);
          orients.push(cutOrientation(effAngle));
          splitMachineBlock(effAngle);
          later(function () {
            state.locked = false;
            startIdleHint();
          }, 700);
        } else if (lineAngle === angles[0]) {
          /* A second cut at the SAME angle as the first is redundant — it re-cuts
             the same line, so the block is still just two equal halves (not four
             parts). Don't finalize/judge on it; re-arm and let the player make the
             perpendicular cut instead. The idle hint already steers them to it. */
          later(function () {
            state.locked = false;
            startIdleHint();
          }, 300);
        } else {
          /* Second cut → block becomes the real pieces. Teach by EQUALITY (the
             diagonals make 4 equal triangles too), but only a square-fitting cut
             WINS — equal triangles are honest but don't seat in the chargers. */
          angles.push(lineAngle);
          orients.push(cutOrientation(effAngle));
          var isEqual = gridCutIsEqualParts(angles[0], angles[1]);
          var fits = gridCutFitsChargers(angles[0], angles[1]);
          splitMachineBlockGrid(angles[0], angles[1]);
          later(function () {
            renderTeachingGrid(angles[0], angles[1], isEqual, function () {
              hide(els.teachStage);
              state.teachingActive = false;
              els.game.classList.remove("teaching-active");
              gridFitFlow(fits ? "win" : (isEqual ? "equal-misfit" : "unequal"));
            });
          }, 950);
        }
      }, 650);
    }

    /* Render the in-machine block as the real pieces from the two cuts, each
       nudged outward from the block centre so the separation reads. Works for
       any cut pair: 4 equal squares (correct), 4 triangles (an X), 2 halves,
       odd sectors, etc. */
    function splitMachineBlockGrid(a1, a2) {
      var r = currentRound();
      var W = r.blockW, H = r.blockH, gap = 4;   /* minimal outward nudge so the pieces barely separate */
      var trans = "transform 0.45s cubic-bezier(.34,1.3,.64,1)";
      var geos = gridSectorPieces(W, H, a1, a2);
      var container = document.createElement("div");
      container.style.cssText = "position:relative;width:" + W + "px;height:" + H + "px;";
      var pieces = geos.map(function (geo) {
        var p = makeSectorPiece(r, geo, W, H);
        p.style.position = "absolute"; p.style.left = geo.minX + "px"; p.style.top = geo.minY + "px";
        var cx = geo.centroid.x - W / 2, cy = geo.centroid.y - H / 2;
        var len = Math.max(1, Math.sqrt(cx * cx + cy * cy));
        p._tx = (cx / len) * gap; p._ty = (cy / len) * gap;
        container.appendChild(p);
        return p;
      });
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(container);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          pieces.forEach(function (p) {
            p.style.transition = trans;
            p.style.transform = "translate(" + p._tx + "px," + p._ty + "px)";
          });
        });
      });
    }

    /* Slide the four bots up into the corners4 row (sad), like the charge screen. */
    function gridBotsEnter() {
      setupGridBots({ showBots: true, showSlots: true });
      var slots = [els.leftBot.parentNode, els.rightBot.parentNode, els.midLeftBot.parentNode, els.midRightBot.parentNode];
      slots.forEach(function (s) {
        s.style.transition = "none";
        s.style.transform = "translateY(260px)";
        s.style.opacity = "0";
      });
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          slots.forEach(function (s, i) {
            var delay = (i * 0.08).toFixed(2);
            s.style.transition = "transform .52s cubic-bezier(.18,.89,.32,1.18) " + delay + "s, opacity .4s ease " + delay + "s";
            s.style.transform = "translateY(0)";
            s.style.opacity = "1";
          });
        });
      });
      later(function () {
        slots.forEach(function (s) { s.style.transition = ""; s.style.transform = ""; });
      }, 900);
    }

    function gridBotsHappy(r) {
      [els.leftBot, els.rightBot, els.midLeftBot, els.midRightBot].forEach(function (b) {
        b.src = r.happyBot;
        b.classList.add("happy");
      });
      [els.leftBot.parentNode, els.rightBot.parentNode, els.midLeftBot.parentNode, els.midRightBot.parentNode].forEach(function (s) {
        s.classList.remove("celebrate-jump");
        void s.offsetWidth;
        s.classList.add("celebrate-jump");
      });
    }

    /* Fly the four quarter pieces from the machine center out to the four
       corner slots. success=true → they land centered and fitted; false → they
       fall short and tilt (visible miss). */
    function flyQuartersToCorners(r, center, success, onDone) {
      var layer = els.flightLayer;
      els.machineBlock.innerHTML = "";   /* the quarters now live in the flight layer */
      hide(els.machineStage);            /* drop the ring/laser; pieces fly on from the same spot */
      var hw = r.blockW / 2, hh = r.blockH / 2;
      /* Seat each quarter inside the SquareHollow's recessed cavity. The hollow
         PNG is 3:2, so its rendered box (≈170px) pads the sides — the real
         square cavity is only ≈0.62 of the box. Filling ~85% of the cavity
         leaves the rim visible, matching Figma 10:1724. (The old 116/132 was
         calibrated for the other rounds' 132px square pods and oversized the
         square to 149px, so it covered the hollow instead of sitting in it.) */
      var INNER = 0.52;                  /* sits inside the hollow frame (smaller; stroke stays visible) */
      var SEAT_DROP = -3;                /* cavity centre sits ~3px above the box centre */
      var SEAT_SHIFT_X = -4;             /* hollow art is centred left of its box → nudge the block left to centre it */
      /* Per-round seat offset (from the layout overlay export); falls back to the
         square defaults above. */
      var nudgeX = r.slotNudge ? r.slotNudge.x : SEAT_SHIFT_X;
      var nudgeY = r.slotNudge ? r.slotNudge.y : SEAT_DROP;

      /* Diagonal rounds: the cut block's four diagonal triangles fly out from the
         centre. Each starts as its cut quarter (clip t=0; the four tile the block)
         and, as it slides to its corner slot, OPENS OUT into the seated corner
         triangle (clip morph t=0→1) while shrinking from block size to the cavity.
         This reads as the square splitting into 4 and each fanning into a hollow. */
      if (isDiagRound(r)) {
        var dnx = r.slotNudge ? r.slotNudge.x : 0;   /* triangle hollows seat at the slot centre */
        var dny = r.slotNudge ? r.slotNudge.y : 0;
        els.cornerSlotEls.forEach(function (slot, i) {
          var sc = gameSpaceCenter(slot);
          var box = triSeatBox(r, sc);
          var piece = makeCornerTriangle(r, i, box.w, box.h, 0);
          piece.classList.add("flying-half");
          piece.style.position = "absolute";
          piece.style.left = (center.x - box.w / 2) + "px";
          piece.style.top = (center.y - box.h / 2) + "px";
          piece.style.transition = "transform .8s cubic-bezier(.18,.89,.32,1.08), clip-path .8s cubic-bezier(.18,.89,.32,1.08), opacity .4s ease";
          var startScale = (r.blockW || 200) / box.w;   /* read block-sized at centre, shrink to cavity */
          piece.style.transform = "scale(" + startScale.toFixed(3) + ")";
          layer.appendChild(piece);
          var dx = (sc.x + dnx) - center.x, dy = (sc.y + dny) - center.y;
          setTimeout(function () {
            requestAnimationFrame(function () {
              if (success) {
                piece.style.transform = "translate(" + dx.toFixed(1) + "px," + dy.toFixed(1) + "px) scale(1)";
                piece.style.clipPath = triClipAt(i, 1);   /* open out into the corner seat */
              } else {
                piece.style.transform = "translate(" + (dx * 0.5).toFixed(1) + "px," + (dy * 0.5).toFixed(1) + "px) scale(" + (startScale * 0.7).toFixed(3) + ")";
                piece.style.clipPath = triClipAt(i, 0.5);
                piece.classList.add("soft-mismatch");
              }
            });
          }, i * 90);
        });
        setTimeout(onDone, 1150);
        return;
      }

      var qoff = [
        { x: -hw / 2, y: -hh / 2 }, { x: hw / 2, y: -hh / 2 },
        { x: -hw / 2, y: hh / 2 }, { x: hw / 2, y: hh / 2 }
      ];
      for (var i = 0; i < 4; i++) {
        (function (i) {
          var slot = els.cornerSlotEls[i];
          var sc = gameSpaceCenter(slot);
          var qcx = center.x + qoff[i].x, qcy = center.y + qoff[i].y;
          var piece = makeBlock(r, hw, hh);
          piece.classList.add("flying-half");
          piece.style.left = (qcx - hw / 2) + "px";
          piece.style.top = (qcy - hh / 2) + "px";
          piece.style.width = hw + "px";
          piece.style.height = hh + "px";
          piece.style.filter = "none"; piece.style.borderRadius = quarterRadius(r, i);   /* quarter-circle for the circle round */
          piece.style.transformOrigin = "center center";
          piece.style.transition = "transform .8s cubic-bezier(.18,.89,.32,1.08), opacity .4s ease";
          layer.appendChild(piece);
          /* Seated scale. Default: uniform INNER fraction of the slot width (the
             square hollow). Rounds with slotFill fill the hollow box per-axis so
             a wide rectangle hollow gets a wide/short piece instead of a square. */
          var sX, sY;
          if (r.squareSeat) {
            /* square seat off the hollow's short side (circle quarters) */
            var qs = Math.min(sc.w, sc.h) * r.slotFill.w;
            sX = qs / hw; sY = qs / hh;
          } else if (r.slotFill) {
            sX = (sc.w * r.slotFill.w) / hw;
            sY = (sc.h * r.slotFill.h) / hh;
          } else {
            sX = sY = (sc.w * INNER) / hw;
          }
          var dx = sc.x - qcx + nudgeX, dy = sc.y - qcy + nudgeY;
          setTimeout(function () {
            requestAnimationFrame(function () {
              if (success) {
                piece.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + sX + "," + sY + ")";
              } else {
                piece.style.transform = "translate(" + (dx * 0.66) + "px," + (dy * 0.66) + "px) scale(" + (sX * 0.92) + "," + (sY * 0.92) + ") rotate(" + (i % 2 ? 9 : -9) + "deg)";
                piece.classList.add("soft-mismatch");
              }
            });
          }, i * 90);
        })(i);
      }
      setTimeout(onDone, 1150);
    }

    /* Incorrect cut: fly the player's REAL pieces (whatever shapes the two cuts
       produced) toward the corner hollows, then vibrate them in place — a
       triangle/odd sector visibly will not seat in a square slot. */
    function flySectorsToCornersVibrate(r, center, a1, a2, onDone) {
      var layer = els.flightLayer;
      els.machineBlock.innerHTML = "";
      hide(els.machineStage);
      var W = r.blockW, H = r.blockH;
      var geos = gridSectorPieces(W, H, a1, a2);
      geos.forEach(function (geo, i) {
        var slot = els.cornerSlotEls[i % els.cornerSlotEls.length];
        var sc = gameSpaceCenter(slot);
        var pcx = center.x + (geo.centroid.x - W / 2);
        var pcy = center.y + (geo.centroid.y - H / 2);
        var piece = makeSectorPiece(r, geo, W, H);
        piece.classList.add("flying-half");
        piece.style.position = "absolute";
        piece.style.left = (center.x - W / 2 + geo.minX) + "px";
        piece.style.top = (center.y - H / 2 + geo.minY) + "px";
        piece.style.transformOrigin = "center center";
        piece.style.transition = "transform .8s cubic-bezier(.18,.89,.32,1.08)";
        layer.appendChild(piece);
        var s = (sc.w * 0.42) / Math.max(geo.width, geo.height);
        var dx = sc.x - pcx, dy = sc.y - pcy;
        setTimeout(function () {
          requestAnimationFrame(function () {
            piece.style.setProperty("--fitX", dx.toFixed(1) + "px");
            piece.style.setProperty("--fitY", dy.toFixed(1) + "px");
            piece.style.setProperty("--fitS", s.toFixed(3));
            piece.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + s + ")";
          });
        }, i * 90);
        setTimeout(function () {
          piece.style.transition = "none";
          piece.classList.add("piece-vibrate");
        }, 870 + i * 90);
      });
      setTimeout(onDone, 1750);
    }

    /* status: "win" (squares fit the chargers), "equal-misfit" (4 equal parts
       but not square — e.g. diagonal triangles), or "unequal". */
    function gridFitFlow(status) {
      var success = status === "win";
      var r = currentRound();
      setInstruction("");
      /* Fit screen shows the bots, so it uses the studio room (Mainbg) and is
         bright — drop the cutting-screen dim. tryAgain restores Bg2 on a retry. */
      els.sceneBg.src = ASSETS + "Mainbg.webp";
      if (els.focusDim) { els.focusDim.classList.remove("show"); }
      /* Raise the hollows to the charging-screen layout (slots-connector, per
         Figma 16:2094) so the fit/success screen matches the first charge screen.
         The flown pieces and the connector lines are both computed from the slots'
         live positions after this, so they move up with the hollows — the seated
         block alignment (a fixed offset from each slot centre) is unchanged. */
      if (els.cornerSlots) {
        els.cornerSlots.classList.remove("slots-high");
        els.cornerSlots.classList.add("slots-connector", "slots-fit");   /* slots-fit drops the upper hollows clear of the panel */
      }
      var center = machineCenterInGame();   /* capture before the machine hides */
      gridBotsEnter();
      later(function () {
        if (success) {
          flyQuartersToCorners(r, center, true, function () {
            hide(els.machineStage);
            sndSuccess();
            /* Turn the bots happy FIRST: gridBotsHappy swaps in the smaller happy
               art, so the heads settle to their final size/position before
               playPodConnectors freezes the wire paths to them. Drawing the wires
               first (the old order) aimed them at the larger entering bots, so the
               cables ended up floating above the shrunken happy heads. */
            gridBotsHappy(r);
            playPodConnectors(true);   /* wires + head plugs now land on the happy bot crowns */
            sndCorrectCharged();
            els.cornerSlotEls.forEach(function (slot) {
              var c = gameSpaceCenter(slot);
              burstCelebration(c.x, c.y);
            });
            var successAudio = setInstruction(SUCCESS_CHARGED_TEXT, { playThrough: true });
            whenInstructionAudioEnds(successAudio, function () {
              setInstruction("", { forceAudioStop: true });
              state.nextAction = null;
              els.nextButton.classList.add("is-success");
              show(els.nextButton);
            });
          });
        } else {
          var angles = state.gridCutAngles || [0, 90];
          flySectorsToCornersVibrate(r, center, angles[0], angles[1], function () {
            hide(els.machineStage);
            var oops = setInstruction("Oops! The parts don't fit in the slots.");
            /* Only offer Try Again once the voice line has finished — don't cut
               it off. Drive off the audio's 'ended' event; a generous timer is
               the safety net if the clip is blocked/missing. Leave the
               wrong-shaped pieces on the hollows until the player taps it. */
            var revealed = false;
            var revealTryAgain = function () {
              if (revealed) { return; }
              revealed = true;
              setInstruction("");
              show(els.tryAgain);
            };
            if (oops && typeof oops.addEventListener === "function") {
              oops.addEventListener("ended", revealTryAgain, { once: true });
              later(revealTryAgain, 5000);
            } else {
              later(revealTryAgain, 2600);
            }
          });
        }
      }, 260);
    }

    function slotScaleForPiece(target, piece) {
      return Math.min(
        (target.width || piece.width) / piece.width,
        (target.height || piece.height) / piece.height
      );
    }

    /* ──────────────────────────────────────────────────────────────────────
       Semicircle hollow-fit system - last two flows (circle-diagonal rounds).

       Each diagonal-circle pod PNG is a half-disc with an OPAQUE dark hollow
       and a light rim. The orange fill is drawn at the measured hollow radius;
       a small chord-only tuck hides the dark hollow along the flat edge without
       growing the circular arc or the visible stroke.

       Geometry was measured from the hollow PNGs (fractions of pod image width):
         fx,fy - disc centre        fR - disc radius
         diamAng - flat-edge angle  keepDir - direction into the filled half  */
    var DIAG_HOLLOW_GEOMETRY = {
      "45angleCircleHollow.webp":     { fx: 0.6132, fy: 0.4026, fR: 0.3670, diamAng: 42.5,   keepDir: 135.37, fillFlatPad: 0.20 },
      "135anglecutCircleHollow.webp": { fx: 0.3861, fy: 0.6050, fR: 0.3586, diamAng: 44.40,  keepDir: -43.08, fillExpandPx: 1.7 },
      "CircleLastFlowHollow1.webp":   { fx: 0.6308, fy: 0.6373, fR: 0.3732, diamAng: 134.50, keepDir: -135.26 },
      "CircleLastFlowHollow2.webp":   { fx: 0.4199, fy: 0.3817, fR: 0.3501, diamAng: 136.5,  keepDir: 45.21, fillFlatPad: 0.20, fillAngleOffset: -0.75 }
    };
    var DIAG_FILL_OVERSCALE = 1.02; // overscale ~2% — arc still seals AA slivers, leaves room for the explicit SVG rim above it
    var DIAG_FILL_FLATPAD   = 0.075; // chord-only tuck; does not increase the circular radius
    var DIAG_FOCUS_RADIUS_FRAC = 0.365; // slot-instruct cyan cue: ONE size for both sides (equal); biased small to avoid spill

    function podBasename(src) {
      return String(src || "").split("/").pop();
    }

    function angDiffAbs(a, b) {
      var d = ((a - b) % 360 + 540) % 360 - 180;
      return Math.abs(d);
    }

    /* A circular-segment path in the SVG's own coordinates. flatPad pushes
       the chord outward (keeps the chord further from the disc centre, so
       the flat edge stays tucked past the diameter line). expandPx adds N
       SVG units to the ARC radius without moving the chord — this is how
       the orange fill grows past the hollow's measured rim by exactly N px
       to cover anti-aliased white slivers, instead of growing via uniform
       transform scale (which also distorts the chord). */
    function semicircleSegmentPath(cx, cy, r, diamAng, keepDir, flatPad, expandPx) {
      var rad = Math.PI / 180;
      var sign = angDiffAbs(diamAng + 90, keepDir) < angDiffAbs(diamAng - 90, keepDir) ? 1 : -1;
      var keepN = diamAng + sign * 90;
      var off = r * flatPad;
      var foot = { x: cx - Math.cos(keepN * rad) * off, y: cy - Math.sin(keepN * rad) * off };
      var rArc = r + (expandPx || 0);
      var halfChord = Math.sqrt(Math.max(0, rArc * rArc - off * off));
      var t = { x: Math.cos(diamAng * rad), y: Math.sin(diamAng * rad) };
      var A = { x: foot.x + t.x * halfChord, y: foot.y + t.y * halfChord };
      var B = { x: foot.x - t.x * halfChord, y: foot.y - t.y * halfChord };
      var aA = Math.atan2(A.y - cy, A.x - cx);
      var aB = Math.atan2(B.y - cy, B.x - cx);
      var span = aB - aA;
      if (sign > 0) { while (span < 0) { span += Math.PI * 2; } }
      else { while (span > 0) { span -= Math.PI * 2; } }
      var steps = 48;
      var path = "M" + A.x.toFixed(2) + "," + A.y.toFixed(2);
      for (var i = 1; i <= steps; i++) {
        var a = aA + span * (i / steps);
        path += " L" + (cx + Math.cos(a) * rArc).toFixed(2) + "," + (cy + Math.sin(a) * rArc).toFixed(2);
      }
      return path + " Z";
    }

    function diagPodH(r, side) {
      return (r.podW || 132) * (side === "right" ? (r.podAspectRight || r.podAspectLeft || 2.3)
                                                 : (r.podAspectLeft || 2.3));
    }

    /* Builds the orange semicircle-segment SVG for a diagonal-circle pod, sized to the
       pod box (podW × podH). Shared by the in-slot fill AND the fly-in piece,
       so the two are pixel-identical and the hand-off shows no shape/rotation
       change.
       Returns { svg, cx, cy, rr } (disc centre + radius in the SVG's coordinates). */
    function buildDiagSemicircleSvg(r, side, podW, podH) {
      var geo = DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)];
      if (!geo) { return null; }
      var cx = geo.fx * podW;
      var cy = geo.fy * podW;
      var fillScale = DIAG_FILL_OVERSCALE;
      var fillFlatPad = geo.fillFlatPad !== undefined ? geo.fillFlatPad : DIAG_FILL_FLATPAD;
      var fillAngle = geo.diamAng + (geo.fillAngleOffset || 0);
      var fillKeepDir = geo.keepDir + (geo.fillAngleOffset || 0);
      var rr = geo.fR * podW * fillScale;
      /* Local arc-only expansion (in SVG/CSS units): nudges ONLY the curved
         rim outward to seal sub-pixel AA slivers. The chord side is
         untouched — flatPad places it against the original radius `rr`,
         not `rArc`, so the flat edge stays tucked exactly where it was
         and can't spill past the pod's diagonal cut. The explicit SVG rim
         above the fill now owns the visible rim, so the arc can fully
         cover the AA gap without exposing the PNG's hollow band.

         Default 1.0 closed the hairline on three of four pods. The fourth
         (135anglecutCircleHollow.webp) has the smallest measured radius
         (fR 0.3586) and the default 0.075 chord tuck, so it had the least
         arc cushion and still left a tiny visible hole — overridden via
         geo.fillExpandPx so only that pod expands further, leaving the
         clean pods exactly as they were. */
      var arcExpandPx = geo.fillExpandPx !== undefined ? geo.fillExpandPx : 1.0;
      var d = semicircleSegmentPath(cx, cy, rr, fillAngle, fillKeepDir, fillFlatPad, arcExpandPx);

      var ns = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(ns, "svg");
      svg.setAttribute("viewBox", "0 0 " + podW + " " + podH);
      svg.setAttribute("width", podW);
      svg.setAttribute("height", podH);
      svg.setAttribute("shape-rendering", "geometricPrecision");
      svg.style.overflow = "visible";
      svg.style.pointerEvents = "none";
      svg.style.transform = "translateZ(0)";
      svg.style.transformBox = "fill-box";
      svg.style.transformOrigin = "center center";
      svg.style.backfaceVisibility = "hidden";
      svg.style.willChange = "transform";

      var clipId = "diag-hollow-clip-" + Math.random().toString(36).substr(2, 9);
      var defs = document.createElementNS(ns, "defs");
      var clip = document.createElementNS(ns, "clipPath");
      clip.setAttribute("id", clipId);
      var path = document.createElementNS(ns, "path");
      path.setAttribute("d", d);
      path.setAttribute("vector-effect", "non-scaling-stroke");
      path.setAttribute("shape-rendering", "geometricPrecision");
      clip.appendChild(path);
      defs.appendChild(clip);
      svg.appendChild(defs);

      var blockSize = rr * 2.4; // orange block comfortably covers the clip region
      var image = document.createElementNS(ns, "image");
      image.setAttributeNS("http://www.w3.org/1999/xlink", "href", r.blockSrc);
      image.setAttribute("href", r.blockSrc);
      image.setAttribute("x", cx - blockSize / 2);
      image.setAttribute("y", cy - blockSize / 2);
      image.setAttribute("width", blockSize);
      image.setAttribute("height", blockSize);
      image.setAttribute("preserveAspectRatio", "none");
      image.setAttribute("clip-path", "url(#" + clipId + ")");
      svg.appendChild(image);

      /* Dedicated rim stroke layer ABOVE the orange fill — uses the EXACT
         same `d` as the clip path, so the rim hugs the orange edge with
         zero drift. vector-effect:non-scaling-stroke keeps the rim at a
         constant 2.5px regardless of any parent scale. The stroke is
         centered on the path, so the orange covers the inner half from
         below while the outer half sits over the PNG's natural hollow
         band — the visible result is a clean 2.5px embedded rim. The
         hollow geometry is well inside the pod outline (~3–7px inset on
         the chord, similarly on the arc), so a 1.25px overshoot can't
         reach the pod boundary.

         Rim starts hidden (opacity 0) and is activated by the caller —
         the fly-in path fades it in as motion begins; the in-slot path
         shows it briefly then settles to a subtle level. Animation is
         pure opacity (no scaling) so the geometry never drifts. */
      var rim = document.createElementNS(ns, "path");
      rim.setAttribute("d", d);
      rim.setAttribute("fill", "none");
      rim.setAttribute("stroke", "#ffffff");
      rim.setAttribute("stroke-width", "2.5");
      rim.setAttribute("stroke-linejoin", "round");
      rim.setAttribute("stroke-linecap", "round");
      rim.setAttribute("vector-effect", "non-scaling-stroke");
      rim.setAttribute("shape-rendering", "geometricPrecision");
      rim.style.transformBox = "fill-box";
      rim.style.transformOrigin = "center center";
      rim.style.opacity = "0";
      rim.style.transition = "opacity .55s cubic-bezier(.4,0,.2,1)";
      svg.appendChild(rim);
      return { svg: svg, cx: cx, cy: cy, rr: rr, rim: rim };
    }

    /* Game-space centre of a diagonal-circle hollow at the ready/charging layout, so the
       fly-in half can travel directly to its final aligned spot (no post-landing fix-up). */
    function diagHollowGameCenter(r, side) {
      var geo = DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)];
      if (!geo) { return null; }
      var podW = r.podW || 132;
      var botSlotLeft = side === "right" ? (1280 - 80 - 260) : 80; // layout-ready bot-slot
      var podCenterX = botSlotLeft + 130 + podXOffsetForRound(r, side);
      var podTop = podTopForRound(r, "layout-ready", side);
      return { x: podCenterX - podW / 2 + geo.fx * podW, y: podTop + geo.fy * podW };
    }

    /* Single source of truth for fitting the orange piece into a diagonal-circle
       hollow. The overlay is anchored to the pod box (read live from the pod/fill
       layout, which move together) and clipped to the measured hollow shape. */
    function fitSemicircleIntoHollow(r, side, fill) {
      var podEl = side === "right" ? els.rightPod : els.leftPod;
      var podW = r.podW || 132;
      var built = buildDiagSemicircleSvg(r, side, podW, diagPodH(r, side));
      if (!built || !podEl) { return false; }

      // The fill tracks the pod with a constant offset through every layout/
      // transition, so positioning the overlay relative to the pod box (read
      // from the live inline styles) keeps it locked to the hollow.
      var podML = parseFloat(podEl.style.marginLeft) || 0;
      var podTop = parseFloat(podEl.style.top) || 0;
      var fillML = parseFloat(fill.style.marginLeft) || 0;
      var fillTop = parseFloat(fill.style.top) || 0;
      var fillW = parseFloat(fill.style.width) || podW;
      var svg = built.svg;
      svg.style.position = "absolute";
      /* Snap to integer pixels so the SVG's internal path raster is consistent
         frame to frame and the disc centre lands on a whole-pixel boundary —
         subpixel positioning was a residual source of AA shimmer on the rim. */
      svg.style.left = Math.round((podML - fillML) + (fillW - podW) / 2) + "px";
      svg.style.top = Math.round(podTop - fillTop) + "px";

      var shell = document.createElement("div");
      shell.className = "fit-piece";
      shell.style.position = "absolute";
      shell.style.left = "0";
      shell.style.top = "0";
      shell.style.width = "0";
      shell.style.height = "0";
      shell.style.overflow = "visible";
      shell.appendChild(svg);

      fill.innerHTML = "";
      fill.appendChild(shell);
      fill.classList.add("filled");

      /* Rim handoff: the fly-in piece ended at opacity 0.92 right before
         it was removed. Snap the in-slot rim to the same level on its
         first mounted frame (no transition, so there's no flash), then
         gently fade down to a subtle settled level on the next frame.
         Net effect: the socket "activates" during movement, then relaxes
         once the piece is home. */
      if (built.rim) {
        var rimEl = built.rim;
        rimEl.style.transition = "opacity 0s";
        rimEl.style.opacity = "0.92";
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            rimEl.style.transition = "opacity .55s cubic-bezier(.4,0,.2,1)";
            rimEl.style.opacity = "0.42";
          });
        });
      }
      return true;
    }

    function fillSlotWithPiece(fill, r, index, angle) {
      var w = parseFloat(fill.style.width || "0");
      var h = parseFloat(fill.style.height || "0");
      var side = fill === els.rightFill ? "right" : "left";
      /* Re-apply the pod mask-band (now skipped in setupBots so the empty
         pod doesn't show a "cable cut") so the cream neck taper stays
         hidden behind the orange piece. Only the round/side combinations
         that actually declare a mask-band get one — others stay
         unmasked. The mask is set BEFORE the fill DOM is rebuilt so the
         pod and the fill paint coherently on the same frame. */
      if (r && r.podMaskBand) {
        var maskPodEl = side === "right" ? els.rightPod : els.leftPod;
        applyPodMaskBand(maskPodEl, r.podMaskBand[side]);
      }
      if (r.name === "circle" && r.variant === "circle-vertical") {
        var diameter = h;
        var shell = document.createElement("div");
        shell.className = "fit-piece";
        shell.style.width = w + "px";
        shell.style.height = h + "px";
        shell.style.overflow = "hidden";
        shell.style.transformOrigin = "center center";
        shell.style.transform = "translateZ(0)";
        shell.style.filter = "none";

        var block = makeBlock(r, diameter, diameter);
        block.style.position = "absolute";
        block.style.top = "0";
        block.style.left = side === "right" ? (-diameter / 2) + "px" : (w - diameter / 2) + "px";
        block.style.width = diameter + "px";
        block.style.height = diameter + "px";
        block.style.filter = "none";

        shell.appendChild(block);
        fill.innerHTML = "";
        fill.appendChild(shell);
        fill.classList.add("filled");
        return;
      }
      if (r.name === "circle" && r.variant === "circle-diagonal" && r.slotFocus) {
        if (fitSemicircleIntoHollow(r, side, fill)) {
          return;
        }
      }
      var piece = makeCutPiece(r, index, r.blockW, r.blockH, angle);
      var home = cutPieceHome(r.blockW, r.blockH, angle, index, 0, 0);
      var scale = slotScaleForPiece({ width: w, height: h }, home) * visualFitScaleForRound(r);
      fill.innerHTML = "";
      var dyOffset = (r.name === "rectangle" && !r.variant) ? "-8px" : "0px";
      piece.classList.add("fit-piece");
      piece.style.transformOrigin = "center center";
      var fitScaleXY = r.fitPieceScale;
      var sideScale = fitScaleXY && (fitScaleXY.left || fitScaleXY.right)
        ? (side === "right" ? fitScaleXY.right : fitScaleXY.left)
        : fitScaleXY;
      if (sideScale) {
        var sx = scale * (sideScale.x || 1);
        var sy = scale * (sideScale.y || 1);
        piece.style.transform = "translateZ(0) translateY(" + dyOffset + ") scale(" + sx + ", " + sy + ")";
      } else {
        piece.style.transform = "translateZ(0) translateY(" + dyOffset + ") scale(" + scale + ")";
      }
      piece.style.filter = "none";
      fill.appendChild(piece);
      fill.classList.add("filled");
    }

    function renderResultSplitScreen(r, angle) {
