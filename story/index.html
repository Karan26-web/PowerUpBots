    function switchBotsToHappy(r) {
      els.leftBot.src = r.happyBot;
      els.rightBot.src = r.happyBot;
      var hw = r.botWIntro + "px";
      els.leftBot.style.width = hw;
      els.rightBot.style.width = hw;
      els.leftBot.style.marginLeft = happyBotXOffsetForRound(r, "left") + "px";
      els.rightBot.style.marginLeft = happyBotXOffsetForRound(r, "right") + "px";
      var happyLift = r.happyBotLift !== undefined ? r.happyBotLift : 10;
      els.leftBot.style.bottom = happyLift + "px";
      els.rightBot.style.bottom = happyLift + "px";
      els.leftBot.classList.add("happy");
      els.rightBot.classList.add("happy");
      els.leftPod.classList.add("charged-focus");
      els.rightPod.classList.add("charged-focus");
      els.leftFill.classList.add("charged-focus");
      els.rightFill.classList.add("charged-focus");

      var happyAspect = r.happyBotAspect || r.botAspect || 1.2;
      var newBotTop = 720 - r.botWIntro * happyAspect;
      var podW = r.podW || 132;
      var aspectL = r.podAspectLeft || 2.3;
      var aspectR = r.podAspectRight || r.podAspectLeft || 2.3;
      var happyContactNudge = r.happyConnectorNudge !== undefined ? r.happyConnectorNudge : 10;
      var chargerOverlap = chargerOverlapForRound(r) +
        connectorOverlapBoostForRound(r, "layout-intro-connected") +
        (r.podHeadContactDrop || 0) +
        happyContactNudge;
      var newTopL = newBotTop - podW * aspectL + chargerOverlap;
      var newTopR = newBotTop - podW * aspectR + chargerOverlap;

      var leftHappyPodX = happyPodXOffsetForRound(r, "left");
      var rightHappyPodX = happyPodXOffsetForRound(r, "right");

      els.leftPod.style.transition = "top 0.4s ease, margin-left 0.4s ease";
      els.rightPod.style.transition = "top 0.4s ease, margin-left 0.4s ease";
      els.leftFill.style.transition = "top 0.4s ease, margin-left 0.4s ease";
      els.rightFill.style.transition = "top 0.4s ease, margin-left 0.4s ease";

      els.leftPod.style.top = newTopL + "px";
      els.rightPod.style.top = newTopR + "px";
      els.leftPod.style.marginLeft = leftHappyPodX + "px";
      els.rightPod.style.marginLeft = rightHappyPodX + "px";
      els.leftFill.style.top = (newTopL + targetSlotOffsetForRound(r, "left")) + "px";
      els.rightFill.style.top = (newTopR + targetSlotOffsetForRound(r, "right")) + "px";
      els.leftFill.style.marginLeft = (targetSlotXOffsetForRound(r, "left") + leftHappyPodX) + "px";
      els.rightFill.style.marginLeft = (targetSlotXOffsetForRound(r, "right") + rightHappyPodX) + "px";
      addConnectorStemCover(els.leftBot.parentNode, els.leftPod);
      addConnectorStemCover(els.rightBot.parentNode, els.rightPod);

      [els.leftBot.parentNode, els.rightBot.parentNode].forEach(function (slot) {
        slot.classList.remove("celebrate-jump");
        void slot.offsetWidth;
        slot.classList.add("celebrate-jump");
      });
      /* Clear the inline transitions once the happy-position animation has
         settled, so they cannot leak into the next round's setupBots (which
         would re-animate pod/fill positions during a question change).
         resetScene also clears these defensively; this is the matched
         cleanup at the source. 480ms = the 400ms transition + a small
         safety buffer. */
      setTimeout(function () {
        [els.leftPod, els.rightPod, els.leftFill, els.rightFill].forEach(function (el) {
          if (el) { el.style.transition = ""; }
        });
      }, 480);
    }

    /* ── fly the two half-pieces from a result/machine center to bot charging slots ── */
    function flyHalvesToSlots(r, angle, onDone, centerOverride) {
      var layer = els.flightLayer;
      layer.innerHTML = "";

      var center = centerOverride || machineCenterInGame();
      var targets = slotTargetsFromFills();

      [0, 1].forEach(function (slotIdx) {
        var pieceIdx = pieceIndexForSlot(r, slotIdx);
        var side = slotIdx === 0 ? "left" : "right";

        // Diagonal-circle rounds: fly the SAME semicircle SVG the slot fill uses, straight
        // into the hollow's final spot. The hand-off to the in-slot overlay is then
          // pixel-identical (same shape, angle, size, position) - no landing fix-up.
        if (r.name === "circle" && r.variant === "circle-diagonal" &&
          DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)]) {
          var dPodW = r.podW || 132;
          var dPodH = diagPodH(r, side);
          var built = buildDiagSemicircleSvg(r, side, dPodW, dPodH);
          var hc = diagHollowGameCenter(r, side);
          var dFly = document.createElement("div");
          dFly.className = "flying-half";
          dFly.style.width = dPodW + "px";
          dFly.style.height = dPodH + "px";
          /* Start position snapped to integer pixels — subpixel left/top
             shifts the AA pattern relative to the path interior and produces
             a visible hairline at the rim. */
          dFly.style.left = Math.round(center.x - built.cx) + "px";
          dFly.style.top = Math.round(center.y - built.cy) + "px";
          dFly.style.transformOrigin = built.cx + "px " + built.cy + "px";
          dFly.style.transition = "transform .9s cubic-bezier(.18,.89,.32,1.08),opacity .9s ease";
          dFly.style.transform = "translate(0px,0px) scale(1)";
          dFly.appendChild(built.svg);
          layer.appendChild(dFly);
          (function (el, rimEl, tx, ty, delay) {
            setTimeout(function () {
              requestAnimationFrame(function () {
                el.style.transform = "translate(" + tx + "px," + ty + "px) scale(1)";
                /* The white rim stays OFF for the whole flight — the piece
                   travels as a plain orange semicircle. It only lights up
                   once the piece reaches the hollow (transitionend below). */
              });
            }, delay);
            /* Once the fly transition settles, re-lock the transform to whole
               pixels so the rasterised rim cannot drift by a subpixel as the
               browser composits the final frame, AND light the socket rim now
               that the piece has arrived in the hollow. The quick .3s fade
               completes well before the in-slot hand-off (fitSettleDelay
               1450ms vs flight 900ms), so the rim is already at 0.92 when the
               in-slot overlay snaps to the same level — no flash, no rim
               visible mid-flight. */
            el.addEventListener("transitionend", function lockToInteger(e) {
              if (e.propertyName && e.propertyName !== "transform") { return; }
              el.removeEventListener("transitionend", lockToInteger);
              el.style.transform = "translate(" + Math.round(tx) + "px," + Math.round(ty) + "px) scale(1)";
              if (rimEl) {
                rimEl.style.transition = "opacity .3s cubic-bezier(.4,0,.2,1)";
                rimEl.style.opacity = "0.92";
              }
            });
          })(dFly, built.rim, hc.x - center.x, hc.y - center.y, slotIdx * 100);
          return;
        }

        var home = cutPieceHome(r.blockW, r.blockH, angle, pieceIdx, center.x, center.y);
        if (centerOverride) {
          var startOffsets = splitOffsetForOrientation(
            cutOrientation(angle),
            resultSplitGapForRound(r, cutOrientation(angle))
          );
          home.left += startOffsets[pieceIdx].x;
          home.top += startOffsets[pieceIdx].y;
          home.centerX += startOffsets[pieceIdx].x;
          home.centerY += startOffsets[pieceIdx].y;
        }
        var fly = makeCutPiece(r, pieceIdx, r.blockW, r.blockH, angle);
        fly.classList.add("flying-half");
        fly.style.left = home.left + "px";
        fly.style.top = home.top + "px";
        fly.style.width = home.width + "px";
        fly.style.height = home.height + "px";
        fly.style.transformOrigin = "center center";
        fly.style.transition = "transform .9s cubic-bezier(.18,.89,.32,1.08),opacity .9s ease";

        layer.appendChild(fly);

        var scale = slotScaleForPiece(targets[slotIdx], home) * visualFitScaleForRound(r);
        var dx = targets[slotIdx].x - home.centerX;
        var dyOffset = (r.name === "rectangle" && !r.variant) ? 8 : 0;
        var dy = targets[slotIdx].y - home.centerY - dyOffset;
        var stagger = slotIdx * 100;
        setTimeout(function () {
          requestAnimationFrame(function () {
            fly.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + scale + ")";
          });
        }, stagger);
      });

      setTimeout(onDone, r.fitSettleDelay || 1150);
    }

    function splitMachineBlock(angle) {
      var r = currentRound();
      var cutAngle = angle === undefined ? canonicalCutAngle(r) : angle;
      var orientation = cutOrientation(cutAngle);
      var trans = "transform 0.45s cubic-bezier(.34,1.3,.64,1)";
      var h0 = makeCutPiece(r, 0, r.blockW, r.blockH, cutAngle);
      var h1 = makeCutPiece(r, 1, r.blockW, r.blockH, cutAngle);
      /* Remove the half-wrap drop-shadow in the machine — it looks odd for circles/triangles */
      h0.style.filter = "none";
      h1.style.filter = "none";
      els.machineBlock.innerHTML = "";

      if (orientation === "slash" || orientation === "backslash") {
        var g0 = pieceGeometry(r.blockW, r.blockH, cutAngle, 0);
        var g1 = pieceGeometry(r.blockW, r.blockH, cutAngle, 1);
        var container = document.createElement("div");
        container.style.cssText = "position:relative;width:" + r.blockW + "px;height:" + r.blockH + "px;";
        h0.style.position = "absolute"; h0.style.left = g0.minX + "px"; h0.style.top = g0.minY + "px";
        h1.style.position = "absolute"; h1.style.left = g1.minX + "px"; h1.style.top = g1.minY + "px";
        container.appendChild(h0);
        container.appendChild(h1);
        els.machineBlock.appendChild(container);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            h0.style.transition = trans;
            h1.style.transition = trans;
            if (orientation === "slash") {
              h0.style.transform = "translate(-3px,-3px)";
              h1.style.transform = "translate(3px,3px)";
            } else {
              h0.style.transform = "translate(3px,-3px)";
              h1.style.transform = "translate(-3px,3px)";
            }
          });
        });
        return;
      }

      var row = document.createElement("div");
      row.className = "halves-row";
      row.style.flexDirection = orientation === "vertical" ? "row" : "column";
      row.style.gap = "3px";   /* minimal cut-line gap (override the .halves-row 18px) */
      row.appendChild(h0);
      row.appendChild(h1);
      els.machineBlock.appendChild(row);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          h0.style.transition = trans;
          h1.style.transition = trans;
          if (orientation === "vertical") {
            h0.style.transform = "translateX(-4px)";
            h1.style.transform = "translateX(4px)";
          } else {
            h0.style.transform = "translateY(-4px)";
            h1.style.transform = "translateY(4px)";
          }
        });
      });
    }

    function flyWrongToSlots(r, angle, onDone, centerOverride) {
      var layer = els.flightLayer;
      layer.innerHTML = "";
      var center = centerOverride || machineCenterInGame();
      var targets = slotTargetsFromFills();
      var flyers = [];

      /* Use canonical piece size to maintain consistent physical scaling of the block,
         ensuring the height is matched vertically as requested. */
      var canonAngle = canonicalCutAngle(r);
      var canonG = pieceGeometry(r.blockW, r.blockH, canonAngle, 0);
      var uniformScale = slotScaleForPiece(targets[0], { width: canonG.width, height: canonG.height }) * visualFitScaleForRound(r);

      if (!centerOverride) {
        els.machineStage.classList.add("checking-fit");
        els.machineBlock.style.opacity = "0";
        els.laserImg.style.display = "none";
      } else {
        hide(els.machineStage);
      }

      [0, 1].forEach(function (slotIdx) {
        var pieceIdx = pieceIndexForSlot(r, slotIdx);
        var home = cutPieceHome(r.blockW, r.blockH, angle, pieceIdx, center.x, center.y);
        if (centerOverride) {
          var startOffsets = splitOffsetForOrientation(
            cutOrientation(angle),
            resultSplitGapForRound(r, cutOrientation(angle))
          );
          home.left += startOffsets[pieceIdx].x;
          home.top += startOffsets[pieceIdx].y;
          home.centerX += startOffsets[pieceIdx].x;
          home.centerY += startOffsets[pieceIdx].y;
        }
        var fly = makeCutPiece(r, pieceIdx, r.blockW, r.blockH, angle);
        fly.classList.add("flying-half", "wrong-slot-piece");
        fly.style.position = "absolute";
        fly.style.left = home.left + "px";
        fly.style.top = home.top + "px";
        fly.style.width = home.width + "px";
        fly.style.height = home.height + "px";
        fly.style.transformOrigin = "center center";
        fly.style.transition = "transform .86s " + EASE.BACK + ", filter .28s ease, opacity .28s ease";
        layer.appendChild(fly);
        flyers.push(fly);

        var scale = uniformScale; /* perfectly match hole size */
        var dx = targets[slotIdx].x - home.centerX;
        var dy = targets[slotIdx].y - home.centerY;
        var fitTransform = "translate(" + dx + "px," + dy + "px) scale(" + scale + ")";
        fly.style.setProperty("--fit-transform", fitTransform);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            fly.style.transform = fitTransform;
          });
        });
      });

      /* Mismatch feedback: pieces arrive → red glow → wiggle → return. */
      later(function () {
        flyers.forEach(function (fly) {
          fly.classList.add("wrong-fit-glow");
        });
      }, 880);

      later(function () {
        sndOops();
        flyers.forEach(function (fly) {
          fly.classList.add("soft-mismatch");
        });
      }, 980);

      later(function () {
        flyers.forEach(function (fly) {
          fly.classList.remove("soft-mismatch", "wrong-fit-glow");
          fly.classList.add("wrong-fit-hold");
          /* Pieces stay at fitTransform in the slot — no return animation */
        });
        setInstruction("");
      }, 1880);

      later(function () {
        if (typeof onDone === "function") {
          onDone();
        }
      }, 2200);
    }

    function burstCelebration(cx, cy) {
      var colors = ["#FFE566", "#4DCAFF", "#FF6B8B", "#7BFF83", "#FF9D4D", "#C87AFF", "#FF4DA3", "#56FFE0"];
      var count = 22;
      for (var i = 0; i < count; i++) {
        var dot = document.createElement("div");
        dot.className = "spark-dot";
        var angle = (i / count) * 2 * Math.PI;
        var dist = 70 + Math.random() * 90;
        var sx = Math.cos(angle) * dist;
        var sy = Math.sin(angle) * dist;
        var size = 8 + Math.random() * 8;
        dot.style.cssText = "left:" + (cx - size / 2) + "px;top:" + (cy - size / 2) + "px;" +
          "width:" + size + "px;height:" + size + "px;background:" + colors[i % colors.length] + ";" +
          "animation-delay:" + (Math.random() * 0.18) + "s;";
        dot.style.setProperty("--sx", sx.toFixed(1) + "px");
        dot.style.setProperty("--sy", sy.toFixed(1) + "px");
        els.flightLayer.appendChild(dot);
        (function (el) { setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1100); })(dot);
      }
    }

    function handleNextButton() {
      sndTap();
      hide(els.nextButton);
      els.nextButton.classList.remove("is-success");
      els.nextButton.querySelector("img").src = "assets/nextButton.webp";
      var action = state.nextAction;
      state.nextAction = null;
      if (typeof action === "function") {
        action();
        return;
      }
      nextRound();
    }

    els.playButton.addEventListener("click", function () {
      if (state.locked || !els.playButton.classList.contains("play-ready")) { return; }
      state.locked = true;
      primePlugConnectAudio();
      if (_themeAudio) { _themeAudio.currentTime = 0; _themeAudio.play().catch(function () {}); }
      sndTap();
      els.playButton.classList.add("play-clicked");
      els.playStage.classList.add("play-exit");
      runLabGate();   /* lab gate covers, opens with gateOpen.ogg, reveals the intro */
    });
    els.hitLeft.addEventListener("click", function () {
      if (state.tutActive) { tutHandleLeft(); return; }
      rotateLaser(45, els.hitLeft);
    });
    els.hitRight.addEventListener("click", function () {
      if (state.tutActive) { tutHandleRight(); return; }
      rotateLaser(-45, els.hitRight);
    });
    els.hitCut.addEventListener("click", function () {
      if (state.tutActive) { tutHandleCut(); return; }
      cutBlock();
    });
    els.tryAgain.addEventListener("click", function () { sndTap(); tryAgain(); });
    els.nextButton.addEventListener("click", handleNextButton);
    els.finishButton.addEventListener("click", function () { sndTap(); finishGame(); });

    /* ── Critical-asset warm cache ──────────────────────────────────────────
       Every screen background and UI sprite is preloaded AND decoded at
       startup, with a hard reference kept in _assetCache so the browser can't
       evict the decoded bitmap before it's used. Two concrete glitches this
       removes:
         • Tutorial background flash — `setupTutorial` swaps `sceneBg.src` to
           BgForTutorial.webp; if it isn't decoded the previously-decoded
           Mainbg.webp paints for a frame. Pre-decoding makes the swap hot.
       Safe: pure cache warming, no DOM/visual/logic change. */
    var _assetCache = {};
    function preloadAsset(src) {
      if (!src || _assetCache[src]) { return _assetCache[src] && _assetCache[src]._p; }
      var img = new Image();
      _assetCache[src] = img;
      img.src = src;
      var p;
      if (typeof img.decode === "function") {
        p = img.decode().catch(function () { /* not fatal — still cached */ });
      } else {
        p = new Promise(function (resolve) {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }
      img._p = p;
      return p;
    }
    (function preloadCriticalAssets() {
      [
        "Mainbg.webp", "Bg2.webp", "BgForTutorial.webp",
        "GameStartScreen.webp", "LetsPlayBG.webp",
        "instructionPannel.webp", "Ira.webp",
        "LaserMachineWithoutLines.webp", "LaserMachine.svg", "Beam.svg",
        "Laser.webp", "laserlight.webp",
        "LeftButton.webp", "RightButton.webp", "CutButton.webp",
        "LeftButtonClicked.webp", "RightButtonClicked.webp", "ClickedCutButton.webp",
        "TappedCutButton.webp",
        "InstruictionTutorialLeft.webp", "InstructionTutorialRight.webp",
        "InstructionTutorialCutButton.webp",
        "nextButton.webp", "TryAgainButton.webp",
        "LetsGoButton.webp", "PlayButton.webp"
      ].forEach(function (name) { preloadAsset(ASSETS + name); });
    })();

    /* Preload every round's pod, bot and block PNGs at startup. Without
       this, the first time the player enters a new round the IMG/SVG-image
       elements start loading from network/disk on the same paint that
       reveals them, so the new scene can show stale-sized or empty image
       boxes for a frame before snapping to the loaded asset. Preloading
       guarantees these PNGs are in the browser's cache before any
       question transition uses them. The decode() promise primes the
       decoded bitmap too, so first-paint after src= is hot. Safe: pure
       cache warming, no DOM or visual change. */
    (function preloadRoundAssets() {
      if (typeof ROUNDS === "undefined" || !ROUNDS) { return; }
      var seen = {};
      ROUNDS.forEach(function (r) {
        if (!r) { return; }
        [r.sadBot, r.happyBot, r.pod, r.podLeft, r.podRight, r.blockSrc, r.cornerSlot].forEach(function (src) {
          if (!src || seen[src]) { return; }
          seen[src] = true;
          preloadAsset(src);
        });
      });
    })();

    /* ── debug hook ──────────────────────────────────────────────────────────
       Expose the screen state machine + the quiet-down helpers so the layout
       debug overlay (debug.js, loaded only with ?debug=1) can read the current
       screen AND jump to any round/scene from its per-screen navigator. Purely
       additive: with the overlay absent these globals are simply unused. */
    window.FLOW = FLOW;
    window.ROUNDS = ROUNDS;
    window.state = state;
    window.renderStep = renderStep;
    window.setInstruction = setInstruction;
    window.stopInstructionAudio = stopInstructionAudio;
    window.clearTimers = clearTimers;
    window._themeAudio = _themeAudio;
    window.THEME_BASE_VOLUME = THEME_BASE_VOLUME;

    /* Static "blocks fit into slots" view for the layout overlay (debug.js). The
       real fit screen is built by gridFitFlow with fly-in animations and is then
       torn down — useless for alignment work. This renders the END state for a
       given round: happy bots, the 4 corner hollows, and the 4 quarter pieces
       seated at their CURRENT computed positions (mirrors flyQuartersToCorners),
       all as plain left/top/width/height boxes (no transforms) so the overlay can
       drag/resize them and export clean coordinates. Debug-only; never called by
       the game itself. */
    window.__debugRenderFit = function (roundIndex) {
      clearTimers();
      resetScene();
      state.round = Math.max(0, Math.min(ROUNDS.length - 1, roundIndex || 0));
      state.step = 0;
      var r = currentRound();
      els.sceneBg.src = ASSETS + "Mainbg.webp";
      els.sceneBg.style.display = "block";
      if (els.focusDim) { els.focusDim.classList.remove("show"); }
      /* Match the REAL success/fit layout so connector alignment here is valid:
         slots-connector raises the hollows, slots-fit drops the upper pair clear
         of the panel. Seated pieces follow the slot centres, so they stay seated. */
      if (els.cornerSlots) {
        els.cornerSlots.classList.remove("slots-high");
        els.cornerSlots.classList.add("slots-connector", "slots-fit");
      }
      setupGridBots({ showBots: true, showSlots: true });
      gridBotsHappy(r);
      /* Show the success panel (no audio) so the panel↔hollow clearance is visible. */
      els.instructionText.textContent = SUCCESS_CHARGED_TEXT;
      show(els.instruction);
      var layer = els.flightLayer;
      layer.innerHTML = "";
      show(layer);
      var hw = r.blockW / 2, hh = r.blockH / 2;
      /* Same seat constants as flyQuartersToCorners — start from where the game
         actually seats the pieces, then the user nudges to the correct spot. */
      var INNER = 0.52, SEAT_DROP = -3, SEAT_SHIFT_X = -4;
      var nx = r.slotNudge ? r.slotNudge.x : SEAT_SHIFT_X;
      var ny = r.slotNudge ? r.slotNudge.y : SEAT_DROP;
      var ids = ["piece-tl", "piece-tr", "piece-bl", "piece-br"];
      /* Diagonal rounds: seat the REAL cut sectors (rotated + scaled) so the fit
         view shows what the game actually seats. */
      if (isDiagRound(r)) {
        var dnx = r.slotNudge ? r.slotNudge.x : 0, dny = r.slotNudge ? r.slotNudge.y : 0;
        var triIds = ["piece-tl", "piece-tr", "piece-bl", "piece-br"];
        els.cornerSlotEls.forEach(function (slot, i) {
          var sc = gameSpaceCenter(slot);
          var piece = makeTriSeatPiece(r, i, sc, dnx, dny);
          piece.classList.add("dbg-piece");
          piece.setAttribute("data-dbg-id", triIds[i]);
          layer.appendChild(piece);
        });
      } else {
        els.cornerSlotEls.forEach(function (slot, i) {
          var sc = gameSpaceCenter(slot);
          var dispW, dispH;
          if (r.squareSeat) {
            dispW = dispH = Math.min(sc.w, sc.h) * r.slotFill.w;   /* square seat (circle quarters) */
          } else if (r.slotFill) {
            dispW = sc.w * r.slotFill.w;
            dispH = sc.h * r.slotFill.h;
          } else {
            dispW = sc.w * INNER;
            dispH = dispW * (hh / hw);
          }
          var piece = makeBlock(r, hw, hh);
          piece.className = "flying-half dbg-piece";
          piece.setAttribute("data-dbg-id", ids[i]);
          piece.style.position = "absolute";
          piece.style.width = dispW + "px";
          piece.style.height = dispH + "px";
          piece.style.left = (sc.x + nx - dispW / 2) + "px";
          piece.style.top = (sc.y + ny - dispH / 2) + "px";
          piece.style.filter = "none";
          piece.style.borderRadius = quarterRadius(r, i);   /* quarter-circle for the circle round */
          piece.style.transformOrigin = "center center";
          piece.style.transform = "none";
          layer.appendChild(piece);
        });
      }
      /* Static charging wires (no SFX/beads) so the overlay can align them. */
      playPodConnectors(true, { quiet: true });
      return r.name;
    };

    renderStep();
  </script>

  <svg width="0" height="0" style="position:absolute;z-index:-1;pointer-events:none;">
    <defs>
      <!-- Teaching Yellow Glow Shader -->
      <filter id="alpha-glow-teach" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
        <feComponentTransfer in="blur" result="boost">
          <feFuncA type="linear" slope="3" />
        </feComponentTransfer>
        <feFlood flood-color="#ffff00" result="color" />
        <feComposite in="color" in2="boost" operator="in" result="glow" />
        <feMerge>
          <feMergeNode in="glow" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Slot Alpha Glow Shader -->
      <filter id="alpha-glow-slot" x="-25%" y="-25%" width="150%" height="150%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur" />
        <feComponentTransfer in="blur" result="boost">
          <feFuncA type="linear" slope="2.3" />
        </feComponentTransfer>
        <feFlood flood-color="#5bff76" result="color" />
        <feComposite in="color" in2="boost" operator="in" result="glow" />
        <feMerge>
          <feMergeNode in="glow" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Soft mismatch shader retained for gentle retry feedback if needed. -->
      <filter id="alpha-glow-wrong" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
        <feComponentTransfer in="blur" result="boost">
          <feFuncA type="linear" slope="2.2" />
        </feComponentTransfer>
        <feFlood flood-color="#7bdfff" result="softGlow" />
        <feComposite in="softGlow" in2="boost" operator="in" result="glow" />

        <feColorMatrix in="SourceGraphic" type="matrix" values="
        1 0 0 0 0
        0 1.05 0 0 0
        0 0 1.08 0 0
        0 0 0 1 0" result="tinted" />

        <feMerge>
          <feMergeNode in="glow" />
          <feMergeNode in="tinted" />
        </feMerge>
      </filter>

      <!-- Red glow for wrong-fit pieces trying to enter slots -->
      <filter id="alpha-glow-wrong-red" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
        <feComponentTransfer in="blur" result="boost">
          <feFuncA type="linear" slope="3" />
        </feComponentTransfer>
        <feFlood flood-color="#ff3333" result="color" />
        <feComposite in="color" in2="boost" operator="in" result="glow" />
        <feMerge>
          <feMergeNode in="glow" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
  </svg>
